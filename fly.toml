# fly.toml app configuration file generated for marblefun on 2026-07-13T15:20:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'marblefun'
primary_region = 'iad'

[build]

[env]
  DB_PATH = '/data/tournament.db'
  HOST = '0.0.0.0'
  MASTER_SEED = '424242'
  PORT = '8080'

[[mounts]]
  source = 'marble_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
