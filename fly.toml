# Fly.io config for the always-on marble tournament server.
#   - one machine that never auto-stops, so the tournament keeps ticking even
#     when nobody is watching
#   - a persistent volume for the SQLite database
# Deploy from the `main` branch.
app = "marblefun"
primary_region = "iad"   # Ashburn, US-East. Change to your nearest region.

# Headless Chromium spikes memory while building the 3D course; on a 1 GB VM
# that can trip the kernel OOM killer (a SIGKILL no code can survive). Swap
# absorbs the spike at no extra cost.
swap_size_mb = 1024

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  DB_PATH = "/data/tournament.db"
  # MASTER_SEED sets the whole tournament. Change it for a fresh bracket.
  MASTER_SEED = "424242"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine running so the tournament clock never pauses.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

# SQLite lives on a persistent volume so results survive deploys/restarts.
[[mounts]]
  source = "marble_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  # Headless Chromium alone holds ~560MB running the game's physics world; on
  # a 1gb VM the kernel OOM-killed it (verified in production logs). 2gb + the
  # swap above gives it real headroom.
  memory = "2gb"
