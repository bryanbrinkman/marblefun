// =========================================================
// World-space peg list, repopulated on every build.
const allPegs = [];
// World-space fan list (spinning paddles). Each entry tracks the fan's center, the
// outDir of its host cell, and a reference to the fan's data on the cell (for animation
// state — angle, angular velocity).
const allFans = [];
// World-space flag list. Each entry is { mesh, baseGeom, basePositions, phase, amplitude, frequency, wavelength }.
// Used by updateFlags(dt) to animate vertex positions for the waving effect.
const allFlags = [];
// Map from "gx,gz" -> array of cells in that column (multiple when track crosses
// itself or uses a funnel pair). Physics uses cellByXZAt(x, y, z) to pick the right one.
const cellByXZ = new Map();

// Find the cell at world (x, y, z) — uses XZ to find candidate cells in the column,
// then picks the one whose tile Y is nearest to the marble's Y. Uses an integer-
// encoded key to skip the string allocation that `${gx},${gz}` would do (this
// function runs once per marble per physics step — small win that adds up).
function cellByXZAt(wx, wy, wz) {
  const cs = CONFIG.cellSize;
  const gx = Math.round(wx / cs);
  const gz = Math.round(wz / cs);
  // Encode (gx, gz) into a single safe integer. Gx and gz are bounded by ±18-22
  // (see path-gen bounds), so 10000-multiplied + offset fits comfortably in i32.
  const key = (gx + 1000) * 10000 + (gz + 1000);
  const list = cellByXZ.get(key);
  if (!list || list.length === 0) return null;
  if (list.length === 1) return list[0];
  // Pick the cell with the smallest |y - midY|
  let best = list[0];
  let bestD = Infinity;
  for (const c of list) {
    const midY = (c.entryY + c.exitY) / 2;
    const d = Math.abs(wy - midY);
    if (d < bestD) { bestD = d; best = c; }
  }
  return best;
}

// The world build is structured as a list of self-contained steps so the boot
// sequence can yield to the browser between them (painting real progress on
// the loading overlay), while NEW COURSE rebuilds run the same steps in one
// synchronous burst with identical behavior. Each step carries the cumulative
// percentage it represents (weighted by rough cost — buildBlocks dominates)
// and a label for the loader.
const BUILD_STEPS = [
  { pct: 6, label: 'CLEARING TABLE', fn: () => {
    // Reset the track stream so the same SEEDS.track always yields the same
    // course, no matter how many builds happened before this one.
    reseedTrack();
    console.log(`[determinism] building course with track seed ${SEEDS.track}`);
    clearWorld();
    clearConfetti();
  }},
  { pct: 16, label: 'PLOTTING COURSE', fn: () => {
    // Generate path
    pathCells = generatePath();
    // Stamp each cell with its index so the ghosting system can look up the leader's
    // cell at runtime via the position-based cellByXZAt and skip ghosting its meshes.
    for (let i = 0; i < pathCells.length; i++) pathCells[i].index = i;
    // Build XZ lookup for physics — store ALL cells per XZ (track can cross itself).
    // Key is an integer-encoded (gx, gz) for fast Map lookup without per-call string
    // allocation (see cellByXZAt for the matching encoding).
    cellByXZ.clear();
    for (const c of pathCells) {
      const k = (c.gx + 1000) * 10000 + (c.gz + 1000);
      let list = cellByXZ.get(k);
      if (!list) { list = []; cellByXZ.set(k, list); }
      list.push(c);
    }
  }},
  { pct: 26, label: 'BENDING RAILS', fn: () => {
    // Build curve from path
    const points = buildCurveFromPath(pathCells);
    setTrackFromPoints(points);
  }},
  { pct: 72, label: 'STACKING BLOCKS', fn: () => {
    // Build all the wooden blocks — by far the heaviest step (geometry +
    // texture clones for every tile, wall, cube, and pillar).
    buildBlocks();
  }},
  { pct: 82, label: 'RAISING FLAGS', fn: () => {
    // Start gate + finish marker
    buildStartGate();
    buildFinishLine();
    buildPodium();
    buildFlags();
  }},
  { pct: 88, label: 'POLISHING MARBLES', fn: () => {
    prepareRace();
  }},
  { pct: 100, label: 'FRAMING SHOT', fn: () => {
    // Aim camera at course center (including vertical center for a tall course)
    const bounds = computeCourseBounds();
    let minY = Infinity, maxY = -Infinity;
    for (const c of pathCells) {
      minY = Math.min(minY, c.entryY, c.exitY);
      maxY = Math.max(maxY, c.entryY, c.exitY);
    }
    cameraTarget.set(
      (bounds.minX + bounds.maxX) / 2,
      (minY + maxY) / 2,
      (bounds.minZ + bounds.maxZ) / 2
    );

    // Auto-fit zoom so the course (plus a small margin) fills the viewport. The
    // isometric projection compresses the XZ footprint by ~cos(pitch) vertically and
    // expands the total visible extent. We approximate the on-screen extent as
    // half-diagonal of the XZ box plus the vertical height, scaled appropriately, then
    // pick the zoom factor that just fits.
    const xSpan = (bounds.maxX - bounds.minX);
    const zSpan = (bounds.maxZ - bounds.minZ);
    const ySpan = (maxY - minY);
    // For a box rotated by 45° in plan, the screen-width footprint is ~(xSpan + zSpan) / √2,
    // and the screen-height footprint is ~(xSpan + zSpan) / √2 * sin(pitch) + ySpan * cos(pitch).
    const pitchR = camPitch * Math.PI / 180;
    const planDiag = (xSpan + zSpan) / Math.SQRT2;
    const screenW = planDiag * Math.cos(pitchR) + 8;        // +margin
    const screenH = planDiag * Math.sin(pitchR) + ySpan * Math.cos(pitchR) + 12;
    // The ortho camera frustum spans 2 * camSize * zoomFactor vertically and
    // 2 * camSize * zoomFactor * aspect horizontally. Solve for zoomFactor:
    const aspectRatio = window.innerWidth / window.innerHeight;
    const zoomForH = screenH / (2 * camSize);
    const zoomForW = screenW / (2 * camSize * aspectRatio);
    // Take the LARGER required zoom (so both axes fit), with a tiny extra margin.
    zoomFactor = Math.max(zoomForH, zoomForW) * 1.05;
    // Clamp to the user-allowed zoom range (so the user can still zoom in/out from here).
    zoomFactor = Math.max(0.05, Math.min(3.0, zoomFactor));
    // Stash the auto-fit zoom + course center so split-screen's overview panel can
    // always render the FULL course (regardless of where the user has dragged or
    // zoomed the main overview to).
    _autoFitZoom = zoomFactor;
    _autoFitTarget = new THREE.Vector3(
      (bounds.maxX + bounds.minX) / 2,
      (maxY + minY) / 2,
      (bounds.maxZ + bounds.minZ) / 2
    );
    updateOrthoCamera();

    // Resolve world positions of pegs so physics can collide with them.
    scene.updateMatrixWorld(true);
    allPegs.length = 0;
    for (const c of pathCells) {
      if (!c.pegs) continue;
      for (const peg of c.pegs) {
        if (!peg._mesh) continue;
        const wp = new THREE.Vector3();
        peg._mesh.getWorldPosition(wp);
        allPegs.push({ x: wp.x, y: wp.y, z: wp.z, radius: peg._radius });
      }
    }

    // Resolve fan world centers — the fan group's local origin in the channelPiece is
    // (0, ~floor, 0) in cell-local frame, which transforms to the world cell center
    // (XZ) at the cell's mid Y after the outerGroup rotation.
    allFans.length = 0;
    for (const c of pathCells) {
      if (!c._fan) continue;
      const wp = new THREE.Vector3();
      c._fan.group.getWorldPosition(wp);
      // We also need the cell's outDir so the fan's local angle relates to world correctly.
      allFans.push({
        cell: c,
        fan: c._fan,
        centerX: wp.x,
        centerY: wp.y,
        centerZ: wp.z,
      });
    }

    // If the user has the glass case toggled on, rebuild it to fit the new course's
    // felt and tallest tower. We only rebuild if it already existed — otherwise users
    // who haven't pressed G never pay the build cost.
    if (_glassGroup) buildGlassCase();
  }},
];

// Synchronous build — used by NEW COURSE rebuilds. Identical behavior to the
// pre-staged monolithic function: all steps run back-to-back in one task.
function buildWorld() {
  for (const s of BUILD_STEPS) s.fn();
}

// Async build with progress reporting — used once at boot so the loading
// overlay can paint between steps. The callback receives (pct, label); label
// arrives BEFORE the step runs (telling the user what's about to happen), pct
// arrives AFTER it completes.
async function buildWorldAsync(onProgress) {
  const nextFrame = () => new Promise(r => requestAnimationFrame(r));
  for (const s of BUILD_STEPS) {
    if (onProgress) onProgress(null, s.label);
    await nextFrame();   // paint the label + current pct before the sync chunk
    s.fn();
    if (onProgress) onProgress(s.pct, null);
  }
  await nextFrame();     // paint the final 100% before the overlay fades
}

// =========================================================
// PHYSICS HELPERS
// =========================================================
// Scratch vectors reused across nearestOnTrack calls. Avoids ~6 Vector3 allocations
// per marble per physics step (5 marbles × 120Hz = ~3600 allocations/sec saved).
const _notAB = new THREE.Vector3();
const _notAP = new THREE.Vector3();
const _notProj = new THREE.Vector3();
const _notTan = new THREE.Vector3();
const _notRight = new THREE.Vector3();

function nearestOnTrack(pos, hintT) {
  let searchLo = 0;
  let searchHi = sampledPoints.length - 1;

  if (hintT !== undefined && hintT !== null) {
    const hintIdx = Math.round(hintT * SAMPLE_COUNT);
    // Window size 15: marble moves at most ~0.25 samples per physics step at race
    // speed, so 15 is amply safe for normal motion. Wide enough to catch big
    // collision impulses or frame-time hiccups without snapping back unnecessarily.
    // Was 50 — too generous given the marble's actual frame-to-frame motion.
    const windowSize = 15;
    searchLo = Math.max(0, hintIdx - windowSize);
    searchHi = Math.min(sampledPoints.length - 1, hintIdx + windowSize);
  }

  // First pass: find the closest discrete sample.
  let bestIdx = searchLo;
  let bestDist = Infinity;
  for (let i = searchLo; i <= searchHi; i++) {
    const d = sampledPoints[i].distanceToSquared(pos);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }

  // Second pass: refine by projecting onto the two segments adjacent to bestIdx.
  // This eliminates the visible "snap to sample" stutter that happens when a marble
  // crosses sample boundaries (very noticeable on tight curves).
  let bestT = bestIdx / SAMPLE_COUNT;
  let bestPoint = sampledPoints[bestIdx];
  let bestTangent = sampledTangents[bestIdx];
  let bestRight = sampledRights[bestIdx];
  let bestSegDist2 = bestDist;
  let bestSegIA = -1, bestSegIB = -1, bestSegU = 0;

  // Project onto segment from sample i to i+1 (or i-1 to i) and pick the best.
  // Uses scratch vectors instead of allocating per call.
  const trySegment = (iA, iB) => {
    if (iA < 0 || iB > sampledPoints.length - 1 || iA >= iB) return;
    const A = sampledPoints[iA];
    const B = sampledPoints[iB];
    _notAB.subVectors(B, A);
    _notAP.subVectors(pos, A);
    const len2 = _notAB.lengthSq();
    if (len2 < 1e-9) return;
    let u = _notAP.dot(_notAB) / len2;
    if (u < 0) u = 0;
    else if (u > 1) u = 1;
    _notProj.copy(A).addScaledVector(_notAB, u);
    const d2 = _notProj.distanceToSquared(pos);
    if (d2 < bestSegDist2) {
      bestSegDist2 = d2;
      bestSegIA = iA; bestSegIB = iB; bestSegU = u;
    }
  };
  trySegment(bestIdx, bestIdx + 1);
  trySegment(bestIdx - 1, bestIdx);

  // If a segment refinement won, compute its results NOW into scratch vectors. Since
  // the returned object holds references, we need stable owned vectors — allocate one
  // result point each call (single allocation instead of three).
  if (bestSegIA >= 0) {
    const A = sampledPoints[bestSegIA];
    const B = sampledPoints[bestSegIB];
    _notAB.subVectors(B, A);
    bestPoint = new THREE.Vector3().copy(A).addScaledVector(_notAB, bestSegU);
    // Interpolate tangent/right between samples.
    _notTan.copy(sampledTangents[bestSegIA]).lerp(sampledTangents[bestSegIB], bestSegU).normalize();
    _notRight.copy(sampledRights[bestSegIA]).lerp(sampledRights[bestSegIB], bestSegU).normalize();
    bestTangent = new THREE.Vector3().copy(_notTan);
    bestRight = new THREE.Vector3().copy(_notRight);
    bestT = (bestSegIA + bestSegU) / SAMPLE_COUNT;
  }

  return {
    point: bestPoint,
    tangent: bestTangent,
    right: bestRight,
    t: bestT,
    dist: Math.sqrt(bestSegDist2),
  };
}

// Marble-blast mode: player-controlled mode where one marble responds to WASD/
// arrow-key input + spacebar jump. Free physics — no curve projection. The marble
// has its own gravity, floor collision via downward raycast against actual track
// geometry, and wall collision via short horizontal raycasts. Player can drive
// off the track if they jump high enough.
const _mbInputKeys = { w: false, a: false, s: false, d: false, space: false };
let _mbPlayerMarble = null;  // designated player marble, picked when M is pressed

// Raycaster reused across physics frames (avoid allocating per-step).
const _mbRaycaster = new THREE.Raycaster();
// We want hits on the worldObjects, but we need the FLATTENED mesh list. Build it
// lazily when marble-blast mode engages.
let _mbCollidableMeshes = null;
function _collectMbCollidables() {
  _mbCollidableMeshes = [];
  for (const obj of worldObjects) {
    obj.traverse(node => {
      if (node.isMesh && node.geometry && node.userData.isMarble !== true) {
        _mbCollidableMeshes.push(node);
      }
    });
  }
}

// Scratch vectors for marble-blast physics — reused across frames.
const _mbDownRayOrigin = new THREE.Vector3();
const _mbHorizDir = new THREE.Vector3();
const _mbDownDir = new THREE.Vector3(0, -1, 0);

// Step the player marble's physics in free-physics mode. Replaces the curve-based
// integration entirely — no nearestOnTrack, no lateralOffset clamping. Just real
// 3D motion with raycast collisions.
function stepMarbleBlastPhysics(m, dt) {
  if (!_mbCollidableMeshes) _collectMbCollidables();

  // --- Input: world-space force from key state, basis = camera forward/right ---
  let fX = 0, fZ = 0;
  const dx = cameraTarget.x - camera.position.x;
  const dz = cameraTarget.z - camera.position.z;
  const dMag = Math.sqrt(dx * dx + dz * dz);
  if (dMag > 0.001) {
    const fwdX = dx / dMag;
    const fwdZ = dz / dMag;
    // Right vector: rotate forward 90° counter-clockwise in the XZ plane so that
    // pressing D / Right strafes to SCREEN right. For forward (0,+1) (camera
    // looking +Z) the right side is (-1,0). The mapping is (fwdX,fwdZ) → (-fwdZ, fwdX).
    const rightX = -fwdZ;
    const rightZ = fwdX;
    if (_mbInputKeys.w) { fX += fwdX; fZ += fwdZ; }
    if (_mbInputKeys.s) { fX -= fwdX; fZ -= fwdZ; }
    if (_mbInputKeys.d) { fX += rightX; fZ += rightZ; }
    if (_mbInputKeys.a) { fX -= rightX; fZ -= rightZ; }
  }
  const fMag = Math.sqrt(fX * fX + fZ * fZ);
  if (fMag > 0.001) {
    fX /= fMag; fZ /= fMag;
    const thrust = 35;  // free-physics moves more snappily than curve-constrained
    m.vel.x += fX * thrust * dt;
    m.vel.z += fZ * thrust * dt;
  }

  // --- Gravity ---
  // Use a slightly LIGHTER gravity than the race gravity (22) so jumps feel arcier
  // and the marble doesn't slam into the track instantly on the slightest ledge.
  m.vel.y -= 18 * dt;

  // --- Friction-ish damping on XZ velocity (so marble slows when not thrusting) ---
  // The race uses 0.992 multiplier per step — keep that here. Without input, marble
  // gently coasts to a stop on flat surfaces.
  m.vel.x *= 0.985;
  m.vel.z *= 0.985;

  // --- Integrate position ---
  m.pos.addScaledVector(m.vel, dt);

  // --- Floor collision via downward raycast ---
  // Cast a ray DOWN from the marble's center. If a hit is within `marbleRadius`,
  // we're touching the ground — clamp y and zero vertical velocity.
  _mbDownRayOrigin.copy(m.pos);
  _mbDownRayOrigin.y += 0.5;  // start ray a bit above center so we don't miss
  _mbRaycaster.set(_mbDownRayOrigin, _mbDownDir);
  _mbRaycaster.far = 0.5 + CONFIG.marbleRadius + 1.0;  // a bit beyond the marble's bottom
  const downHits = _mbRaycaster.intersectObjects(_mbCollidableMeshes, false);
  let grounded = false;
  if (downHits.length > 0) {
    const hit = downHits[0];
    const floorY = hit.point.y;
    const marbleBottom = m.pos.y - CONFIG.marbleRadius;
    if (marbleBottom < floorY) {
      // Push marble up to rest ON the floor
      m.pos.y = floorY + CONFIG.marbleRadius;
      if (m.vel.y < 0) m.vel.y = 0;
      grounded = true;
    } else if (Math.abs(marbleBottom - floorY) < 0.08) {
      grounded = true;  // touching but not penetrating
    }
  }
  m._mbGrounded = grounded;

  // --- Wall collision via horizontal raycasts ---
  // Cast 4 rays horizontally (±X, ±Z) up to marbleRadius + a little. If we hit
  // something close, push the marble back and zero the velocity component along
  // the wall normal (so we don't slide into the wall).
  const wallProbeDist = CONFIG.marbleRadius + 0.15;
  // Use 8 directions to catch corners better.
  const probeDirs = [
    [ 1, 0], [-1, 0], [ 0, 1], [ 0,-1],
    [ 0.707, 0.707], [-0.707, 0.707], [ 0.707,-0.707], [-0.707,-0.707],
  ];
  for (const [px, pz] of probeDirs) {
    _mbHorizDir.set(px, 0, pz);
    _mbRaycaster.set(m.pos, _mbHorizDir);
    _mbRaycaster.far = wallProbeDist;
    const hits = _mbRaycaster.intersectObjects(_mbCollidableMeshes, false);
    if (hits.length > 0) {
      const hit = hits[0];
      // Push marble back along the inverse direction.
      const overlap = wallProbeDist - hit.distance;
      if (overlap > 0) {
        m.pos.x -= px * overlap;
        m.pos.z -= pz * overlap;
        // Zero velocity component along the probe direction (so we stop pushing
        // into the wall).
        const vDotN = m.vel.x * px + m.vel.z * pz;
        if (vDotN > 0) {
          m.vel.x -= px * vDotN * 1.2;  // bounce slightly (negative restitution)
          m.vel.z -= pz * vDotN * 1.2;
        }
      }
    }
  }

  // --- Update progress for camera + leaderboard tracking ---
  // We still want to know roughly where the marble is along the curve so the
  // leaderboard percentage updates as the player drives. Use nearestOnTrack but
  // discard the projection — only steal the .t value.
  const near = nearestOnTrack(m.pos, m.progress);
  m.progress = near.t;

  // --- Jump ---
  if (_mbInputKeys.space) {
    if (grounded && m.vel.y < 1.0) {
      m.vel.y = 10;
    }
    _mbInputKeys.space = false;
  }

  // --- Update mesh ---
  m.mesh.position.copy(m.pos);
}

const WORLD_UP = new THREE.Vector3(0, 1, 0);

// Scratch vectors reused across stepPhysics calls. Avoids ~3 Vector3 allocations
// per marble per physics step (~1800 allocations/sec saved at 5 marbles × 120Hz).
const _spRel = new THREE.Vector3();
const _spFloorPoint = new THREE.Vector3();
const _spRightScaled = new THREE.Vector3();
// Shared scratch for makeWallNormal. Each marble's wall-collision pass uses this
// once per right-or-left wall hit — non-overlapping use makes one buffer fine.
const _spWallNormal = new THREE.Vector3();
// Scratch vectors for marble-marble collision (single global pair loop, no overlap).
const _mmDiff = new THREE.Vector3();
const _mmN = new THREE.Vector3();
const _mmRel = new THREE.Vector3();

// =========================================================
// PHYSICS STEP
// =========================================================
function stepPhysics(dt) {
  // Deterministic sim clock — dt is always FIXED_DT here, so simTime advances
  // identically on every client replaying the same race.
  simTime += dt;
  // Fan blades are physics objects (marbles bounce off them), so their phase
  // advances here at the fixed timestep — NOT in the render loop.
  for (const f of allFans) {
    f.fan.angle += f.fan.angularVel * dt;
  }
  for (const m of marbles) {
    if (m.finished || m.onPodium) continue;
    // In marble-blast mode, only the player marble moves; other marbles are
    // frozen in place. The player marble uses a totally separate free-physics
    // path (raycast collisions, no curve projection) — branch out early.
    if (STATE.marbleBlast) {
      if (m !== _mbPlayerMarble) continue;
      stepMarbleBlastPhysics(m, dt);
      continue;
    }

    m.vel.y -= CONFIG.gravity * dt;
    m.pos.addScaledVector(m.vel, dt);

    const near = nearestOnTrack(m.pos, m.progress);
    m.progress = near.t;

    const tangent = near.tangent;
    const right = near.right;

    _spRel.subVectors(m.pos, near.point);
    const lateralOffset = _spRel.dot(right);

    _spRightScaled.copy(right).multiplyScalar(lateralOffset);
    _spFloorPoint.copy(near.point).add(_spRightScaled);
    let floorY = _spFloorPoint.y;

    // StepRamp override: the catmull-rom curve smoothly slopes Y between the
    // upper-floor and lower-floor keypoints, but the actual VISUAL floor is a hard
    // ledge — flat upper, then a sudden drop, then flat lower. Without this override,
    // the floor projection would lift the marble onto the smooth slope (looks like
    // it's floating across an invisible ramp). Force floorY to upper or lower based
    // on which side of the ledge the marble is on.
    {
      const _cellAtMarble = cellByXZAt(m.pos.x, m.pos.y, m.pos.z);
      if (_cellAtMarble && _cellAtMarble.type === 'stepRamp') {
        const od = DIRS[_cellAtMarble.outDir];
        const cellCx = _cellAtMarble.gx * CONFIG.cellSize;
        const cellCz = _cellAtMarble.gz * CONFIG.cellSize;
        const localXForFloor = od.dx * (m.pos.x - cellCx) + od.dz * (m.pos.z - cellCz);
        // localX < 0 → upper floor at entryY; localX >= 0 → lower floor at exitY.
        floorY = (localXForFloor < 0) ? _cellAtMarble.entryY : _cellAtMarble.exitY;
      }
    }

    // Visual floor top sits 0.08 units above the curve centerline (the floor mesh is
    // 0.08 thick, placed atop the cell's block body which has its top at the
    // curve Y). Without this offset, marbles would rest with their bottom at the
    // BLOCK BODY top — 0.08 BELOW the visible floor top — making them look sunk
    // into the floor (and the shadow lands on the visible floor surface,
    // disconnected from the marble's bottom). Lifting the rest target by the
    // floor thickness places the marble's bottom exactly on the visible floor.
    const FLOOR_THICKNESS = 0.08;
    const targetY = floorY + CONFIG.marbleRadius + FLOOR_THICKNESS;

    // Floor collision
    if (m.pos.y < targetY) {
      // How DEEP did the marble penetrate into the floor before we clamp it? On a
      // rolling slope, marbles penetrate only a tiny amount (gravity barely beats
      // the floor projection between frames). On an actual IMPACT — marble falling
      // from above onto a surface — the penetration is significant.
      const penetration = targetY - m.pos.y;
      m.pos.y = targetY;
      if (m.vel.y < 0) {
        const verticalLost = -m.vel.y;
        m.vel.y = 0;
        const slope = -tangent.y;
        if (slope > 0) {
          // On a downslope, convert some of the absorbed vertical speed into
          // forward speed along the tangent. Models the marble's downhill momentum.
          m.vel.addScaledVector(tangent, verticalLost * 0.35);
        }
        // Floor bounce: only for IMPACTS — when the marble was actually airborne
        // and hit the floor (large penetration), not just rolling along the floor
        // (tiny penetration). This produces a stutter-hop when:
        //   • transitioning from a ramp onto a flat tile (marble's downward
        //     momentum exceeds the new flat tile's slope-induced vy)
        //   • dropping off a ledge or step
        //   • landing after a jump
        // but NOT when continuously rolling down a slope (where penetration per
        // frame is tiny).
        if (penetration > 0.05 && verticalLost > 1.0) {
          const bounce = Math.min(2.5, (verticalLost - 0.5) * 0.8);
          m.vel.y = bounce;
          // Floor-impact thud — deepest profile, longest decay (the tile panel
          // itself resonates on a full drop, unlike the edge-on wall hits).
          const impactStrength = Math.min(1.0, verticalLost / 5);
          maybeClack(m, impactStrength, SURFACES.floor);
        }
      }
    }

    // Step-ramp ledge behavior. Three things happen as the marble crosses the ledge:
    //   1) Forward KICK: a small forward (+tangent) velocity boost when it first
    //      crosses from upper to lower section, so the marble projects outward
    //      rather than just dropping straight down off the edge.
    //   2) FALL ASSIST: accelerate downward velocity to a terminal so the drop is
    //      quick and crisp (otherwise gravity from rest looks like coasting).
    //   3) LAND BOUNCE: when the marble hits the lower floor with significant
    //      downward speed, give it an upward bounce proportional to the impact.
    {
      const _cellNow = cellByXZAt(m.pos.x, m.pos.y, m.pos.z);
      if (_cellNow && _cellNow.type === 'stepRamp') {
        const od = DIRS[_cellNow.outDir];
        const cellCx = _cellNow.gx * CONFIG.cellSize;
        const cellCz = _cellNow.gz * CONFIG.cellSize;
        const localX = od.dx * (m.pos.x - cellCx) + od.dz * (m.pos.z - cellCz);
        const lowerFloorY = _cellNow.exitY + CONFIG.marbleRadius;

        // (1) Forward kick.
        const upperFloorY = _cellNow.entryY + CONFIG.marbleRadius;
        if (localX > 0 &&
            m.pos.y > upperFloorY - 0.15 &&
            m.stepRampBoostedCellIdx !== _cellNow.index) {
          const forwardBoost = 2.4;
          const upBoost      = 1.0;
          m.vel.addScaledVector(tangent, forwardBoost);
          m.vel.y += upBoost;
          m.stepRampBoostedCellIdx = _cellNow.index;
          // Stash the cell's exitY so the land-bounce detector can use it AFTER
          // the marble has moved into the next grid cell (cellByXZAt won't find
          // the stepRamp anymore once we cross the boundary).
          m.stepRampExitY = _cellNow.exitY;
        }

        // (2) Fall assist.
        if (localX > 0 && m.pos.y > lowerFloorY + 0.05) {
          const targetFallV = -7.0;
          if (m.vel.y > targetFallV) {
            m.vel.y -= CONFIG.gravity * 4 * dt;
            if (m.vel.y < targetFallV) m.vel.y = targetFallV;
          }
        }
      }

      // (3) Land bounce — runs INDEPENDENTLY of cellByXZAt because the marble's
      // forward boost can carry it into the next grid cell mid-air, where
      // _cellNow.type would no longer be 'stepRamp'. Instead we trigger off the
      // stored boost flag: if the marble was boosted off a stepRamp ledge AND it
      // has now reached the lower-floor Y of that ledge, bounce it. Resets when
      // the marble's progress moves clearly past the stepRamp cell (next-next
      // cell), allowing future stepRamps to fire.
      if (m.stepRampBoostedCellIdx >= 0 &&
          !m.stepRampBouncedThisCell &&
          m.stepRampExitY !== undefined) {
        // Include FLOOR_THICKNESS in the target since the floor clamp lifts the
        // marble's rest position by the floor mesh thickness. Without this, the
        // marble sits 0.08 ABOVE this target and the bounce never fires on
        // impact — it fires later when the marble has rolled forward enough
        // that its Y drifts below the threshold (visible as a delayed jump
        // a second or so after landing).
        const targetLandY = m.stepRampExitY + CONFIG.marbleRadius + 0.08;
        // Marble has REACHED the lower floor (small tolerance).
        if (m.pos.y <= targetLandY + 0.05 && m.vel.y < 1.0) {
          // Apply a strong upward bounce after landing off the cliff. ~5 m/s gives
          // a peak hop of ~0.57 units (about 2 marble diameters) — clearly reads
          // as a real impact bounce.
          m.vel.y = 5.0;
          m.stepRampBouncedThisCell = true;
        }
      }

      // Reset trackers once the marble is well past the stepRamp (e.g. its progress
      // is several cells ahead of the boosted one). Simplest proxy: when cellByXZAt
      // says we're NOT on the boosted stepRamp AND the marble has already bounced.
      // (Without this, the flag would stay set and prevent the next stepRamp from
      // triggering.)
      if (m.stepRampBouncedThisCell &&
          (!_cellNow || _cellNow.index !== m.stepRampBoostedCellIdx)) {
        m.stepRampBoostedCellIdx = -1;
        m.stepRampBouncedThisCell = false;
        m.stepRampExitY = undefined;
      }
    }

    // Update prevCellType for cell-transition detection used by other logic. (We
    // used to fire a "ramp exit bounce" here, but regular smooth ramps shouldn't
    // produce a hop — only the stepRamp cliff does, handled in its own block above.)
    {
      const cellHere = cellByXZAt(m.pos.x, m.pos.y, m.pos.z);
      const curType = cellHere ? cellHere.type : null;
      if (curType) m.prevCellType = curType;
    }

    // Wall collisions — shape-aware. For shaped tiles (hourglass/zigzag/pinchPeg) the
    // wall positions vary along the cell. We re-use the curve-relative `lateralOffset`
    // and `right` axis: for straights (including shaped tiles, which are still straight
    // in plan view) `right` is perpendicular to the direction of travel and matches the
    // cell-local Z axis, so they're interchangeable. Only the bounds change.
    {
      // Tiny random lateral jitter so marbles don't lock onto a wall and slide along
      // it indefinitely. Scaled by the marble's forward speed so stationary marbles
      // (at the start, before release) aren't affected and fast-moving marbles get
      // more chaos — feels natural, not "drifty."
      const forwardSpeed = Math.abs(m.vel.dot(tangent));
      if (forwardSpeed > 0.3) {
        const jitterMag = 0.18 * forwardSpeed * dt;  // very small per-step
        m.vel.addScaledVector(right, (raceRng() - 0.5) * jitterMag * 2);
      }

      const cs = CONFIG.cellSize;
      const cellHere = cellByXZAt(m.pos.x, m.pos.y, m.pos.z);

      // Default bounds (symmetric channel)
      let leftBound  = -CONFIG.trackWidth / 2 + CONFIG.marbleRadius;
      let rightBound =  CONFIG.trackWidth / 2 - CONFIG.marbleRadius;

      if (cellHere && cellHere.wallShape) {
        // Compute marble's cell-local x (along outDir). Cell-local frame is defined so
        // that a mesh placed at local (X, Y, Z) lives at world (cellCx + R_y(dirAngle) · (X,0,Z)).
        // R_y(dirAngle(outDir)) takes (1,0,0) to (od.dx, 0, od.dz). The inverse projection is:
        //   localX = od.dx * wx + od.dz * wz   (works for all 4 cardinal outDir values)
        const cellCx = cellHere.gx * cs;
        const cellCz = cellHere.gz * cs;
        const wx = m.pos.x - cellCx;
        const wz = m.pos.z - cellCz;
        const od = DIRS[cellHere.outDir];
        const localX = od.dx * wx + od.dz * wz;

        const bounds = wallBoundsAt(cellHere.wallShape, localX);
        // Bounds are in cell-local Z, which equals lateralOffset (along near.right) for
        // a straight cell (curve goes through cell center, parallel to outDir, so near.right
        // == cell-local +Z axis in world).
        leftBound  = bounds.leftZ  + CONFIG.marbleRadius;
        rightBound = bounds.rightZ - CONFIG.marbleRadius;
      }

      // Compute the wall's local SURFACE NORMAL on shaped tiles by finite-differencing
      // wallBoundsAt around the contact point. The normal direction (rather than just
      // the lateral axis) lets the marble bounce off slanted surfaces — like the bumps
      // on a notched or zigzag wall — with a realistic component along the path,
      // instead of just shifting sideways and continuing in the original direction.
      // For un-shaped (default-flat) cells the normal is purely lateral, so this code
      // collapses to the original behavior.
      let leftSlope = 0, rightSlope = 0;
      if (cellHere && cellHere.wallShape) {
        // Numerical derivative of wallBoundsAt with respect to localX.
        const ds = 0.05;
        const cellCx2 = cellHere.gx * cs;
        const cellCz2 = cellHere.gz * cs;
        const od2 = DIRS[cellHere.outDir];
        const wx2 = m.pos.x - cellCx2;
        const wz2 = m.pos.z - cellCz2;
        const localX2 = od2.dx * wx2 + od2.dz * wz2;
        const bUp = wallBoundsAt(cellHere.wallShape, localX2 + ds);
        const bDn = wallBoundsAt(cellHere.wallShape, localX2 - ds);
        leftSlope  = (bUp.leftZ  - bDn.leftZ)  / (2 * ds);
        rightSlope = (bUp.rightZ - bDn.rightZ) / (2 * ds);
      }

      // The channel's forward direction is the curve tangent `tangent`. Its lateral
      // axis is `right`. Build a world-space normal from a (forward, lateral) pair.
      // For the right wall, inward normal in (localX, Z) space is (rightSlope, -1)
      // normalized — we point it INTO the channel (toward lateral=-) and pre-rotate
      // it into world space by using `tangent` and `right` as the basis.
      const _wallNormal = _spWallNormal;
      function makeWallNormal(slope, sideSign) {
        // sideSign: +1 for right wall (marble laterally>0), -1 for left wall.
        // In channel-local (forward, lateral) coords, the inward normal is
        // (slope, -sideSign). Normalize.
        const len = Math.sqrt(slope * slope + 1);
        const fwdComponent = slope / len;
        const latComponent = -sideSign / len;
        // Convert to world-space vector. Writes into shared scratch _wallNormal —
        // single Vector3 reused across both right- and left-wall paths.
        _wallNormal.copy(tangent).multiplyScalar(fwdComponent)
          .addScaledVector(right, latComponent);
        return _wallNormal;
      }

      if (lateralOffset > rightBound) {
        const overshoot = lateralOffset - rightBound;
        // Move marble inward along the inward normal (not just lateral) so it ends up
        // FLUSH AGAINST the slanted wall.
        const normal = makeWallNormal(rightSlope, +1);
        m.pos.addScaledVector(normal, overshoot);
        // Reflect velocity along this normal.
        const velAlongNormal = m.vel.dot(normal);
        if (velAlongNormal < 0) {  // moving INTO the wall (against the inward normal)
          // Wooden walls absorb — restitution from the wood surface profile
          // (0.55) instead of the old uniform 0.7. Glass-on-wood hits deaden;
          // the wall flexes and the marble loses real energy.
          m.vel.addScaledVector(normal, -velAlongNormal * (1 + SURFACES.wood.restitution));
          // Random tangential perturbation so repeated bounces don't trace identical
          // arcs. No upward kick — that was causing visible random hops on straight
          // tiles when the marble grazed multiple wall bumps.
          const impactStrength = Math.min(1.0, -velAlongNormal / 4);
          const tangentialNudge = (raceRng() - 0.5) * 0.5 * impactStrength;
          m.vel.addScaledVector(tangent, tangentialNudge);
          // Wall clack — deep wood thunk, only when there's real impact (skip grazes).
          if (impactStrength > 0.2) maybeClack(m, impactStrength, SURFACES.wood);
        }
      } else if (lateralOffset < leftBound) {
        const overshoot = leftBound - lateralOffset;
        const normal = makeWallNormal(leftSlope, -1);
        m.pos.addScaledVector(normal, overshoot);
        const velAlongNormal = m.vel.dot(normal);
        if (velAlongNormal < 0) {
          m.vel.addScaledVector(normal, -velAlongNormal * (1 + SURFACES.wood.restitution));
          const impactStrength = Math.min(1.0, -velAlongNormal / 4);
          const tangentialNudge = (raceRng() - 0.5) * 0.5 * impactStrength;
          m.vel.addScaledVector(tangent, tangentialNudge);
          if (impactStrength > 0.2) maybeClack(m, impactStrength, SURFACES.wood);
        }
      }
    }

    // Peg collisions — pinball bumpers. Pegs are vertical cylinders; check XZ distance.
    // Only consider pegs near the marble's current Y to avoid distant-peg false positives.
    for (let p = 0; p < allPegs.length; p++) {
      const peg = allPegs[p];
      // Quick Y range cull: marble must be within the peg's vertical extent (wallHeight tall)
      if (Math.abs(m.pos.y - peg.y) > CONFIG.wallHeight * 0.8) continue;
      const dx = m.pos.x - peg.x;
      const dz = m.pos.z - peg.z;
      const distSq = dx*dx + dz*dz;
      const minDist = peg.radius + CONFIG.marbleRadius;
      if (distSq < minDist * minDist && distSq > 1e-6) {
        const dist = Math.sqrt(distSq);
        // Push marble out radially
        const nx = dx / dist, nz = dz / dist;
        const overshoot = minDist - dist;
        m.pos.x += nx * overshoot;
        m.pos.z += nz * overshoot;
        // Reflect the marble's XZ velocity component along (nx, nz) with bumper bounce
        const vDotN = m.vel.x * nx + m.vel.z * nz;
        if (vDotN < 0) {
          // Pegs are hard dowel "bumpers" — springy (restitution from the peg
          // surface profile, 0.85, much livelier than the soft walls).
          const bounce = 1 + SURFACES.peg.restitution;
          m.vel.x -= nx * vDotN * bounce;
          m.vel.z -= nz * vDotN * bounce;
          // Peg knock — brighter, harder sound than the wall thunk (small stiff
          // dowel = higher resonant modes).
          const impactStrength = Math.min(1.0, -vDotN / 3);
          if (impactStrength > 0.15) maybeClack(m, impactStrength * 1.1, SURFACES.peg);
        }
      }
    }

    // Fan-blade collisions — each fan has 4 thin paddles rotating around a vertical
    // axis. Test the marble against each blade as a thin rotated box (or equivalently,
    // a line segment in XZ with thickness bladeT). On contact, push the marble out
    // perpendicular to the blade and add a tangential "kick" from the blade's motion.
    for (let fi = 0; fi < allFans.length; fi++) {
      const fc = allFans[fi];
      // Quick Y range cull
      if (Math.abs(m.pos.y - fc.centerY) > CONFIG.wallHeight) continue;
      const dx = m.pos.x - fc.centerX;
      const dz = m.pos.z - fc.centerZ;
      const r = Math.sqrt(dx*dx + dz*dz);
      const reach = fc.fan.bladeReach;
      // Quick radial cull: must be within blade sweep + marble radius
      if (r > reach + CONFIG.marbleRadius + 0.05) continue;

      // Marble angle from fan center (in the convention θ=atan2(dx,dz) so that
      // local +X = world +X when outDir=0, matching dirAngle math).
      const phi = Math.atan2(dx, dz);
      // Each blade b is at world angle: dirAngle(outDir) + fan.angle + b*π/2.
      const baseAngle = dirAngle(fc.cell.outDir) + fc.fan.angle;
      const halfT = fc.fan.bladeT / 2;
      const minNorm = halfT + CONFIG.marbleRadius;
      for (let b = 0; b < 4; b++) {
        const bladeAngle = baseAngle + b * (Math.PI / 2);
        // Angular difference between marble and blade direction, normalized to [-π, π]
        let dphi = phi - bladeAngle;
        dphi = ((dphi % (2 * Math.PI)) + 3 * Math.PI) % (2 * Math.PI) - Math.PI;
        // Marble's "along blade" coord (tangent) and "perpendicular" coord
        const along = r * Math.cos(dphi);
        const perp  = r * Math.sin(dphi);
        // Blade occupies along ∈ [0, reach], perp ∈ [-halfT, halfT]
        if (along < -CONFIG.marbleRadius || along > reach + CONFIG.marbleRadius) continue;
        if (Math.abs(perp) > minNorm) continue;
        // Collision. Push the marble perpendicular to the blade.
        const overshoot = minNorm - Math.abs(perp);
        const signP = perp >= 0 ? 1 : -1;
        // Perpendicular unit vector in world XZ (to the blade direction): rotate
        // (sin(bladeAngle), cos(bladeAngle)) by +90° → (cos(bladeAngle), -sin(bladeAngle)).
        const perpX = Math.cos(bladeAngle);
        const perpZ = -Math.sin(bladeAngle);
        m.pos.x += perpX * signP * overshoot;
        m.pos.z += perpZ * signP * overshoot;
        // Reflect velocity component along the perpendicular axis
        const vPerp = m.vel.x * perpX * signP + m.vel.z * perpZ * signP;
        if (vPerp < 0) {
          const bounce = 1 + 0.6;
          m.vel.x -= perpX * signP * vPerp * bounce;
          m.vel.z -= perpZ * signP * vPerp * bounce;
        }
        // Add a tangential kick: the blade is moving at angularVel * along in the
        // tangential direction. Tangential unit vector (along blade's motion) =
        // perpendicular rotated 90° from radial. Use the same perp basis.
        const kick = fc.fan.angularVel * Math.max(0.2, along) * 0.6;
        m.vel.x += perpX * signP * kick * 0.5;  // mostly in the perp direction
        m.vel.z += perpZ * signP * kick * 0.5;
        // Only handle one blade per frame per marble (a blade collision is enough)
        break;
      }
    }

    // Start gate
    if (!STATE.gateOpen && m.progress < GATE_T + 0.005) {
      const gatePoint = curve.getPointAt(GATE_T);
      const gateTangent = curve.getTangentAt(GATE_T);
      const forwardDist = m.pos.clone().sub(gatePoint).dot(gateTangent);
      if (forwardDist > -CONFIG.marbleRadius) {
        const overshoot = forwardDist + CONFIG.marbleRadius;
        m.pos.addScaledVector(gateTangent, -overshoot);
        const forwardVel = m.vel.dot(gateTangent);
        if (forwardVel > 0) {
          m.vel.addScaledVector(gateTangent, -forwardVel * (1 + 0.3));
        }
      }
    }

    // Anti-stuck nudge
    if (STATE.gateOpen && m.progress > GATE_T + 0.005 && m.progress < 0.99) {
      if (m.vel.length() < 0.6) {
        m.stuckTime += dt;
        if (m.stuckTime > 1.5) {
          m.vel.addScaledVector(tangent, 3.0);
          m.stuckTime = 0;
        }
      } else {
        m.stuckTime = 0;
      }
    }

    // Friction
    m.vel.multiplyScalar(CONFIG.friction);

    // Speed cap
    if (m.vel.length() > CONFIG.maxSpeed) m.vel.setLength(CONFIG.maxSpeed);

    // Rolling rotation
    const speed = m.vel.length();
    if (speed > 0.01) {
      const rotAxis = new THREE.Vector3().crossVectors(WORLD_UP, m.vel).normalize();
      const angle = (speed * dt) / CONFIG.marbleRadius;
      m.mesh.rotateOnWorldAxis(rotAxis, angle);
    }

    m.mesh.position.copy(m.pos);

    if (m.progress >= 0.99 && !m.finished) {
      m.finished = true;
      // Sim-seconds, not wall clock — identical across clients for the same
      // race seed, and directly usable as an official race time / record.
      m.finishTime = simTime;
      finishOrder.push(m);
      spawnConfettiBurst();
      const rank = finishOrder.length; // 1-based: 1 = first finisher
      if (rank === 1) {
        // First crossing reveals the (empty) podium, and we hand control of the camera
        // over to the podium-framing logic (disengaging the action cam if it was on).
        revealPodium();
        if (STATE.actionCam) {
          STATE.actionCam = false;
          actionCamBtn.classList.remove('active');
        }
        if (STATE.chaseCam) {
          STATE.chaseCam = false;
        }
        if (STATE.topCam) {
          STATE.topCam = false;
          actionCamBtn.classList.remove('active');
          camera.up.set(0, 1, 0);
        }
        // Compute the yaw angle that places the camera in front of the podium (looking
        // at its label-bearing face). The podium's labels face in outDir, so to view
        // them head-on we want camera offset from target along outDir → that means
        // yaw = atan2(outDir.dx, outDir.dz).
        const finishCell = pathCells[pathCells.length - 1];
        const od = DIRS[finishCell.outDir];
        const yawRad = Math.atan2(od.dx, od.dz);
        targetCamYaw = yawRad * 180 / Math.PI;
      }
      if (rank <= 3) {
        // Top-3 marbles pop onto their podium step with a quick animation.
        placeOnPodium(m, rank);
        // Once the top 3 are settled, the race is effectively over — reveal the
        // re-race button so the user can replay the same track.
        if (rank === 3) {
          // Top 3 are settled — the race is effectively over. Morph the RACE
          // button into Re-Race mode (re-shows it with the red accent and
          // changed label).
          startBtn.classList.add('rerace');
          startBtn.classList.remove('hidden');
          const lbl = startBtn.querySelector('span');
          if (lbl) lbl.textContent = 'RE-RACE';
        }
      } else {
        // Losers vanish right as they cross.
        m.mesh.visible = false;
      }
    }
  }

  // Marble-marble collisions: softer-than-1.0 position correction (to avoid the "pop"
  // when many marbles funnel into a narrow channel together) plus a livelier elastic
  // bounce so marbles actually RICOCHET off each other rather than just gently shuffle.
  // The position-correction softness still smooths the "5 marbles into a narrow gate"
  // moment, while higher restitution gives visible bounce energy.
  const positionCorrectFactor = 0.5;
  // Glass-on-glass is highly elastic — real marbles rebound with very little
  // energy loss (that's why marble games WORK). Pulled from the marble surface
  // profile (0.84, up from the old 0.7 which made marble contact feel mushy).
  const softMarbleRestitution = SURFACES.marble.restitution;
  for (let i = 0; i < marbles.length; i++) {
    for (let j = i + 1; j < marbles.length; j++) {
      const a = marbles[i], b = marbles[j];
      if (a.finished || b.finished) continue;
      _mmDiff.subVectors(b.pos, a.pos);
      const distSq = _mmDiff.lengthSq();
      const minDist = CONFIG.marbleRadius * 2;
      const minDistSq = minDist * minDist;
      if (distSq < minDistSq && distSq > 1e-8) {
        const dist = Math.sqrt(distSq);
        _mmN.copy(_mmDiff).multiplyScalar(1 / dist);
        const overlap = (minDist - dist) * positionCorrectFactor;
        a.pos.addScaledVector(_mmN, -overlap / 2);
        b.pos.addScaledVector(_mmN, overlap / 2);
        _mmRel.subVectors(b.vel, a.vel);
        const velAlongN = _mmRel.dot(_mmN);
        if (velAlongN < 0) {
          const impulse = -(1 + softMarbleRestitution) * velAlongN / 2;
          a.vel.addScaledVector(_mmN, -impulse);
          b.vel.addScaledVector(_mmN, impulse);
          // Marble-marble click — short bright glass "tick", quite different
          // from the wood thunks. Both marbles get the cooldown bump; only one
          // plays (otherwise simultaneous neighbor hits double up loudly).
          const impactStrength = Math.min(1.0, -velAlongN / 3);
          if (impactStrength > 0.15) maybeClack(a, impactStrength * 0.9, SURFACES.marble);
        }
      }
    }
  }
}

// =========================================================
// PODIUM
// =========================================================
let PODIUM_POS = new THREE.Vector3();
// World Y of the table top. Set by buildBlocks() each rebuild; used by buildPodium
// so it can drop cylinder legs from the podium base down to the table.
let _courseBaseY = 0;
// Bounds of the felt mat and the highest point of the course — populated by
// buildBlocks. Used by the glass display-case to size and position itself so it
// meets the felt edge and clears all the towers underneath.
let _feltBounds = null;        // { minX, maxX, minZ, maxZ, topY }
let _tableBounds = null;       // { minX, maxX, minZ, maxZ, topY } — base for collapse
let _highestCourseY = 0;
// Auto-fit zoom + target for the WHOLE course — populated by buildWorld's
// setIsoCamera step. Split-screen's overview panel uses these to always render
// the full course, regardless of where the user has dragged/zoomed the main cam.
let _autoFitZoom = 1.0;
let _autoFitTarget = new THREE.Vector3();
let podiumGroup = null;

function buildPodium() {
  // Anchor the podium just past the finish line, at the same elevation, facing back
  // toward the track so the #1 step is the one marbles arrive at first.
  const finishCell = pathCells[pathCells.length - 1];
  const finishExit = edgePoint(finishCell.gx, finishCell.gy, finishCell.gz, finishCell.outDir);
  finishExit.y = finishCell.exitY;
  const dirVec = DIRS[finishCell.outDir];
  const horizTangent = new THREE.Vector3(dirVec.dx, 0, dirVec.dz).normalize();

  // Position: 4 units past the finish line in the outDir direction, at the same height.
  PODIUM_POS = finishExit.clone().addScaledVector(horizTangent, 4.0);

  podiumGroup = new THREE.Group();
  podiumGroup.position.copy(PODIUM_POS);
  podiumGroup.visible = false;

  // Orient: rotate ONLY around Y so the podium stays upright. The labels live on the
  // local +Z face of each step; we want that face to point AWAY from the finish line
  // (in outDir direction), so the labels are visible from beyond the course.
  // Rotation R_y(dirAngle(d)) takes local +X to direction d, hence local +Z to d+1.
  // So we pick d = outDir - 1 (mod 4) so that local +Z → outDir.
  podiumGroup.rotation.y = dirAngle((finishCell.outDir + 3) % 4);

  // Three painted wooden block steps
  const stepData = [
    { rank: 1, x:  0,   h: 2.0, paint: 0xf0ad4e, label: '1' },
    { rank: 2, x: -2.5, h: 1.3, paint: 0xb8b8b8, label: '2' },
    { rank: 3, x:  2.5, h: 0.8, paint: 0xa9714b, label: '3' },
  ];

  for (const s of stepData) {
    // Wooden block base
    const stepGeo = new THREE.BoxGeometry(2.2, s.h, 2.2);
    const stepMat = makeWoodMaterial(WOOD_COLORS.medium);
    const step = new THREE.Mesh(stepGeo, stepMat);
    step.position.set(s.x, s.h / 2, 0);
    step.castShadow = true;
    step.receiveShadow = true;
    podiumGroup.add(step);

    // Painted top trim
    const topGeo = new THREE.BoxGeometry(2.25, 0.1, 2.25);
    const topMat = new THREE.MeshStandardMaterial({ color: s.paint, roughness: 0.5 });
    const top = new THREE.Mesh(topGeo, topMat);
    top.position.set(s.x, s.h + 0.05, 0);
    top.receiveShadow = true;
    podiumGroup.add(top);

    // Rank number
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 256, 256);
    ctx.fillStyle = '#3a2817';
    ctx.font = 'bold 200px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.label, 128, 138);
    const tex = new THREE.CanvasTexture(canvas);
    const labelMat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true
    });
    const labelGeo = new THREE.PlaneGeometry(1.2, 1.2);
    const label = new THREE.Mesh(labelGeo, labelMat);
    label.position.set(s.x, s.h / 2, 1.12);
    podiumGroup.add(label);
  }

  // Base platform — a wooden tray
  const baseGeo = new THREE.BoxGeometry(9, 0.3, 3);
  const baseMat = makeWoodMaterial(WOOD_COLORS.dark);
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = -0.15;
  base.receiveShadow = true;
  podiumGroup.add(base);

  // ---- Cylinder support legs from the podium base down to the table ----
  // The podium floats high in the air at the finish elevation; without legs it looks
  // unsupported. We drop 4 walnut cylinder legs from the corners of the base down
  // to the world-Y of the table (`_courseBaseY`).
  const legBottomYLocal = _courseBaseY - PODIUM_POS.y;   // local Y of table top
  const legTopYLocal    = -0.3;                          // bottom of base tray (local)
  const legHeight = legTopYLocal - legBottomYLocal;
  if (legHeight > 0.2) {  // skip if podium happens to sit right on the table
    const legGeo = new THREE.CylinderGeometry(0.18, 0.20, legHeight, 12);
    const legMat = makeWoodMaterial(WOOD_COLORS.veryDark, { roughness: 0.6 });
    // 4 corners of the base tray (the tray is 9 wide × 3 deep). Legs are inset
    // more on the front (-Z, where marbles arrive) than the back so the visible
    // silhouette from the marble's approach reads as a stable platform — the
    // front legs were previously poking visibly off the edge at sideways angles.
    const legInsetSide  = 0.8;   // X (sides) — bumped from 0.4
    const legInsetFront = 1.0;   // Z (front/back) — bumped from 0.4
    const legX = 9/2 - legInsetSide;
    const legZ = 3/2 - legInsetFront;
    for (const sx of [-1, 1]) {
      for (const sz of [-1, 1]) {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(sx * legX, legBottomYLocal + legHeight / 2, sz * legZ);
        leg.castShadow = true;
        leg.receiveShadow = true;
        podiumGroup.add(leg);
      }
    }
  }

  addToWorld(podiumGroup);
}

// =========================================================
// FLAGS — Waving decorative flags at random tile corners
// =========================================================
// Each flag is a segmented PlaneGeometry attached to a thin pole, planted at a corner
// of a randomly-chosen cell. The flag waves via per-frame vertex displacement: a
// traveling sine wave along the flag's length. The flag is given a tiny baked-in tilt
// (so it doesn't sit perfectly flat) and tinted with one of the marble colors so the
// scene reads "lively" even at idle, before the race starts.
// Global wind state — shared by all flags so they all blow the same direction and
// wave in unison. Updated by updateFlags(dt). The wind direction periodically shifts
// to a new random target; each flag lerps its rotation toward the global direction
// at a slightly different rate so the shift rolls across the course rather than
// snapping in lockstep.
let windYaw = Math.random() * Math.PI * 2;       // current direction (radians)
let windTargetYaw = windYaw;                      // direction we're lerping toward
let windShiftTimer = 5 + Math.random() * 5;       // seconds until next shift
let windPhase = 0;                                // shared wave phase for all flags

function buildFlags() {
  allFlags.length = 0;
  if (pathCells.length === 0) return;
  const cs = CONFIG.cellSize;

  // Reset wind state for a freshly built course.
  windYaw = Math.random() * Math.PI * 2;
  windTargetYaw = windYaw;
  windShiftTimer = 5 + Math.random() * 5;
  windPhase = 0;

  // Pick ~8 random PATH cells. Skip the start, finish, and the immediate neighbors
  // (we want flags AROUND the course, not crammed at the active spots).
  const eligible = [];
  for (let i = 2; i < pathCells.length - 3; i++) eligible.push(i);
  for (let i = eligible.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [eligible[i], eligible[j]] = [eligible[j], eligible[i]];
  }
  const flagCellIdxs = eligible.slice(0, Math.min(8, eligible.length));

  // Pole material: dark walnut wood
  const poleGeo = new THREE.CylinderGeometry(0.08, 0.10, 1, 8);
  const poleMat = makeWoodMaterial(WOOD_COLORS.veryDark, { roughness: 0.6 });

  for (const ci of flagCellIdxs) {
    const c = pathCells[ci];
    const cornerX = (Math.random() < 0.5 ? -1 : 1) * (cs / 2 - 0.2);
    const cornerZ = (Math.random() < 0.5 ? -1 : 1) * (cs / 2 - 0.2);

    const center = cellCenter(c.gx, c.gy, c.gz);

    // Compute the actual world-space Y at this corner of the tile. The tile slopes
    // from entryY (entry edge, cellLocal -X) to exitY (exit edge, cellLocal +X), and
    // cornerX in cell-local frame corresponds to position along the outDir axis.
    // World-frame: which world axis is "along outDir"? Use DIRS to project.
    let cornerY;
    if (c.type === 'corner') {
      // Corner tile tilts around its ENTRY edge midpoint. For a flag-placement
      // approximation we just use the average — works fine and minimizes visible gap.
      cornerY = (c.entryY + c.exitY) / 2;
    } else if (c.type === 'stepRamp') {
      // stepRamp has TWO floor heights joined by a vertical ledge at cell midpoint.
      // The slope axis is along outDir. Project the (cornerX, cornerZ) onto outDir
      // to figure out which side we're on.
      const od = DIRS[c.outDir];
      const localX = od.dx * cornerX + od.dz * cornerZ;  // signed distance along outDir
      cornerY = (localX < 0) ? c.entryY : c.exitY;
    } else {
      // Straight, ramp, start, finish: linear interpolation along the outDir axis.
      const od = DIRS[c.outDir];
      const localX = od.dx * cornerX + od.dz * cornerZ;  // signed distance along outDir
      const tAlong = (localX + cs / 2) / cs;             // 0 at entry, 1 at exit
      cornerY = c.entryY + (c.exitY - c.entryY) * tAlong;
    }
    const tileTopY = cornerY + 0.05;
    const poleHeight = 2.6 + Math.random() * 1.4;

    // Pole
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(center.x + cornerX, tileTopY + poleHeight / 2, center.z + cornerZ);
    pole.scale.y = poleHeight;
    pole.castShadow = true;
    pole.receiveShadow = true;
    pole.userData.cellIdx = ci;
    pole.userData.skipGhost = true;  // skinny pillar — ghosting looks like a glitchy stripe
    addToWorld(pole);

    // Brass finial
    const finialGeo = new THREE.SphereGeometry(0.13, 10, 8);
    const finialMat = new THREE.MeshStandardMaterial({
      color: 0xc8a25c, roughness: 0.4, metalness: 0.6,
    });
    const finial = new THREE.Mesh(finialGeo, finialMat);
    finial.position.set(center.x + cornerX, tileTopY + poleHeight + 0.06, center.z + cornerZ);
    finial.castShadow = true;
    finial.userData.cellIdx = ci;
    addToWorld(finial);

    // Flag: segmented plane, hoist edge at local x=0 so the flag extends in +x.
    const flagWidth  = 0.95;
    const flagHeight = 0.55;
    const wSegs = 16;
    const hSegs = 4;
    const flagGeo = new THREE.PlaneGeometry(flagWidth, flagHeight, wSegs, hSegs);
    flagGeo.translate(flagWidth / 2, 0, 0);
    const basePositions = flagGeo.attributes.position.array.slice();

    // Random color from the marble palette.
    const flagColorHex = COLORS[Math.floor(Math.random() * COLORS.length)];
    const flagMat = new THREE.MeshStandardMaterial({
      color: flagColorHex,
      roughness: 0.7,
      metalness: 0.0,
      side: THREE.DoubleSide,
    });
    const flagMesh = new THREE.Mesh(flagGeo, flagMat);

    flagMesh.position.set(
      center.x + cornerX,
      tileTopY + poleHeight - flagHeight * 0.55,
      center.z + cornerZ
    );
    // Start each flag pointing along the current wind direction.
    flagMesh.rotation.y = windYaw;
    flagMesh.castShadow = true;
    flagMesh.receiveShadow = true;
    flagMesh.userData.cellIdx = ci;
    addToWorld(flagMesh);

    // Per-flag state — slight variation per flag so the synchronized direction shift
    // ROLLS across the course (staggered) rather than snapping in lockstep.
    allFlags.push({
      mesh: flagMesh,
      geom: flagGeo,
      basePositions,
      yaw: windYaw,                                 // current yaw (lerps toward windYaw)
      // Lerp rate constant — varies per flag so the shift staggers. Lower constant
      // = slower-following flag = arrives at the new direction later. Range gives
      // a ~0.5-1.0s spread across the group.
      yawLerpHalfLife: 0.5 + Math.random() * 0.7,
      // Wave shape varies slightly so all flags don't bow identically.
      wavelength: flagWidth * (0.55 + Math.random() * 0.25),
      amplitudeY: 0.03 + Math.random() * 0.02,
      amplitudeZ: 0.07 + Math.random() * 0.04,
      width: flagWidth,
    });
  }
}

// Update each flag: rotate toward the shared windYaw (lerped per-flag for stagger),
// and apply a SHARED traveling-wave displacement so they all wave in unison. Wind
// direction periodically shifts to a new random target.
function updateFlags(dt) {
  if (allFlags.length === 0) return;

  // Tick the direction-shift timer. When it expires, pick a new random target yaw
  // and reset the timer for 5-10s out. Each flag will then lerp toward the new yaw
  // at its own rate (yawLerpHalfLife) for a staggered transition.
  windShiftTimer -= dt;
  if (windShiftTimer <= 0) {
    // Pick a NEW direction that isn't too close to the current one (at least 60°
    // away) — otherwise small shifts wouldn't be visible.
    const delta = (Math.PI / 3) + Math.random() * (Math.PI * 4 / 3);  // 60°-300°
    const sign = Math.random() < 0.5 ? -1 : 1;
    windTargetYaw = windYaw + sign * delta;
    windShiftTimer = 5 + Math.random() * 5;
  }

  // Global windYaw chases the target (shared "intended" direction). This lerp also
  // smooths the moment of shift so it doesn't jump abruptly.
  const windK = 1 - Math.pow(0.001, dt);
  windYaw = windYaw + shortestAngleDiff(windYaw, windTargetYaw) * windK;

  // Shared wave phase — same value used by every flag so they all wave in unison.
  const sharedFrequency = 2.4;  // waves/sec
  windPhase += dt * sharedFrequency * Math.PI * 2;

  // Per-flag work
  for (const f of allFlags) {
    // Lerp this flag's yaw toward the global windYaw. The half-life varies per flag,
    // so the new direction "rolls" across the course as each flag arrives at its
    // own pace — staggered but coherent.
    const yawK = 1 - Math.pow(0.5, dt / f.yawLerpHalfLife);
    f.yaw = f.yaw + shortestAngleDiff(f.yaw, windYaw) * yawK;
    f.mesh.rotation.y = f.yaw;

    // Apply shared wave to vertices.
    const pos = f.geom.attributes.position;
    const base = f.basePositions;
    const k = (Math.PI * 2) / f.wavelength;
    for (let i = 0; i < pos.count; i++) {
      const ix = i * 3;
      const bx = base[ix];
      const by = base[ix + 1];
      const t = bx / f.width;
      const env = t * t;
      const wave  = Math.sin(k * bx - windPhase);
      const cross = Math.cos(k * bx - windPhase + 0.7);
      pos.array[ix]     = bx;
      pos.array[ix + 1] = by + env * f.amplitudeY * cross;
      pos.array[ix + 2] = env * f.amplitudeZ * wave;
    }
    pos.needsUpdate = true;
    f.geom.computeVertexNormals();
  }
}

// Smallest signed angular difference from a to b, in [-π, π]. Used when lerping
// yaws — avoids taking the long way around when wrapping past ±π.
function shortestAngleDiff(a, b) {
  let d = (b - a) % (Math.PI * 2);
  if (d > Math.PI) d -= Math.PI * 2;
  else if (d < -Math.PI) d += Math.PI * 2;
  return d;
}

// =========================================================
// CAMERA — Isometric (orthographic) with optional drag/rotate + zoom
// =========================================================
const cameraTarget = new THREE.Vector3(0, 0, 0);
// Smoothed forward direction for the chase cam (lazy-initialized on first chase frame).
let chaseFwdX, chaseFwdZ;
// When the podium is showing, the camera lerps yaw toward this angle to frame
// the podium head-on. Null = no override (use current camYaw freely).
let targetCamYaw = null;
// Re-race pan target: when not null, the overview cam lerps cameraTarget+zoom
// toward this position for a few seconds, used to bring the camera back to the
// start area after a re-race kicks off. Cleared once close enough.
let _panToStartTarget = null;
let _panToStartZoom = 1.0;

function updateCamera(dt) {
  // Marble-blast mode: camera trails behind the player marble looking along the
  // TRACK direction (not the marble's velocity). Using marble velocity would make
  // the camera spin to follow every flick of input — pressing "left" would move
  // the marble left briefly, then the camera would rotate to face the new
  // direction, making "left" feel like "forward" and the controls feel like
  // rotation. Using the curve tangent keeps screen-left = screen-left always.
  if (STATE.marbleBlast && _mbPlayerMarble) {
    const m = _mbPlayerMarble;
    // Forward = curve tangent at marble's progress, XZ-projected.
    const tan = curve.getTangentAt(Math.min(0.999, Math.max(0.001, m.progress)));
    let fwdX = tan.x;
    let fwdZ = tan.z;
    const fMag = Math.sqrt(fwdX * fwdX + fwdZ * fwdZ);
    if (fMag > 0.001) { fwdX /= fMag; fwdZ /= fMag; }
    else { fwdX = 0; fwdZ = 1; }
    // Smooth so the camera doesn't snap when the marble crosses sample boundaries.
    if (chaseFwdX === undefined) { chaseFwdX = fwdX; chaseFwdZ = fwdZ; }
    const smoothK = 1 - Math.pow(0.01, dt);
    chaseFwdX += (fwdX - chaseFwdX) * smoothK;
    chaseFwdZ += (fwdZ - chaseFwdZ) * smoothK;
    const sMag = Math.sqrt(chaseFwdX * chaseFwdX + chaseFwdZ * chaseFwdZ);
    if (sMag > 0.001) { chaseFwdX /= sMag; chaseFwdZ /= sMag; }

    // Camera target lerps to the marble. Use a TIGHT lerp for snappy following.
    const followK = 1 - Math.pow(0.001, dt);
    cameraTarget.lerp(m.pos, followK);

    camYaw = Math.atan2(-chaseFwdX, -chaseFwdZ) * 180 / Math.PI;
    // Marble-blast cam zoom — 2x wider than the previous tight close-up (was 0.013,
    // now 0.026) so the player can see more of what's ahead.
    const targetZoom = 0.026;
    zoomFactor += (targetZoom - zoomFactor) * (1 - Math.pow(0.1, dt));
    updateOrthoCamera();

    const yawR = camYaw * Math.PI / 180;
    // Pitch raised from 15° to 25° — camera sits higher above the marble for a
    // better view of the surrounding terrain. Still well below the chase cam's
    // steep 50° angle, so it reads as third-person-shoulder rather than top-down.
    const pitchOverride = 25 * Math.PI / 180;
    const cosP = Math.cos(pitchOverride);
    const sinP = Math.sin(pitchOverride);
    const D = camDistance;
    const ox = cosP * Math.sin(yawR) * D;
    const oy = sinP * D;
    const oz = cosP * Math.cos(yawR) * D;
    camera.position.set(
      cameraTarget.x + ox,
      cameraTarget.y + oy,
      cameraTarget.z + oz
    );
    camera.up.set(0, 1, 0);
    camera.lookAt(cameraTarget);
    return;
  }

  // Chase Cam: trail the leading marble from behind based on its current velocity vector.
  // Camera sits a fixed distance BEHIND the marble along its travel direction, slightly
  // elevated, looking at the marble. The cam direction smooths over time so sudden
  // direction changes (corners, bumps) don't whip the view around.
  if (STATE.chaseCam) {
    let leader = null;
    let bestProgress = -1;
    for (const m of marbles) {
      if (m.finished) continue;
      if (m.progress > bestProgress) { bestProgress = m.progress; leader = m; }
    }
    if (leader) {
      // Use the marble's velocity as the "forward" direction. Project to XZ plane and
      // normalize so the trail length stays constant regardless of fall speed.
      const vx = leader.vel.x, vz = leader.vel.z;
      const vMag = Math.sqrt(vx*vx + vz*vz);
      let fwdX, fwdZ;
      if (vMag > 0.4) {
        fwdX = vx / vMag;
        fwdZ = vz / vMag;
      } else {
        // Marble is nearly stationary (start, dead-stop) — use the curve tangent at
        // the marble's progress as a fallback so the camera has SOME orientation.
        const t = leader.progress;
        const tan = curve.getTangentAt(Math.min(0.999, Math.max(0.001, t)));
        const tMag = Math.sqrt(tan.x*tan.x + tan.z*tan.z);
        if (tMag > 0.001) { fwdX = tan.x / tMag; fwdZ = tan.z / tMag; }
        else { fwdX = 0; fwdZ = 1; }
      }
      // Smooth the forward direction so quick velocity swings don't whip the camera.
      // We track the smoothed forward in module-scope vars (lazy-init below).
      if (chaseFwdX === undefined) { chaseFwdX = fwdX; chaseFwdZ = fwdZ; }
      // Slower smoothing — ~0.8s time constant instead of ~0.4s. When the leader
      // marble's velocity changes direction abruptly (peg bounce, plinko field,
      // hitting a wall in a corner), the camera now lags behind instead of
      // snapping; the marble drifts within the frame for a moment before the cam
      // catches up. Less motion-sickness-inducing on busy courses.
      const smoothK = 1 - Math.pow(0.18, dt);
      chaseFwdX += (fwdX - chaseFwdX) * smoothK;
      chaseFwdZ += (fwdZ - chaseFwdZ) * smoothK;
      // Re-normalize after smoothing
      const sMag = Math.sqrt(chaseFwdX*chaseFwdX + chaseFwdZ*chaseFwdZ);
      if (sMag > 0.001) { chaseFwdX /= sMag; chaseFwdZ /= sMag; }

      // Camera target: ease toward the marble. Slower lerp than action cam so the
      // camera doesn't snap on quick movements (peg bounces, sharp corners) — instead
      // the marble drifts a bit ahead within the frame before the camera catches up.
      // Bumped from 0.3^dt to 0.5^dt for an even gentler follow (~1s catch-up).
      const followK = 1 - Math.pow(0.5, dt);
      cameraTarget.lerp(leader.pos, followK);

      // Set the camera yaw to look ALONG the forward direction. Camera sits BEHIND
      // the marble, so the offset from target to camera is (-forward), and from the
      // setIsoCamera math, the camera position = target + (sin(yaw), -, cos(yaw)) * D.
      // To put camera at -forward direction from target: sin(yaw) = -fwdX, cos(yaw) = -fwdZ.
      // So yaw = atan2(-fwdX, -fwdZ).
      camYaw = Math.atan2(-chaseFwdX, -chaseFwdZ) * 180 / Math.PI;
      // Tighter zoom and a higher pitch than the default — view from above-and-behind,
      // closer to the marble than the action cam.
      const targetZoom = 0.10;
      zoomFactor += (targetZoom - zoomFactor) * (1 - Math.pow(0.2, dt));
      updateOrthoCamera();

      const yawR = camYaw * Math.PI / 180;
      // Override pitch locally — higher than the default 35° so the camera looks
      // more steeply down at the marble. Don't mutate camPitch so other modes are
      // unaffected.
      const chasePitchDeg = 50;
      const pitchR = chasePitchDeg * Math.PI / 180;
      const x = Math.cos(pitchR) * Math.sin(yawR) * camDistance;
      const y = Math.sin(pitchR) * camDistance;
      const z = Math.cos(pitchR) * Math.cos(yawR) * camDistance;
      camera.position.set(
        cameraTarget.x + x,
        cameraTarget.y + y,
        cameraTarget.z + z
      );
      camera.lookAt(cameraTarget);
      return;
    }
    // No active leader — silently disengage chase cam.
    STATE.chaseCam = false;
    chaseFwdX = chaseFwdZ = undefined;
  }

  // Top Cam: bird's-eye view directly above the leading marble. Camera looks
  // straight down (pitch = 90°) so the marble is centered in frame with the track
  // visible around it from directly overhead. Useful for seeing path layout and
  // peg/wall arrangements without 3D perspective getting in the way.
  if (STATE.topCam) {
    let leader = null;
    let bestProgress = -1;
    for (const m of marbles) {
      if (m.finished) continue;
      if (m.progress > bestProgress) { bestProgress = m.progress; leader = m; }
    }
    if (leader) {
      // Snap-fast follow so the marble stays roughly centered (slight lag for natural feel).
      const followK = 1 - Math.pow(0.0015, dt);
      cameraTarget.lerp(leader.pos, followK);

      // Tight zoom — closer than action cam since we lose 3D depth cues at 90° pitch.
      const targetZoom = 0.15;
      zoomFactor += (targetZoom - zoomFactor) * (1 - Math.pow(0.2, dt));
      updateOrthoCamera();

      // Pure top-down: camera directly above the target, looking straight down.
      camera.position.set(
        cameraTarget.x,
        cameraTarget.y + camDistance,
        cameraTarget.z
      );
      // Looking straight down has an ambiguous "up" — pick world -Z as up so the
      // marble's forward motion (when going in +Z) reads as moving toward the top
      // of the screen. This keeps orientation stable.
      camera.up.set(0, 0, -1);
      camera.lookAt(cameraTarget);
      // Restore camera.up to world-Y for other cam modes when we exit. (Other
      // modes implicitly reset this via THREE's lookAt defaults.)
      return;
    }
    // No active leader — silently disengage top cam.
    STATE.topCam = false;
  }
  // If we left top-cam mode this frame, restore world-up so subsequent modes use
  // the standard orientation.
  if (!STATE.topCam && (camera.up.x !== 0 || camera.up.y !== 1 || camera.up.z !== 0)) {
    camera.up.set(0, 1, 0);
  }

  // Action Cam: follow the leading marble closely with a slow orbit.
  if (STATE.actionCam) {
    // Pick the leader: the active marble with the highest progress.
    // If all marbles are finished, fall through to overview / podium.
    let leader = null;
    let bestProgress = -1;
    for (const m of marbles) {
      if (m.finished) continue;
      if (m.progress > bestProgress) { bestProgress = m.progress; leader = m; }
    }
    if (leader) {
      // Smoothly follow the leader. Snap-faster early so the camera doesn't drift
      // behind the marble; once close, a slower follow looks smooth.
      const followK = 1 - Math.pow(0.0015, dt); // ~quick catch-up
      cameraTarget.lerp(leader.pos, followK);
      // Slowly rotate the camera around the marble (about 12°/sec).
      camYaw += 12 * dt;
      // Tight zoom for a close-up.
      const targetZoom = 0.18;
      zoomFactor += (targetZoom - zoomFactor) * (1 - Math.pow(0.2, dt));
      updateOrthoCamera();

      const yaw = camYaw * Math.PI / 180;
      const pitch = camPitch * Math.PI / 180;
      const x = Math.cos(pitch) * Math.sin(yaw) * camDistance;
      const y = Math.sin(pitch) * camDistance;
      const z = Math.cos(pitch) * Math.cos(yaw) * camDistance;
      camera.position.set(
        cameraTarget.x + x,
        cameraTarget.y + y,
        cameraTarget.z + z
      );
      camera.lookAt(cameraTarget);
      return;
    }
    // No active leader (all finished) — silently disengage action cam and fall through.
    STATE.actionCam = false;
    const btn = document.getElementById('actionCam');
    if (btn) btn.classList.remove('active');
  }

  // Isometric: orbit at fixed distance around target.
  // setIsoCamera puts the camera at offset from world origin; we then add cameraTarget.
  const yaw = camYaw * Math.PI / 180;
  const pitch = camPitch * Math.PI / 180;
  const x = Math.cos(pitch) * Math.sin(yaw) * camDistance;
  const y = Math.sin(pitch) * camDistance;
  const z = Math.cos(pitch) * Math.cos(yaw) * camDistance;
  camera.position.set(
    cameraTarget.x + x,
    cameraTarget.y + y,
    cameraTarget.z + z
  );

  // If podium is showing, gently shift the view AND zoom in so the podium fills the frame.
  if (STATE.podiumShown && podiumGroup && podiumGroup.visible) {
    podiumGroup.updateMatrixWorld(true);
    const podiumCenter = new THREE.Vector3(0, 1, 0).applyMatrix4(podiumGroup.matrixWorld);
    // Slow, smooth pan: ~2-second time-constant
    cameraTarget.lerp(podiumCenter, 1 - Math.pow(0.55, dt));
    // Tight zoom so the podium fills the frame at the finish — closer than the
    // overview default. Smaller zoomFactor = smaller frustum = closer in.
    const targetZoom = 0.18;
    zoomFactor += (targetZoom - zoomFactor) * (1 - Math.pow(0.55, dt));
    // Pan camYaw toward the front-of-podium angle. We take the shortest-arc lerp so
    // the camera doesn't sweep the long way around when the wrap-around boundary is
    // straddled (e.g. yaw=170° → -170° should be a 20° turn, not a 340° turn).
    if (targetCamYaw !== null) {
      let delta = targetCamYaw - camYaw;
      delta = ((delta % 360) + 540) % 360 - 180;  // normalize to [-180, 180]
      camYaw += delta * (1 - Math.pow(0.55, dt));
    }
    updateOrthoCamera();
  } else if (_panToStartTarget) {
    // Re-race kicked off — pan back to the start area. Same lerp shape as the
    // podium pan so the motion feels familiar. Cleared once we're close enough,
    // so subsequent drag/scroll input feels responsive again.
    cameraTarget.lerp(_panToStartTarget, 1 - Math.pow(0.55, dt));
    zoomFactor += (_panToStartZoom - zoomFactor) * (1 - Math.pow(0.55, dt));
    updateOrthoCamera();
    if (cameraTarget.distanceTo(_panToStartTarget) < 0.5
        && Math.abs(zoomFactor - _panToStartZoom) < 0.02) {
      _panToStartTarget = null;
    }
  }

  camera.lookAt(cameraTarget);
}

// Wheel: zoom in/out (changes orthographic frustum size). Disabled while the
// action cam is engaged (it controls zoom).
let zoomFactor = 1.0;
window.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (STATE.actionCam || STATE.chaseCam) return;
  const factor = Math.exp(e.deltaY * 0.001);
  zoomFactor = Math.max(0.05, Math.min(3.0, zoomFactor * factor));
  updateOrthoCamera();
}, { passive: false });

function updateOrthoCamera() {
  const aspect = window.innerWidth / window.innerHeight;
  const s = camSize * zoomFactor;
  camera.left = -s * aspect;
  camera.right = s * aspect;
  camera.top = s;
  camera.bottom = -s;
  camera.updateProjectionMatrix();
}

// Drag to rotate around Y axis (left mouse) or pan the scene (right mouse).
// Disabled while action cam or chase cam is engaged.
let dragging = false;
let panning = false;
let dragStartX = 0, dragStartY = 0;
let dragStartYaw = 0, dragStartPitch = 0;
let panStartTarget = null;

function _beginDrag(clientX, clientY, button = 0) {
  if (STATE.actionCam || STATE.chaseCam) return;
  if (button === 2) {
    // Right mouse = pan the scene
    panning = true;
    dragStartX = clientX;
    dragStartY = clientY;
    panStartTarget = cameraTarget.clone();
  } else {
    // Left mouse (or touch) = rotate
    dragging = true;
    dragStartX = clientX;
    dragStartY = clientY;
    dragStartYaw = camYaw;
    dragStartPitch = camPitch;
  }
}
function _continueDrag(clientX, clientY) {
  if (panning) {
    // Track whether the right-click actually MOVED. If the user just right-clicks
    // without dragging, we want the browser context menu to appear (so they can
    // "Save Image As..."). Only register as a real pan once they've moved >5px.
    const totalMoveSq =
      (clientX - dragStartX) * (clientX - dragStartX) +
      (clientY - dragStartY) * (clientY - dragStartY);
    if (totalMoveSq > 25) _rightDragMoved = true;

    const worldPerPx = (2 * camSize * zoomFactor) / window.innerHeight;
    const dx = (clientX - dragStartX) * worldPerPx;
    const dy = (clientY - dragStartY) * worldPerPx;
    const yawR = camYaw * Math.PI / 180;
    const rightX = Math.cos(yawR), rightZ = -Math.sin(yawR);
    const upX    = Math.sin(yawR), upZ    =  Math.cos(yawR);
    cameraTarget.x = panStartTarget.x - dx * rightX - dy * upX;
    cameraTarget.z = panStartTarget.z - dx * rightZ - dy * upZ;
    return;
  }
  if (!dragging) return;
  const dx = clientX - dragStartX;
  const dy = clientY - dragStartY;
  camYaw = dragStartYaw + dx * 0.3;
  camPitch = Math.max(15, Math.min(75, dragStartPitch - dy * 0.2));
}
let _rightDragMoved = false;
function _endDrag() { dragging = false; panning = false; }

window.addEventListener('mousedown', (e) => {
  if (e.button === 2) _rightDragMoved = false;
  _beginDrag(e.clientX, e.clientY, e.button);
});
window.addEventListener('mousemove', (e) => _continueDrag(e.clientX, e.clientY));
window.addEventListener('mouseup', _endDrag);
// Suppress the browser context menu ONLY when the user actually right-DRAGGED (panned)
// the camera. A simple right-click without movement lets the context menu through so
// the user can "Save Image As..." from the canvas. Buttons in the UI always allow
// their normal context menu.
window.addEventListener('contextmenu', (e) => {
  if (e.target.closest('button')) return;            // UI buttons: normal browser behavior
  if (_rightDragMoved) e.preventDefault();           // panned → suppress
  _rightDragMoved = false;                           // reset for next click
});

// Touch equivalents for mobile. Single-finger drag → rotate; two-finger pinch → zoom.
// Touches that originate on a UI button are ignored so buttons work normally.
// A double-tap on the canvas (two quick taps with little movement between)
// toggles the glass display case in/out.
let _lastTapTime = 0;
let _lastTapX = 0, _lastTapY = 0;
let _tapStartX = 0, _tapStartY = 0;
let _tapMoved = false;
window.addEventListener('touchstart', (e) => {
  // If the touch starts on a UI control, let the click handler do its thing.
  if (e.target.closest('button')) return;
  if (e.touches.length === 1) {
    _beginDrag(e.touches[0].clientX, e.touches[0].clientY);
    // Track for double-tap detection — recorded fresh each touchstart, validated
    // at touchend.
    _tapStartX = e.touches[0].clientX;
    _tapStartY = e.touches[0].clientY;
    _tapMoved = false;
  } else if (e.touches.length === 2) {
    // Stop any in-progress rotation drag and start pinch tracking
    dragging = false;
