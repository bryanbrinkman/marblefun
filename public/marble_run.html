  // a unified ink-stamp look. Drop shadow stays a hair darker than the letter so
  // the impression of depth still reads.
  ctx.fillStyle = darkBrown;
  ctx.globalAlpha = 0.92;
  ctx.font = `bold ${Math.floor(size * 0.55)}px Georgia, 'Times New Roman', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(20, 10, 0, 0.45)';
  ctx.shadowBlur = size * 0.025;
  ctx.shadowOffsetX = size * 0.015;
  ctx.shadowOffsetY = size * 0.020;
  ctx.fillText(letter, size / 2, size / 2 + size * 0.04);
  // Reset shadow so the cached canvas doesn't leak shadow state to other drawing
  // ops (currently the letter is the last thing drawn, but resetting is safer for
  // future edits).
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.globalAlpha = 1.0;

  tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 4;
  _alphabetTextureCache.set(key, tex);
  return tex;
}

// Build the material array (one per cube face) for an alphabet block. Each face gets
// a random letter and a random color from the marble palette. Box face order in
// Three.js BoxGeometry: +X, -X, +Y, -Y, +Z, -Z.
const ALPHABET_PAINT_COLORS = [
  0xd9534f,  // red — matches marble red
  0x5bc0de,  // blue
  0x5cb85c,  // green
  0xf0ad4e,  // yellow
  0xede0c8,  // cream
];
function makeAlphabetBlockMaterials(woodTintHex) {
  // BoxGeometry face order is [+X, -X, +Y, -Y, +Z, -Z]. Each cube gets a SINGLE
  // letter painted on ONE pair of opposite faces; the other 4 faces are plain
  // tinted wood (same wood look as the surrounding cubes). This way, from any
  // viewing angle the user sees AT MOST ONE letter — the alphabet block reads as
  // "a cube with one branded face" rather than a multi-letter toy with letters on
  // every visible side.
  const letter = String.fromCharCode(65 + Math.floor(trackRng() * 26));
  const paintColor = ALPHABET_PAINT_COLORS[Math.floor(trackRng() * ALPHABET_PAINT_COLORS.length)];
  // Which axis gets the letter: 0 = ±X, 1 = ±Y, 2 = ±Z.
  const letterAxis = Math.floor(trackRng() * 3);

  // Build the letter face texture (used on both faces of the chosen axis).
  const letterTex = getAlphabetFaceTexture(letter, paintColor, woodTintHex);
  const letterMat = new THREE.MeshStandardMaterial({
    map: letterTex, roughness: 0.78, metalness: 0,
  });
  // Plain wood material — uses the same textured wood-block material the rest of
  // the cubes use, so the non-letter faces blend seamlessly with the column.
  const plainMat = makeTexturedBlockMaterial(woodTintHex, { roughness: 0.78 });

  const mats = [];
  for (let f = 0; f < 6; f++) {
    const axis = Math.floor(f / 2);   // 0,1 → axis 0; 2,3 → axis 1; 4,5 → axis 2
    mats.push(axis === letterAxis ? letterMat : plainMat);
  }
  return mats;
}

// Build a box geometry with all 12 edges rounded. We do this by extruding a rounded
// rectangle (rounded in XY) with a small bevel along the extrusion direction (Z),
// which rounds the top and bottom edges too. The result is a box of size
// `width × height × depth` with rounded corners and softened edges.
//
// Strategy: extrude a 2D rounded rect of (width × height) along depth, then rotate it
// in place so the geometry's local Y axis matches world Y. The bevel rounds the
// extrusion endpoints, which then become the top/bottom of the cube.
function roundedCubeGeometry(width, height, depth, radius) {
  // Clamp radius to avoid degenerate cases (must be < half of every side)
  const r = Math.min(radius, width * 0.45, height * 0.45, depth * 0.45);
  // Construct the rounded-rect shape in the XY plane, centered at origin.
  // ExtrudeGeometry will sweep this along +Z and produce a flat-ended prism.
  // The bevel adds a small rounded lip at each end of the extrusion.
  // To get the bevel to round the top/bottom (Y-faces) of the final cube, we:
  //  1. Make the 2D rect have width=width × Y=depth (treat 2D Y as world Z).
  //  2. Extrude along its local Z by (height - 2r) (leaves room for the bevel).
  //  3. Bevel by r on each end — that creates the rounded top/bottom.
  //  4. Rotate the geometry 90° around X so the extrusion axis becomes world Y.
  const innerW = width  - 2 * r;
  const innerD = depth  - 2 * r;
  // Centered rounded rect (XY plane, world X by world Z extent)
  const shape = new THREE.Shape();
  // Build the rounded rectangle path manually (quadratic curves at each corner)
  const x = -innerW / 2 - r, y = -innerD / 2;
  // Start at top-left straight edge
  shape.moveTo(-innerW / 2, -innerD / 2 - r);
  shape.lineTo( innerW / 2, -innerD / 2 - r);
  shape.quadraticCurveTo( innerW / 2 + r, -innerD / 2 - r,  innerW / 2 + r, -innerD / 2);
  shape.lineTo( innerW / 2 + r,  innerD / 2);
  shape.quadraticCurveTo( innerW / 2 + r,  innerD / 2 + r,  innerW / 2,  innerD / 2 + r);
  shape.lineTo(-innerW / 2,  innerD / 2 + r);
  shape.quadraticCurveTo(-innerW / 2 - r,  innerD / 2 + r, -innerW / 2 - r,  innerD / 2);
  shape.lineTo(-innerW / 2 - r, -innerD / 2);
  shape.quadraticCurveTo(-innerW / 2 - r, -innerD / 2 - r, -innerW / 2, -innerD / 2 - r);
  shape.closePath();

  const extrudeH = height - 2 * r;
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: extrudeH,
    bevelEnabled: true,
    bevelThickness: r,
    bevelSize: r,
    bevelSegments: 3,
    curveSegments: 6,
    steps: 1,
  });
  // ExtrudeGeometry extrudes along +Z and starts at z=0. Center the extrusion on origin
  // and rotate so the extrusion axis becomes world Y.
  geo.translate(0, 0, -extrudeH / 2);
  geo.rotateX(-Math.PI / 2);
  return geo;
}

function buildBlocks() {
  // Materials cached per build — pillars and trim get the wood texture too.
  const matVeryDark = makeTexturedBlockMaterial(WOOD_COLORS.veryDark);
  const matTrim     = makeTexturedBlockMaterial(WOOD_COLORS.trim, { roughness: 0.7 });

  // Painted accent materials — paint over wood. Each gets its own textured clone of
  // the high-luminance "paint overlay" wood texture so the grain shows through the
  // color without washing it out. Per-mat random UV offset/rotation keeps adjacent
  // stripes from looking identical.
  const paintMats = PAINT_COLORS.map(c => {
    const tex = texturedClone(woodPaintTexture, 0.3, 0.3);
    return new THREE.MeshStandardMaterial({
      color: c, map: tex,
      roughness: 0.55, metalness: 0.05,
    });
  });

  const cs = CONFIG.cellSize;
  const bh = CONFIG.blockHeight;
  const channelW = CONFIG.trackWidth;
  const wallH = CONFIG.wallHeight;
  const baseT = CONFIG.blockBaseThickness;

  // Pre-compute the lowest point in the course so pillars / table align under it.
  // Also track the HIGHEST point so the glass display case can be sized tall enough
  // to clear all towers beneath it.
  let lowestCourseY = 0;
  let highestCourseY = -Infinity;
  for (const pc of pathCells) {
    lowestCourseY = Math.min(lowestCourseY, pc.entryY, pc.exitY);
    highestCourseY = Math.max(highestCourseY, pc.entryY, pc.exitY);
    if (pc.type === 'ramp' || pc.type === 'stepRamp') {
      lowestCourseY = Math.min(lowestCourseY, pc.exitY - bh);
    }
  }
  const courseBaseY = lowestCourseY - 2.5; // tabletop level
  _courseBaseY = courseBaseY;
  _highestCourseY = highestCourseY;

  // Build XZ-keyed map of all cells in that column, with their "tile top Y" — used so
  // that a cell sitting ABOVE another cell at the same XZ doesn't extend its cube stack
  // down through the lower cell (creates the visual tunnel under crossings).
  const cellsByXZ = new Map();
  for (const pc of pathCells) {
    const k = `${pc.gx},${pc.gz}`;
    let list = cellsByXZ.get(k);
    if (!list) { list = []; cellsByXZ.set(k, list); }
    // The TOP of this cell's tile (highest point on it, above the walls)
    const tileTopY = Math.max(pc.entryY, pc.exitY) + CONFIG.wallHeight + 0.05;
    // The BOTTOM of this cell's tile (block underside). For ramps the wedge bottom
    // is at exitY - baseT (the wedge is `bh + baseT` thick at the entry corner and
    // just `baseT` at the exit corner). For stepRamps the lower slab bottom is at
    // exitY - bh - baseT.
    let tileBotY;
    if (pc.type === 'stepRamp') {
      tileBotY = pc.exitY - bh - baseT;
    } else {
      tileBotY = Math.min(pc.entryY, pc.exitY) - baseT;
    }
    list.push({ cell: pc, tileTopY, tileBotY });
  }

  // Group all blocks for easy reference
  const blocksGroup = new THREE.Group();

  for (let ci = 0; ci < pathCells.length; ci++) {
    // Snapshot the number of world objects before building this cell, so we can
    // stamp the cellIdx onto everything added during this iteration. The ghosting
    // system uses these stamps to avoid ghosting the leader marble's CURRENT tile
    // (and its associated supports), which would otherwise flicker in/out as the
    // marble crosses the boundary.
    const _cellBuildStartIdx = worldObjects.length;
    const c = pathCells[ci];
    const center = cellCenter(c.gx, c.gy, c.gz);
    // Use the actual continuous-descent Y values, not the integer level
    const midY = (c.entryY + c.exitY) / 2;
    center.y = midY;

    // Vary the base wood color across the course based on cell index
    // Each cell gets its OWN textured material with a random UV offset, so adjacent
    // blocks don't look perfectly identical even when sharing a wood color.
    const woodVariant = (c.gx + c.gz + Math.abs(c.gy)) % 3;
    const baseColor = (woodVariant === 0) ? WOOD_COLORS.medium
                   : (woodVariant === 1) ? WOOD_COLORS.light
                   : WOOD_COLORS.dark;
    const baseMat = makeTexturedBlockMaterial(baseColor);
    // Painted accent rotates through palette
    const paintMat = paintMats[(ci) % paintMats.length];

    // ---- Build the block body + channel piece ----
    // For non-ramp cells we now build the flat block base INSIDE the channel piece's
    // tilt group, so the block slopes in sync with the channel. This eliminates the
    // staircase effect where each flat block was 'pieceDrop' below the previous.
    // For ramps, the wedge handles its own shape.
    buildChannelPiece(c, baseMat, paintMat, matVeryDark);

    // The visible bottom of the tile (used to position cube-stack support beneath it).
    // For ramps and stepRamps, the wedge/lower-slab body extends to the LOW side of
    // the cell PLUS bh+baseT thick. (Previously a `bh`-unit gap appeared between the
    // wedge bottom and the top of the cube stack.)
    let blockBottomY;
    if (c.type === 'stepRamp') {
      // Lower slab top at exitY, body extends down (bh + baseT). The "real" underside
      // we need to attach support to is at exitY - bh - baseT.
      blockBottomY = c.exitY - bh - baseT;
    } else {
      blockBottomY = Math.min(c.entryY, c.exitY) - baseT;
    }

    // ---- Base sculpture: stack of rounded cubes from block down to either the table
    //      or to the cell BELOW (if the track crosses over itself at this XZ). ----
    // Find the highest tileTopY in this column that is below the current cell. If we
    // find one, this cell sits OVER a tunnel — skip the cube stack entirely so the
    // tunnel airspace stays open and the lower track is clearly visible. The upper
    // tile floats, visually supported by neighboring cells' stacks (which act as
    // pillars on either side of the crossing).
    let isOverTunnel = false;
    let tunnelLowerTopY = -Infinity;
    const sameColumn = cellsByXZ.get(`${c.gx},${c.gz}`) || [];
    for (const o of sameColumn) {
      if (o.cell === c) continue;
      if (o.tileTopY < blockBottomY - 0.05 && o.tileTopY > tunnelLowerTopY) {
        isOverTunnel = true;
        tunnelLowerTopY = o.tileTopY;
      }
    }

    const baseFloorY = courseBaseY;
    const baseTopY = blockBottomY;
    const totalH = baseTopY - baseFloorY;
    const minCubeH = cs * 0.6;
    if (!isOverTunnel && totalH > 0.1) {
      // Normal cell (not over a tunnel) — build a stack of cubes down to the table.
      const nCubes = Math.max(1, Math.round(totalH / cs));
      const stackH = totalH / nCubes;
      if (stackH >= minCubeH) {
        for (let s = 0; s < nCubes; s++) {
          // Occasionally use an alphabet block instead of the plain wood cube. Adds
          // playful detail to the support pillars without disturbing the structural
          // look. Two gates:
          //   1) Only on geometrically CUBIC cubes — when the stack-cube's vertical
          //      height closely matches its XZ dimension. Real alphabet blocks are
          //      square cubes; stretching the letter texture across a tall or short
          //      box looks wrong (the letter scales with the face's aspect ratio).
          //   2) Probability (36%) — about a third of cubic cubes get the alphabet
          //      treatment, while the other two-thirds stay as plain wood. Frequent
          //      enough that the letters are a recurring motif rather than rare.
          const cubeXZ = cs * 0.92;
          const cubeH  = stackH * 0.985;
          const aspectRatio = cubeH / cubeXZ;
          const isCubic = (aspectRatio > 0.92 && aspectRatio < 1.08);
          const useAlphabet = isCubic && trackRng() < 0.36;
          let cube;
          if (useAlphabet) {
            // Standard BoxGeometry for proper per-face UVs. The 6-material array gives
            // each face a different letter/color. The wood background gets tinted to
            // match the surrounding column (`baseColor`), so the alphabet cubes blend
            // with the regular wood cubes in the same stack.
            const cubeGeo = new THREE.BoxGeometry(cubeXZ, cubeH, cubeXZ);
            const mats = makeAlphabetBlockMaterials(baseColor);
            cube = new THREE.Mesh(cubeGeo, mats);
          } else {
            const cubeMat = makeTexturedBlockMaterial(baseColor, { roughness: 0.78 });
            const cubeGeo = roundedCubeGeometry(cubeXZ, cubeH, cubeXZ, 0.08);
            cube = new THREE.Mesh(cubeGeo, cubeMat);
          }
          const cubeCenterY = baseTopY - stackH/2 - s * stackH;
          // Slight imperfect placement: ±~3° yaw + small XZ jitter for "hand-stacked".
          // Tops/bottoms stay horizontal (rotation around Y only) so adjacent cube
          // surfaces still meet flush vertically.
          const jitterXZ = cs * 0.04;
          cube.position.set(
            center.x + (trackRng() - 0.5) * jitterXZ,
            cubeCenterY,
            center.z + (trackRng() - 0.5) * jitterXZ
          );
          cube.rotation.y = (trackRng() - 0.5) * (6 * Math.PI / 180); // ±3°
          cube.castShadow = true;
          cube.receiveShadow = true;
          addToWorld(cube);
        }
      }
    } else if (isOverTunnel) {
      // Tunnel cell — instead of cubes, drop "bead" cylinder supports from the upper
      // tile down to the lower tile's top, so the overhang reads as structurally anchored
      // rather than floating in mid-air. Beads are scaled to roughly cube-height so they
      // visually match the regular hand-stacked cube columns.
      // Anchor the bead column with a generous OVERLAP into both tiles. Both the upper
      // and lower tile are TILTED (their tops/undersides vary in Y by up to `pieceDrop`
      // across the cell, depending on which corner you're looking at), so each overlap
      // Top of the support reaches the bottom of the upper tile cleanly — for
      // single cylinders we used a deep overlap (+0.4 + pieceDrop) to mask any
      // gap at tilted-tile junctions, but stacked cylinders with discrete tops
      // show those overlaps as the top token visibly clipping THROUGH the
      // upper tile. Use a small overlap (-0.05) so the topmost token's flat
      // top just kisses the upper tile bottom, even on steep tilts.
      const topOverlap = -0.05;
      const botOverlap = CONFIG.pieceDrop + 0.4;
      const supportTopY = baseTopY + topOverlap;       // just below the upper tile bottom
      const supportBotY = tunnelLowerTopY - botOverlap;
      const gap = supportTopY - supportBotY;
      if (gap > 0.3) {
        // Stack of individual cylinder segments per pillar — looks like wooden
        // tokens stacked on top of each other. Each segment is its own mesh so
        // the Q-key explode treats them as individual chunks.
        const pillarR = 0.28;
        // Segment height targeted to roughly match the surrounding cube blocks
        // (cubes are ~cs/3 = 1.33 tall). Stacked tokens at this scale read as
        // chunky checker-piece-sized supports rather than thin coin slices.
        const targetSegH = 1.25;
        const nSegs = Math.max(1, Math.round(gap / targetSegH));
        const segH = gap / nSegs;
        // Use CylinderGeometry instead of LatheGeometry — guaranteed solid
        // (capped top + bottom + closed sides). The LatheGeometry approach
        // sometimes produced see-through artifacts depending on the profile
        // winding and how the normals computed, and required a complex
        // bevel-arc profile that was overkill for these chunky tokens.
        const segGeo = new THREE.CylinderGeometry(pillarR, pillarR, segH, 18);

        const cornerOffset = cs * 0.38;
        const pillarSpots = [
          { x: center.x - cornerOffset, z: center.z - cornerOffset },
          { x: center.x + cornerOffset, z: center.z - cornerOffset },
          { x: center.x - cornerOffset, z: center.z + cornerOffset },
          { x: center.x + cornerOffset, z: center.z + cornerOffset },
        ];
        const pillarColors = [WOOD_COLORS.medium, WOOD_COLORS.light, WOOD_COLORS.dark];
        for (const spot of pillarSpots) {
          // Slight per-pillar XZ jitter so corner stacks don't read as perfect grid.
          const px = spot.x + (trackRng() - 0.5) * 0.06;
          const pz = spot.z + (trackRng() - 0.5) * 0.06;
          for (let s = 0; s < nSegs; s++) {
            // Each segment in the stack picks its own random wood color so the
            // column has subtle variation top-to-bottom, like real hand-stacked
            // wooden tokens of mixed shades.
            const segColor = pillarColors[Math.floor(trackRng() * pillarColors.length)];
            const segMat = makeWoodMaterial(segColor, { roughness: 0.78 });
            const seg = new THREE.Mesh(segGeo, segMat);
            // Stack from bottom to top. Center of segment s sits at bot + (s+0.5)*segH.
            const segCenterY = supportBotY + (s + 0.5) * segH;
            seg.position.set(px, segCenterY, pz);
            // Random yaw per segment — wood-grain variation between adjacent
            // segments + suggests they were hand-rotated when stacked.
            seg.rotation.y = trackRng() * Math.PI * 2;
            seg.castShadow = true;
            seg.receiveShadow = true;
            // Pillar tokens ghost like every other support block. (The old
            // skipGhost exclusion dated from the single tall LatheGeometry
            // pillars, whose hollow-looking back-faces ghosted confusingly —
            // these solid CylinderGeometry tokens fade cleanly.)
            addToWorld(seg);
          }
        }
      }
    }

    // Stamp cellIdx onto every object added during this iteration (and all their
    // descendants), so the ghosting system can identify the marble's current cell
    // and exclude its tile + supports from being faded.
    for (let i = _cellBuildStartIdx; i < worldObjects.length; i++) {
      worldObjects[i].traverse(node => {
        node.userData.cellIdx = ci;
      });
    }
  }

  // ---- Ground "table" platform ----
  // Wide, dark wooden table extending well past the course in all directions.
  const bounds = computeCourseBounds();
  const tableY = courseBaseY; // table top, computed before the loop
  const tableW = (bounds.maxX - bounds.minX) + 14;
  const tableD = (bounds.maxZ - bounds.minZ) + 14;
  const tableCX = (bounds.maxX + bounds.minX) / 2;
  const tableCZ = (bounds.maxZ + bounds.minZ) / 2;

  // Dark rich wooden tabletop (espresso/walnut). We want the grain to read as a few
  // wide planks rather than a dense grid of small tiles — so use a low repeat count
  // and rotate the UVs so the grain direction doesn't echo the blocks above.
  const tableGeo = new THREE.BoxGeometry(tableW, 1.6, tableD);
  const tableMat = makeTexturedBlockMaterial(0x3a2010, { roughness: 0.65 });
  if (tableMat.map) {
    // Repeat just a few times across each axis — each "tile" is several units wide,
    // so individual rings/grain features are large and don't read as a pattern.
    tableMat.map.repeat.set(tableW / 18, tableD / 18);
    // Rotate the UVs so the grain runs diagonally across the table — breaks the
    // axis-aligned look that makes tiling obvious.
    tableMat.map.center.set(0.5, 0.5);
    tableMat.map.rotation = Math.PI / 6;  // 30° rotation
    // Randomize offset so the visible region isn't always the same slice.
    tableMat.map.offset.set(Math.random(), Math.random());
    tableMat.map.needsUpdate = true;
  }
  const table = new THREE.Mesh(tableGeo, tableMat);
  table.position.set(tableCX, tableY - 0.8, tableCZ);
  table.receiveShadow = true;
  table.userData.isBase = true;   // marks the table; collapse-effect excludes this
  addToWorld(table);
  // Stash the table's XZ rectangle and top Y so the collapse effect can use them
  // for floor/edge collision (pieces land on the table within bounds, fall off
  // when they slide past the edge).
  _tableBounds = {
    minX: tableCX - tableW / 2,
    maxX: tableCX + tableW / 2,
    minZ: tableCZ - tableD / 2,
    maxZ: tableCZ + tableD / 2,
    topY: tableY,
  };

  // ---- Felt grass mat inside the wood border ----
  // A slightly elevated green felt plane sits on top of the dark wood table, inset
  // from the edges so the wood frame is visible all the way around. The felt has a
  // procedural noise texture that suggests grass-like felt fiber, like a board-game
  // playing surface or the top of a billiard table. Cubes and supports rest BELOW
  // its surface (their bottoms sit at tableY, the felt sits ~0.1 above), so the
  // felt appears to grow up to the base of each support — like a little lawn with
  // wooden towers planted in it.
  {
    const feltInset = 2.5;
    const feltW = tableW - 2 * feltInset;
    const feltD = tableD - 2 * feltInset;
    if (feltW > 1 && feltD > 1) {
      const feltGeo = new THREE.BoxGeometry(feltW, 0.12, feltD);
      const feltTex = makeFeltTexture();
      // Tile it broadly so the noise reads as fiber texture rather than a stretched
      // pattern. Smaller numbers = larger tiles = chunkier weave.
      feltTex.repeat.set(feltW / 8, feltD / 8);
      const feltMat = new THREE.MeshStandardMaterial({
        color: 0x6ba14a,        // grass-green, leans warm so it doesn't look like printer paper
        map: feltTex,
        roughness: 0.95,        // felt is matte — no specular highlights
        metalness: 0.0,
      });
      const felt = new THREE.Mesh(feltGeo, feltMat);
      // Top of the felt sits 0.06 above the table top (visible elevation), bottom
      // overlaps slightly INTO the table so there's no gap line.
      felt.position.set(tableCX, tableY + 0.06, tableCZ);
      felt.receiveShadow = true;
      felt.userData.isBase = true;  // collapse-effect excludes this
      addToWorld(felt);
      // Stash felt's world-space rectangle and top Y so the glass case can size
      // itself to match. We add a small inset so glass walls sit ATOP the felt
      // (not flush with its edge), preventing z-fighting with the felt's side faces.
      const feltTopY = tableY + 0.06 + 0.06;  // felt center + halfH = felt top surface
      _feltBounds = {
        minX: tableCX - feltW / 2,
        maxX: tableCX + feltW / 2,
        minZ: tableCZ - feltD / 2,
        maxZ: tableCZ + feltD / 2,
        topY: feltTopY,
      };
    }
  }

  // ---- Stanchion posts + rope around the table perimeter ----
  // Museum-style "do not cross" rope on short posts, framing the sculpture inside.
  // Posts sit slightly INSIDE the table edge (so they're clearly on the tabletop),
  // spaced evenly. The rope drapes between adjacent post tops with a small sag.
  const postH = 2.4;
  const postR = 0.18;
  const ropeR = 0.08;
  const ropeSag = 0.45;
  const tableTopY = tableY;
  const tableMinX = tableCX - tableW / 2;
  const tableMaxX = tableCX + tableW / 2;
  const tableMinZ = tableCZ - tableD / 2;
  const tableMaxZ = tableCZ + tableD / 2;
  const postInset = 1.8;
  // Spacing: aim for ~5-6 posts per long edge; computed from edge length.
  const targetPostSpacing = 7.5;
  const nPostsX = Math.max(2, Math.round((tableMaxX - tableMinX - 2*postInset) / targetPostSpacing) + 1);
  const nPostsZ = Math.max(2, Math.round((tableMaxZ - tableMinZ - 2*postInset) / targetPostSpacing) + 1);

  // Compute post positions in CCW order around the perimeter, so the rope can flow
  // from one post to the next continuously.
  const postPositions = [];
  // Bottom edge (z = minZ), going +X
  for (let i = 0; i < nPostsX; i++) {
    const t = i / (nPostsX - 1);
    postPositions.push({
      x: tableMinX + postInset + t * (tableMaxX - tableMinX - 2*postInset),
      z: tableMinZ + postInset,
    });
  }
  // Right edge (x = maxX), going +Z — skip first (corner already added)
  for (let i = 1; i < nPostsZ; i++) {
    const t = i / (nPostsZ - 1);
    postPositions.push({
      x: tableMaxX - postInset,
      z: tableMinZ + postInset + t * (tableMaxZ - tableMinZ - 2*postInset),
    });
  }
  // Top edge (z = maxZ), going -X — skip first (corner)
  for (let i = 1; i < nPostsX; i++) {
    const t = i / (nPostsX - 1);
    postPositions.push({
      x: tableMaxX - postInset - t * (tableMaxX - tableMinX - 2*postInset),
      z: tableMaxZ - postInset,
    });
  }
  // Left edge (x = minX), going -Z — skip first AND last (corners already added)
  for (let i = 1; i < nPostsZ - 1; i++) {
    const t = i / (nPostsZ - 1);
    postPositions.push({
      x: tableMinX + postInset,
      z: tableMaxZ - postInset - t * (tableMaxZ - tableMinZ - 2*postInset),
    });
  }

  // Build each post: a tall thin cylinder with a small ball cap on top.
  const postGeo = new THREE.CylinderGeometry(postR * 0.9, postR, postH, 12);
  const postMat = makeWoodMaterial(WOOD_COLORS.veryDark, { roughness: 0.6 });
  const capGeo = new THREE.SphereGeometry(postR * 1.4, 12, 10);
  const capMat = new THREE.MeshStandardMaterial({
    color: 0xc8a25c,  // brass-gold ball cap
    roughness: 0.4, metalness: 0.6,
  });
  for (const p of postPositions) {
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(p.x, tableTopY + postH / 2, p.z);
    post.castShadow = true;
    post.receiveShadow = true;
    post.userData.isBase = true;   // stanchions are part of the display base, not the course
    addToWorld(post);
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.set(p.x, tableTopY + postH + postR * 0.6, p.z);
    cap.castShadow = true;
    cap.userData.isBase = true;
    addToWorld(cap);
  }

  // Build rope segments between consecutive posts with a parabolic sag (low in the
  // middle of each span). Use a TubeGeometry along a CatmullRom curve sampled with a
  // few points so the sag reads smoothly.
  const ropeMat = new THREE.MeshStandardMaterial({
    color: 0xb01828,  // rich red rope
    roughness: 0.85, metalness: 0.05,
  });
  const ropeTopY = tableTopY + postH + postR * 0.6;
  for (let i = 0; i < postPositions.length; i++) {
    const a = postPositions[i];
    const b = postPositions[(i + 1) % postPositions.length];
    // Sample 9 points along the span, each at progress t ∈ [0, 1].
    const pts = [];
    const steps = 9;
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const x = a.x + (b.x - a.x) * t;
      const z = a.z + (b.z - a.z) * t;
      // Sag: parabolic, max at t=0.5
      const sag = -ropeSag * 4 * t * (1 - t);
      pts.push(new THREE.Vector3(x, ropeTopY + sag, z));
    }
    const ropeCurve = new THREE.CatmullRomCurve3(pts);
    const ropeGeo = new THREE.TubeGeometry(ropeCurve, 12, ropeR, 6, false);
    const rope = new THREE.Mesh(ropeGeo, ropeMat);
    rope.castShadow = true;
    rope.receiveShadow = true;
    rope.userData.isBase = true;   // perimeter rope is part of the base display, not the course
    addToWorld(rope);
  }
}

function computeCourseBounds() {
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const c of pathCells) {
    const cx = c.gx * CONFIG.cellSize;
    const cz = c.gz * CONFIG.cellSize;
    if (cx < minX) minX = cx;
    if (cx > maxX) maxX = cx;
    if (cz < minZ) minZ = cz;
    if (cz > maxZ) maxZ = cz;
  }
  return { minX, maxX, minZ, maxZ };
}

// Build the channel piece (block body + channel walls + floor) on top of the cell.
// All sub-meshes go into a single 'innerGroup' that gets tilted as a unit, so the
// block, walls, and channel floor all tilt together — eliminating staircase gaps
// between adjacent cells.
function buildChannelPiece(c, baseMat, paintMat, trimMat) {
  const cs = CONFIG.cellSize;
  const channelW = CONFIG.trackWidth;
  const wallH = CONFIG.wallHeight;
  const halfCS = cs / 2;
  const halfCh = channelW / 2;
  const wallThick = (cs - channelW) / 2; // wall extends from channel edge to cell edge
  const baseT = CONFIG.blockBaseThickness;

  const center = cellCenter(c.gx, c.gy, c.gz);

  // Continuous descent: every piece slopes from entryY to exitY.
  // Position the channel group at the midpoint Y, then apply a tilt within the inner group
  // so the channel's entry end is higher and exit end is lower.
  const entryY = c.entryY;
  const exitY  = c.exitY;
  const midY   = (entryY + exitY) / 2;
  const drop   = entryY - exitY; // positive when descending

  // Outer group: positioned in world, rotated to orient channel along the right direction.
  // Inner group: receives ALL meshes (block body + walls + channel floor), tilted as a unit.
  const outerGroup = new THREE.Group();
  const innerGroup = new THREE.Group();
  outerGroup.add(innerGroup);

  // ---- Add the BLOCK BODY into innerGroup (so it tilts with the channel) ----
  // Non-ramp cells: a flat slab whose TOP is flush with local y=0 (= channel/wall base level).
  // The slab tilts with the inner group so its top follows the slope. This means adjacent
  // cells meet flush at the shared edge — no staircase.
  // Ramp and stepRamp cells skip this: the wedge inside buildRampChannel and the
  // two-tier slab inside buildStepRampChannel handle the block body.
  if (c.type !== 'ramp' && c.type !== 'stepRamp') {
    const baseGeo = new THREE.BoxGeometry(cs * 0.99, baseT, cs * 0.99);
    const baseMesh = new THREE.Mesh(baseGeo, baseMat);
    baseMesh.position.y = -baseT / 2; // top at local y=0
    baseMesh.castShadow = true;
    baseMesh.receiveShadow = true;
    innerGroup.add(baseMesh);

    // Painted top trim around the block edge (a thin colored band on top of the slab)
    // Sits at local y just above 0, hugging the block's top surface — slightly under
    // the channel floor so it appears as a decorative band around the channel.
    const trimGeo = new THREE.BoxGeometry(cs * 0.99, 0.04, cs * 0.99);
    const trimMesh = new THREE.Mesh(trimGeo, paintMat);
    trimMesh.position.y = 0.02; // sit right on top of the slab
    trimMesh.receiveShadow = true;
    innerGroup.add(trimMesh);
  }

  if (c.type === 'corner') {
    buildCornerChannel(innerGroup, c, baseMat, paintMat);
    // Tilt the corner around its ENTRY-edge midpoint, so the entry edge stays flat at entryY.
    // This means the corner's entry edge meets the previous piece's flat exit edge perfectly.
    const turn = ((c.outDir - c.inDir + 4) % 4);
    const exitSign = (turn === 1) ? 1 : -1;
    const chordLen = cs * Math.SQRT2 / 2; // distance from entry midpoint to exit midpoint
    const tiltAngle = Math.atan2(drop, chordLen);
    const axis = new THREE.Vector3(exitSign, 0, -1).normalize();

    // Wrap the meshes inside a pivot+content nested group so the rotation pivots
    // at the entry-edge midpoint (cell-local (-cs/2, 0, 0)).
    const pivotGroup = new THREE.Group();
    pivotGroup.position.set(-cs/2, 0, 0);
    pivotGroup.quaternion.setFromAxisAngle(axis, tiltAngle);
    const contentGroup = new THREE.Group();
    contentGroup.position.set(cs/2, 0, 0); // compensate pivot offset
    while (innerGroup.children.length > 0) {
      contentGroup.add(innerGroup.children[0]);
    }
    pivotGroup.add(contentGroup);
    innerGroup.add(pivotGroup);
    outerGroup.rotation.y = dirAngle(c.inDir);
    // Corner outerGroup sits at entryY, not midY (since the pivot is at the entry edge).
    outerGroup.userData.yOverride = c.entryY;
  } else if (c.type === 'ramp') {
    buildRampChannel(innerGroup, c, baseMat, paintMat);
    // Ramp builder uses entry y=0, exit y=-bh in local frame.
    // We want entry at world midY+bh/2 and exit at midY-bh/2. Shift inner group up by bh/2.
    innerGroup.position.y = CONFIG.blockHeight / 2;
    outerGroup.rotation.y = dirAngle(c.outDir);
  } else if (c.type === 'stepRamp') {
    buildStepRampChannel(innerGroup, c, baseMat, paintMat);
    // Same outer-frame setup as a ramp: inner group shifted up by bh/2 so the entry
    // edge (upper floor at local y=0) sits at world midY+bh/2 = entryY, and the
    // lower floor (local y=-bh) sits at exitY.
    innerGroup.position.y = CONFIG.blockHeight / 2;
    outerGroup.rotation.y = dirAngle(c.outDir);
  } else {
    // straight, start, finish
    buildStraightChannel(innerGroup, c, baseMat, paintMat);
    // Tilt around the ENTRY edge of the cell (at local x = -cs/2). This guarantees the
    // entry edge stays HORIZONTAL at entryY, matching the previous piece's flat exit edge.
    const tiltAngle = Math.atan2(drop, cs);

    const pivotGroup = new THREE.Group();
    pivotGroup.position.set(-cs/2, 0, 0);
    pivotGroup.rotation.z = -tiltAngle;
    const contentGroup = new THREE.Group();
    contentGroup.position.set(cs/2, 0, 0); // compensate
    while (innerGroup.children.length > 0) {
      contentGroup.add(innerGroup.children[0]);
    }
    pivotGroup.add(contentGroup);
    innerGroup.add(pivotGroup);
    outerGroup.rotation.y = dirAngle(c.outDir);
    // Straight outerGroup sits at entryY (pivot is at entry edge).
    outerGroup.userData.yOverride = c.entryY;
  }

  outerGroup.position.copy(center);
  outerGroup.position.y = (outerGroup.userData.yOverride !== undefined)
    ? outerGroup.userData.yOverride
    : midY;

  addToWorld(outerGroup);
}

// Helper: align a child group so the channel flows from inDir to outDir.
// For straight pieces, the channel is a straight line. We orient based on inDir.
// For corners, we orient based on inDir and turn direction.
function dirAngle(dirIndex) {
  // Return rotation around Y such that local +X axis points in DIRS[dirIndex] direction (world space).
  // Three.js Y rotation by angle θ rotates a point (x,z) to (x cosθ + z sinθ, -x sinθ + z cosθ).
  // So local +X = (1,0) rotates to world (cosθ, -sinθ).
  // We want this to equal DIRS[dirIndex] = (dx, dz):
  //   cosθ = dx,  -sinθ = dz  =>  sinθ = -dz
  //   θ = atan2(-dz, dx)
  // For dir 0 (+X = (1,0)):   θ = atan2(0, 1)  = 0
  // For dir 1 (+Z = (0,1)):   θ = atan2(-1, 0) = -π/2
  // For dir 2 (-X = (-1,0)):  θ = atan2(0, -1) = π
  // For dir 3 (-Z = (0,-1)):  θ = atan2(1, 0)  = π/2
  // Hmm those match my original table. So local +X = (1,0,0) maps to world by rotating to (cosθ, 0, -sinθ).
  // For θ = -π/2: cos = 0, sin = -1, so (0, 0, 1) = +Z. ✓ That matches dir 1!
  //
  // Earlier confusion was mine — recomputing: rotation matrix R(θ) around Y takes (1,0,0) to
  // (cos θ, 0, -sin θ). For θ = -π/2: (cos(-π/2), 0, -sin(-π/2)) = (0, 0, 1). So +X → +Z. ✓
  // OK so the table is correct after all.
  const angles = [0, -Math.PI/2, Math.PI, Math.PI/2];
  return angles[dirIndex];
}

function buildStraightChannel(group, c, baseMat, paintMat) {
  const cs = CONFIG.cellSize;
  const channelW = CONFIG.trackWidth;
  const wallH = CONFIG.wallHeight;
  const wallThick = (cs - channelW) / 2;

  // Channel runs along the outDir direction. Walls are on both sides (perpendicular).
  // We build in cell-local frame where +X = outDir, +Z = "right" of outDir.
  // For shaped cells (hourglass/zigzag/pinchPeg), the walls follow a curve along the cell.

  if (c.wallShape) {
    // Build each wall as a series of small tilted box segments along the cell length
    const segCount = 14;
    const segLenX = cs / segCount;
    const wallMat = baseMat;
    const stripeGeoCache = new THREE.BoxGeometry(segLenX * 1.05, 0.06, wallThick * 0.85);
    for (let s = 0; s < segCount; s++) {
      const xMid = -cs/2 + (s + 0.5) * segLenX;
      const xLo  = -cs/2 + s * segLenX;
      const xHi  = -cs/2 + (s + 1) * segLenX;
      const lo = wallBoundsAt(c.wallShape, xLo);
      const hi = wallBoundsAt(c.wallShape, xHi);
      // Each wall segment runs from one bound to the next
      for (const which of ['left', 'right']) {
        const z0 = which === 'left' ? lo.leftZ : lo.rightZ;
        const z1 = which === 'left' ? hi.leftZ : hi.rightZ;
        // Segment center: midpoint of (z0, z1), positioned OUTSIDE the channel by wallThick/2
        const zMid = (z0 + z1) / 2;
        const zOffset = (which === 'left') ? -wallThick / 2 : +wallThick / 2;
        // Local rotation around Y so the segment aligns with the slope of (z0 → z1) over (xLo → xHi)
        const dz = z1 - z0;
        const rotY = Math.atan2(-dz, segLenX); // angle so segment +X aligns with travel direction
        // Length-correct for the diagonal so the segment fully spans its X step
        const segLen = Math.sqrt(segLenX * segLenX + dz * dz) * 1.05;

        const wallGeo = new THREE.BoxGeometry(segLen, wallH, wallThick);
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(xMid, wallH / 2, zMid + zOffset);
        wall.rotation.y = rotY;
        wall.castShadow = true;
        wall.receiveShadow = true;
        group.add(wall);

        // Painted top stripe
        const stripeGeo = new THREE.BoxGeometry(segLen, 0.06, wallThick * 0.85);
        const stripe = new THREE.Mesh(stripeGeo, paintMat);
        stripe.position.set(xMid, wallH + 0.03, zMid + zOffset);
        stripe.rotation.y = rotY;
        group.add(stripe);
      }
    }
  } else {
    // Default: two simple straight walls
    const wallGeo = new THREE.BoxGeometry(cs, wallH, wallThick);
    const wallMat = baseMat;
    const leftWall = new THREE.Mesh(wallGeo, wallMat);
    leftWall.position.set(0, wallH / 2, -(channelW / 2 + wallThick / 2));
    leftWall.castShadow = true;
    leftWall.receiveShadow = true;
    group.add(leftWall);

    const rightWall = new THREE.Mesh(wallGeo, wallMat);
    rightWall.position.set(0, wallH / 2, (channelW / 2 + wallThick / 2));
    rightWall.castShadow = true;
    rightWall.receiveShadow = true;
    group.add(rightWall);

    // Painted top stripe along each wall (sliver of color)
    const stripeGeo = new THREE.BoxGeometry(cs * 0.98, 0.06, wallThick * 0.85);
    const leftStripe = new THREE.Mesh(stripeGeo, paintMat);
    leftStripe.position.set(0, wallH + 0.03, -(channelW / 2 + wallThick / 2));
    group.add(leftStripe);
    const rightStripe = new THREE.Mesh(stripeGeo, paintMat);
    rightStripe.position.set(0, wallH + 0.03, (channelW / 2 + wallThick / 2));
    group.add(rightStripe);
  }

  // Channel floor (slightly inset, slightly different color)
  // If this cell has a dip feature, build a bowl-shaped floor instead.
  if (c.hasDip) {
    // Replace flat floor with a curved dip: lowered in the middle, rising back up at exit.
    // We approximate the dip with a few stacked box segments at descending then ascending heights.
    const dipDepth = 0.55;
    const dipSegments = 9;
    const segLen = cs / dipSegments;
    const floorMat = makeTexturedFloorMaterial(0xd6b683, { roughness: 0.92 });
    for (let s = 0; s < dipSegments; s++) {
      const xCenter = -cs/2 + (s + 0.5) * segLen;
      // Cosine bowl: depth at x=0 is dipDepth, smoothly rising to ~0 at the ends.
      const u = xCenter / (cs / 2); // -1..1
      const y = 0.04 - dipDepth * (0.5 * (1 + Math.cos(Math.PI * u)));
      const segGeo = new THREE.BoxGeometry(segLen * 1.05, 0.08, channelW);
      const segMesh = new THREE.Mesh(segGeo, floorMat);
      segMesh.position.set(xCenter, y, 0);
      segMesh.receiveShadow = true;
      group.add(segMesh);
    }
    // Tag the cell with its dip parameters for physics
    c._dipDepth = dipDepth;
  } else if (c.wallShape === 'startFlare') {
    // Start tile: build a SEGMENTED floor whose width matches the flared walls. The
    // wider back lets the 5 marbles spawn in a row; the floor tapers to the standard
    // channel width by the gate at the front edge.
    const floorMat = makeTexturedFloorMaterial(0xd6b683, { roughness: 0.92 });
    const segCount = 14;
    const segLen = cs / segCount;
    for (let s = 0; s < segCount; s++) {
      const xCenter = -cs/2 + (s + 0.5) * segLen;
      const b = wallBoundsAt('startFlare', xCenter);
      const segW = (b.rightZ - b.leftZ);
      const segCz = (b.leftZ + b.rightZ) / 2;
      const segGeo = new THREE.BoxGeometry(segLen * 1.05, 0.08, segW);
      const segMesh = new THREE.Mesh(segGeo, floorMat);
      segMesh.position.set(xCenter, 0.04, segCz);
      segMesh.receiveShadow = true;
      group.add(segMesh);
    }
  } else {
    const floorGeo = new THREE.BoxGeometry(cs, 0.08, channelW);
    const floorMat = makeTexturedFloorMaterial(0xd6b683, { roughness: 0.92 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(0, 0.04, 0);
    floor.receiveShadow = true;
    group.add(floor);
  }

  // ---- Pegs (pinball-style obstacles) ----
  // Cylinders sticking up from the channel floor. Marble physics treats them as
  // vertical infinite walls at their (x, z) — bouncing the marble away in the XZ plane.
  if (c.pegs && c.pegs.length > 0) {
    const pegRadius = 0.18;
    const pegHeight = wallH * 0.95;
    const pegGeo = new THREE.CylinderGeometry(pegRadius, pegRadius, pegHeight, 12);
    // Wood-stained peg material with a painted-ball cap
    const pegMat = baseMat; // matches the block's wood tone
    const capMat = paintMat; // painted accent matching the block's trim
    for (const peg of c.pegs) {
      const mesh = new THREE.Mesh(pegGeo, pegMat);
      mesh.position.set(peg.x, pegHeight / 2, peg.z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      group.add(mesh);

      // Painted ball cap on top
      const capGeo = new THREE.SphereGeometry(pegRadius * 1.25, 12, 10);
      const cap = new THREE.Mesh(capGeo, capMat);
      cap.position.set(peg.x, pegHeight + 0.05, peg.z);
      cap.castShadow = true;
      group.add(cap);

      // Save the visual mesh so physics can query its world position
      peg._mesh = mesh;
      peg._radius = pegRadius;
    }
  }

  // ---- Fan wheel (spinning paddle that deflects marbles) ----
  if (c.hasFan) {
    // The fan sits dead-center in the cell, spinning around a vertical Y axis.
    // Four flat paddle blades arranged in a + pattern. Blades reach almost to the
    // channel walls so marbles must wait for / get deflected by them.
    const fanGroup = new THREE.Group();
    fanGroup.position.set(0, 0.04 + 0.02, 0);

    // Hub: a small short cylinder marking the spin axis
    const hubGeo = new THREE.CylinderGeometry(0.16, 0.16, wallH * 0.7, 10);
    const hub = new THREE.Mesh(hubGeo, baseMat);
    hub.position.y = wallH * 0.35;
    hub.castShadow = true;
    fanGroup.add(hub);

    // Four blades — thin painted boxes radiating outward in +X, +Z, -X, -Z directions.
    // Reach: just shy of the channel walls so they always sweep the marble.
    const bladeReach = CONFIG.trackWidth / 2 - 0.05;  // ~0.96
    const bladeT = 0.10;                              // thickness
    const bladeH = wallH * 0.65;                      // height
    const bladeGeo = new THREE.BoxGeometry(bladeReach, bladeH, bladeT);
    for (let b = 0; b < 4; b++) {
      const blade = new THREE.Mesh(bladeGeo, paintMat);
      // Box is centered at origin extending in ±X by reach/2. Translate so the inner
      // end sits at the hub and the outer end is at radius bladeReach.
      // Place center at (reach/2, height/2, 0) then rotate group by b * 90° around Y.
      const armPivot = new THREE.Group();
      armPivot.rotation.y = b * (Math.PI / 2);
      blade.position.set(bladeReach / 2, bladeH / 2 + 0.02, 0);
      blade.castShadow = true;
      armPivot.add(blade);
      fanGroup.add(armPivot);
    }

    // Top cap so the hub looks finished
    const capGeo = new THREE.SphereGeometry(0.22, 12, 8);
    const cap = new THREE.Mesh(capGeo, baseMat);
    cap.position.y = wallH * 0.7 + 0.05;
    cap.castShadow = true;
    fanGroup.add(cap);

    group.add(fanGroup);

    // Stash the fan group + params on the cell so physics + animation can find it.
    c._fan = {
      group: fanGroup,
      bladeReach,
      bladeT,
      angularVel: 1.6,  // radians/sec — moderate spin
      angle: 0,         // current rotation (radians)
    };
  }

  // Orientation is handled by the outer group (dispatcher).
}


function buildRampChannel(group, c, baseMat, paintMat) {
  const cs = CONFIG.cellSize;
  const channelW = CONFIG.trackWidth;
  const wallH = CONFIG.wallHeight;
  const wallThick = (cs - channelW) / 2;
  const bh = CONFIG.blockHeight;
  const baseT = CONFIG.blockBaseThickness;

  // Ramp drops by bh across cs distance. Slope angle:
  const slope = Math.atan2(bh, cs); // radians
  const cosS = Math.cos(slope);
  const sinS = Math.sin(slope);
  const ramplen = Math.sqrt(cs*cs + bh*bh);

  // ---- WEDGE BLOCK: the wooden support beneath the ramp ----
  // A triangular prism: bottom face flat at y = -bh - baseT, top sloped from y=0 at x=-cs/2
  // down to y = -bh at x=+cs/2. Cross-section (in XY plane) is a right trapezoid:
  //   corners: (-cs/2, -bh-baseT), (-cs/2, 0), (cs/2, -bh), (cs/2, -bh-baseT)
  // Extruded in Z from -cs/2 to +cs/2 (full cell width).
  const wedgeGroup = new THREE.Group();

  // Build the wedge as a custom BufferGeometry
  const halfCS = cs / 2;
  const halfCSz = cs * 0.48; // slightly under cs/2 for a small visual margin
  const bottomY = -bh - baseT;
  const highY = 0;          // top-left corner (high end of ramp top surface)
  const lowY = -bh;         // top-right corner (low end of ramp top surface)

  // 6 vertices for a triangular prism (2 trapezoidal end caps + bottom + sloped top + two end walls)
  // Vertices (x, y, z):
  // 0: (-halfCS, bottomY, -halfCSz)  bottom-back-left
  // 1: (+halfCS, bottomY, -halfCSz)  bottom-back-right
  // 2: (+halfCS, lowY,    -halfCSz)  top-back-right (low end)
  // 3: (-halfCS, highY,   -halfCSz)  top-back-left (high end)
  // 4: (-halfCS, bottomY, +halfCSz)  bottom-front-left
  // 5: (+halfCS, bottomY, +halfCSz)  bottom-front-right
  // 6: (+halfCS, lowY,    +halfCSz)  top-front-right
  // 7: (-halfCS, highY,   +halfCSz)  top-front-left
  const verts = new Float32Array([
    -halfCS, bottomY, -halfCSz,   //0
     halfCS, bottomY, -halfCSz,   //1
     halfCS, lowY,    -halfCSz,   //2
    -halfCS, highY,   -halfCSz,   //3
    -halfCS, bottomY,  halfCSz,   //4
     halfCS, bottomY,  halfCSz,   //5
     halfCS, lowY,     halfCSz,   //6
    -halfCS, highY,    halfCSz,   //7
  ]);
  // Indices for 5 quads (10 tris): bottom, sloped top, two trapezoid ends, low vertical end
  // Bottom face (y = bottomY): 0,1,5,4
  // Sloped top: 3,2,6,7
  // Back end (z = -halfCSz, trapezoid): 0,3,2,1
  // Front end (z = +halfCSz, trapezoid): 4,5,6,7  (reverse winding to face +Z)
  // Low end vertical (x = +halfCS, between bottomY and lowY): 1,2,6,5
  // No "high end vertical" — at x = -halfCS, the wedge top meets the side at the same height as
  // adjacent blocks, so we'll add a closing rect from bottomY to highY there too.
  // High end vertical (x = -halfCS): 0,4,7,3
  const idx = [
    // bottom (facing -Y): 0,4,5 / 0,5,1
    0, 4, 5,   0, 5, 1,
    // sloped top (facing +Y mostly): 3,2,6 / 3,6,7
    3, 2, 6,   3, 6, 7,
    // back trapezoid (facing -Z): 0,1,2 / 0,2,3
    0, 1, 2,   0, 2, 3,
    // front trapezoid (facing +Z): 4,7,6 / 4,6,5
    4, 7, 6,   4, 6, 5,
    // low end vertical (facing +X): 1,5,6 / 1,6,2
    1, 5, 6,   1, 6, 2,
    // high end vertical (facing -X): 0,3,7 / 0,7,4
    0, 3, 7,   0, 7, 4,
  ];

  const wedgeGeo = new THREE.BufferGeometry();
  wedgeGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  wedgeGeo.setIndex(idx);
  wedgeGeo.computeVertexNormals();

  const wedge = new THREE.Mesh(wedgeGeo, baseMat);
  wedge.castShadow = true;
  wedge.receiveShadow = true;
  group.add(wedge);

  // Painted stripe along both side edges of the sloped top (decorative)
  // Stripe runs along the slope on each Z edge.
  for (const sign of [-1, 1]) {
    const stripeGeo = new THREE.BoxGeometry(ramplen, 0.06, wallThick * 0.85);
    const stripe = new THREE.Mesh(stripeGeo, paintMat);
    // Position at top of slope, between channel and edge of wedge
    stripe.position.set(0, -bh / 2 + 0.03 * cosS, sign * (channelW / 2 + wallThick / 2));
    stripe.rotation.z = -slope; // matches wedge top: +X end DOWN
    group.add(stripe);
  }

  // ---- CHANNEL FLOOR: sloped wooden plank ----
  // Sits on top of the wedge, slightly raised. Slopes DOWN from -X (entry, high) to
  // +X (exit, low), matching the wedge beneath.
  const floorGeo = new THREE.BoxGeometry(ramplen * 1.02, 0.1, channelW);
  const floorMat = makeTexturedFloorMaterial(0xd6b683, { roughness: 0.92 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  // Midpoint of ramp surface: (0, -bh/2)
  floor.position.set(0, -bh / 2 + 0.05 * cosS, 0);
  floor.rotation.z = -slope; // negative: +X end goes DOWN (matches wedge top slope)
  floor.receiveShadow = true;
  floor.castShadow = true;
  group.add(floor);

  // ---- SIDE WALLS — sloped to match the ramp ----
  const wallGeo = new THREE.BoxGeometry(ramplen, wallH, wallThick);
  for (const sign of [-1, 1]) {
    const wall = new THREE.Mesh(wallGeo, baseMat);
    wall.position.set(0, -bh / 2 + (wallH / 2 + 0.1) * cosS, sign * (channelW / 2 + wallThick / 2));
    wall.rotation.z = -slope; // negative: +X end DOWN
    wall.castShadow = true;
    wall.receiveShadow = true;
    group.add(wall);

    // Painted top stripe on wall
    const stripeGeo = new THREE.BoxGeometry(ramplen * 0.98, 0.06, wallThick * 0.85);
    const stripe = new THREE.Mesh(stripeGeo, paintMat);
    stripe.position.set(0, -bh / 2 + (wallH + 0.13) * cosS, sign * (channelW / 2 + wallThick / 2));
    stripe.rotation.z = -slope; // negative: +X end DOWN
    group.add(stripe);
  }

  // Orientation is handled by the outer group (dispatcher).
}

// =========================================================
// STEP RAMP — straight cell with a discrete ledge in the middle
// =========================================================
// Layout in cell-local frame (+X = direction of travel, inner-group origin at cell center):
//   • Upper floor: from x = -cs/2 to x = 0, at y = 0      (= world entryY after outer shift)
//   • Vertical ledge wall: at x ≈ 0, from y = -bh to y = 0
//   • Lower floor: from x = 0 to x = +cs/2, at y = -bh    (= world exitY)
//   • Side walls extend continuously across the cell, tall enough to span both heights.
//   • Block body: TWO stacked slabs — full-depth upper slab from x = -cs/2 to x = 0 at
//     top-y=0, and full-depth lower slab from x = 0 to x = +cs/2 at top-y=-bh.
function buildStepRampChannel(group, c, baseMat, paintMat) {
  const cs = CONFIG.cellSize;
  const channelW = CONFIG.trackWidth;
  const wallH = CONFIG.wallHeight;
  const wallThick = (cs - channelW) / 2;
  const bh = CONFIG.blockHeight;
  const baseT = CONFIG.blockBaseThickness;

  // ---- BLOCK BODY: two stacked slabs ----
  // Upper slab (entry half): top at y=0, full depth, occupies x ∈ [-cs/2, 0].
  // Lower slab (exit half): top at y=-bh, deeper bottom so it can reach the table.
  //   bottom = -bh - baseT relative to upper slab's reference.
  const upperHalfLen = cs / 2;
  const upperGeo = new THREE.BoxGeometry(upperHalfLen, baseT, cs * 0.99);
  const upper = new THREE.Mesh(upperGeo, baseMat);
  upper.position.set(-cs / 4, -baseT / 2, 0);   // centered in upper half, top at y=0
  upper.castShadow = true;
  upper.receiveShadow = true;
  group.add(upper);

  // Painted trim on top of the upper slab (entry-side decorative band)
  const upperTrimGeo = new THREE.BoxGeometry(upperHalfLen, 0.04, cs * 0.99);
  const upperTrim = new THREE.Mesh(upperTrimGeo, paintMat);
  upperTrim.position.set(-cs / 4, 0.02, 0);
  upperTrim.receiveShadow = true;
  group.add(upperTrim);

  // Lower slab (exit half). Top is at y = -bh, body extends down by bh + baseT so its
  // bottom matches the typical ramp/cell underside (= -bh - baseT). Width along x is
  // half the cell.
  const lowerHalfLen = cs / 2;
  const lowerThick = bh + baseT;
  const lowerGeo = new THREE.BoxGeometry(lowerHalfLen, lowerThick, cs * 0.99);
  const lower = new THREE.Mesh(lowerGeo, baseMat);
  lower.position.set(cs / 4, -bh - lowerThick / 2 + lowerThick / 2 - lowerThick / 2, 0);
  // Reposition the lower slab cleanly: top at y = -bh, height lowerThick, so center y = -bh - lowerThick/2
  lower.position.set(cs / 4, -bh - lowerThick / 2, 0);
  lower.castShadow = true;
  lower.receiveShadow = true;
  group.add(lower);

  // Painted trim on top of the lower slab (visible from above through the gap)
  const lowerTrimGeo = new THREE.BoxGeometry(lowerHalfLen, 0.04, cs * 0.99);
  const lowerTrim = new THREE.Mesh(lowerTrimGeo, paintMat);
  lowerTrim.position.set(cs / 4, -bh + 0.02, 0);
  lowerTrim.receiveShadow = true;
  group.add(lowerTrim);

  // ---- LEDGE FACE: the vertical wall between upper and lower floors at x=0 ----
  // Visible only across the channel WIDTH (between the side walls). Painted in the
  // accent color so the step reads clearly.
  const ledgeGeo = new THREE.BoxGeometry(0.08, bh, channelW);
  const ledge = new THREE.Mesh(ledgeGeo, paintMat);
  ledge.position.set(0, -bh / 2, 0);   // x=0 (the ledge plane), centered vertically between 0 and -bh
  ledge.castShadow = true;
  ledge.receiveShadow = true;
  group.add(ledge);

  // ---- FLOOR PANELS: thin floor inset slightly above each slab so the surface has a
  // ribbed-floor look like the rest of the channels ----
  const floorMat = makeTexturedFloorMaterial(0xd6b683, { roughness: 0.92 });
  // Upper floor: span [-cs/2, 0] in x, channelW in z.
  const upperFloorGeo = new THREE.BoxGeometry(upperHalfLen, 0.08, channelW);
  const upperFloor = new THREE.Mesh(upperFloorGeo, floorMat);
  upperFloor.position.set(-cs / 4, 0.04, 0);
  upperFloor.receiveShadow = true;
  group.add(upperFloor);
  // Lower floor: span [0, cs/2] in x, at y=-bh + 0.04.
  const lowerFloorGeo = new THREE.BoxGeometry(lowerHalfLen, 0.08, channelW);
  const lowerFloor = new THREE.Mesh(lowerFloorGeo, floorMat);
  lowerFloor.position.set(cs / 4, -bh + 0.04, 0);
  lowerFloor.receiveShadow = true;
  group.add(lowerFloor);

  // ---- SIDE WALLS: extend the full cell length, tall enough to span both floor
  // heights. Wall top is at y = wallH (above the UPPER floor). Wall bottom is at
  // y = -bh - 0.1 (just below the LOWER floor) so it touches the lower slab.
  const wallTopY = wallH;
  const wallBotY = -bh - 0.1;
  const wallHeightTotal = wallTopY - wallBotY;
  const wallCenterY = (wallTopY + wallBotY) / 2;
  for (const sz of [-1, 1]) {
    const wallGeo = new THREE.BoxGeometry(cs, wallHeightTotal, wallThick);
    const wall = new THREE.Mesh(wallGeo, baseMat);
    wall.position.set(0, wallCenterY, sz * (channelW / 2 + wallThick / 2));
    wall.castShadow = true;
    wall.receiveShadow = true;
    group.add(wall);

    // Painted stripe on wall TOP (matches the look of straight-channel walls)
    const stripeGeo = new THREE.BoxGeometry(cs, 0.06, wallThick * 0.85);
    const stripe = new THREE.Mesh(stripeGeo, paintMat);
    stripe.position.set(0, wallTopY + 0.03, sz * (channelW / 2 + wallThick / 2));
    group.add(stripe);
  }

  // Orientation is handled by the outer group (dispatcher).
}

function buildCornerChannel(group, c, baseMat, paintMat) {
  const cs = CONFIG.cellSize;
  const channelW = CONFIG.trackWidth;
  const wallH = CONFIG.wallHeight;
  const wallThick = (cs - channelW) / 2;

  // A corner connects inDir entry to outDir exit.
  // In cell-local frame, the entry is on the edge facing (inDir+2)%4, the exit on edge facing outDir.
  // We compute the relative turn: left (in -> out is left turn) or right.
  const turn = ((c.outDir - c.inDir) + 4) % 4;
  // turn == 1 means RIGHT turn; turn == 3 means LEFT turn.

  // For the curved channel, we build:
  //   - A quarter-arc floor (flat) using a partial ring shape
  //   - Inner wall: shorter quarter-arc
  //   - Outer wall: longer quarter-arc
  //
  // In cell-local frame, place the corner with entry on the -X edge and exit on either +Z (right) or -Z (left).

  const isRight = (turn === 1);
  const exitSign = isRight ? 1 : -1; // +Z for right, -Z for left in our cell-local frame
                                       // (where entry comes from -X)

  // The corner pivot is at the cell corner: (cs/2, 0, exitSign * cs/2) ... wait that's the OUTSIDE corner.
  // The inside corner (where channel is closest to) is at (-cs/2, 0, exitSign * cs/2)? No.
  // Let's think: entry edge midpoint is at (-cs/2, 0, 0). Exit edge midpoint is at (0, 0, exitSign*cs/2).
  // The arc connecting these has center at (-cs/2, 0, exitSign*cs/2) — that's the corner of the cell
  // OPPOSITE to both edge midpoints? No, it's the corner adjacent to both.
  // Actually, for a quarter-circle from entry edge midpoint to exit edge midpoint passing through the
  // cell, the center should be at the corner (-cs/2, 0, exitSign*cs/2). The radius equals cs/2.
  // At entry: vector from center to entry midpoint is (0, 0, -exitSign*cs/2), length cs/2. ✓
  // At exit: vector from center to exit midpoint is (cs/2, 0, 0), length cs/2. ✓

  const arcCenter = new THREE.Vector3(-cs/2, 0, exitSign * cs/2);
  const arcRadius = cs / 2;
  // Channel goes from innerRadius to outerRadius (channelW wide).
  // Walls sit OUTSIDE this band: inner wall is centered at innerRadius - wallThick/2,
  // outer wall is centered at outerRadius + wallThick/2. This way the inner face of
  // each wall is flush with the channel edge — matching how the straight channel works.
  const innerRadius = arcRadius - channelW / 2;
  const outerRadius = arcRadius + channelW / 2;
  const innerWallRadius = innerRadius - wallThick / 2;
  const outerWallRadius = outerRadius + wallThick / 2;

  // Determine angle range. Entry direction (from center to entry midpoint) and exit direction.
  // Entry vector: (0, 0, -exitSign * cs/2) -> angle on XZ plane
  // We'll use atan2(z, x). Entry: atan2(-exitSign * cs/2, 0) = -exitSign * PI/2.
  // Exit: atan2(0, cs/2) = 0.
  // For right turn (exitSign=+1): from atan2(-cs/2, 0) = -PI/2 to atan2(0, cs/2) = 0 — counterclockwise.
  // For left turn (exitSign=-1): from atan2(+cs/2, 0) = +PI/2 to 0 — clockwise.

  const startAngle = -exitSign * Math.PI / 2;
  const endAngle = 0;
  const arcSteps = 12;

  // Build channel floor as a series of trapezoidal segments
  const floorMat = makeTexturedFloorMaterial(0xd6b683, { roughness: 0.92 });

  for (let i = 0; i < arcSteps; i++) {
    const t0 = i / arcSteps;
    const t1 = (i + 1) / arcSteps;
    const a0 = startAngle + (endAngle - startAngle) * t0;
    const a1 = startAngle + (endAngle - startAngle) * t1;
    const aMid = (a0 + a1) / 2;

    // Segment center
    const segCx = arcCenter.x + Math.cos(aMid) * arcRadius;
    const segCz = arcCenter.z + Math.sin(aMid) * arcRadius;
    const segLength = Math.abs((a1 - a0) * arcRadius);

    const segGeo = new THREE.BoxGeometry(segLength * 1.02, 0.08, channelW);
    const segMesh = new THREE.Mesh(segGeo, floorMat);
    segMesh.position.set(segCx, 0.04, segCz);
    // Tangent direction at midpoint
    const tangentAngle = aMid + Math.PI / 2 * (isRight ? 1 : -1);
    // Actually the tangent to a circle at angle aMid (CCW) is (-sin(aMid), 0, cos(aMid)).
    // For CW it's (sin(aMid), 0, -cos(aMid)). We use direction of travel.
    // Let's just rotate the box so its long axis aligns with the tangent.
    // The default box long axis is +X. We want it pointing tangent direction.
    const tanX = -Math.sin(aMid) * (isRight ? 1 : -1);
    const tanZ =  Math.cos(aMid) * (isRight ? 1 : -1);
    const rotY = Math.atan2(-tanZ, tanX); // angle to rotate +X axis to align with (tanX, tanZ)
    segMesh.rotation.y = rotY;
    segMesh.receiveShadow = true;
    group.add(segMesh);

    // Inner wall segment — center sits OUTSIDE the channel band
    const innerCx = arcCenter.x + Math.cos(aMid) * innerWallRadius;
    const innerCz = arcCenter.z + Math.sin(aMid) * innerWallRadius;

    const innerSegGeo = new THREE.BoxGeometry(segLength * 1.02, wallH, wallThick);
    const innerMesh = new THREE.Mesh(innerSegGeo, baseMat);
    innerMesh.position.set(innerCx, wallH / 2, innerCz);
    innerMesh.rotation.y = rotY;
    innerMesh.castShadow = true;
    innerMesh.receiveShadow = true;
    group.add(innerMesh);

    // Outer wall segment — center sits OUTSIDE the channel band
    const outerCx = arcCenter.x + Math.cos(aMid) * outerWallRadius;
    const outerCz = arcCenter.z + Math.sin(aMid) * outerWallRadius;
    const outerSegGeo = new THREE.BoxGeometry(segLength * 1.02, wallH, wallThick);
    const outerMesh = new THREE.Mesh(outerSegGeo, baseMat);
    outerMesh.position.set(outerCx, wallH / 2, outerCz);
    outerMesh.rotation.y = rotY;
    outerMesh.castShadow = true;
    outerMesh.receiveShadow = true;
    group.add(outerMesh);

    // Painted stripe on top of walls
    const stripeGeo = new THREE.BoxGeometry(segLength * 1.02, 0.06, wallThick * 0.85);
    const innerStripe = new THREE.Mesh(stripeGeo, paintMat);
    innerStripe.position.set(innerCx, wallH + 0.03, innerCz);
    innerStripe.rotation.y = rotY;
    group.add(innerStripe);

    const outerStripe = new THREE.Mesh(stripeGeo, paintMat);
    outerStripe.position.set(outerCx, wallH + 0.03, outerCz);
    outerStripe.rotation.y = rotY;
    group.add(outerStripe);
  }

  // The corner channel is built in cell-local frame where entry is at -X edge and exit at ±Z edge.
  // Orientation is handled by the outer group (dispatcher).
}

// =========================================================
// START GATE
// =========================================================
let startGateMesh = null;
// Position the gate ~halfway across the first tile. The curve's `t` is arc-length
// parameterized; for our typical 50-110 cell courses the first cell spans roughly
// Position of the start gate along the curve. We want it near the EXIT of the start
// tile (so there's plenty of room behind it for the marble queue to spawn — five
// 0.52-diameter marbles staggered along tangent take ~2.8 units, which needs most of
// the 4-unit start tile to fit). The first tile spans t ∈ [0, 0.009..0.02] depending
// on total course length; 0.009 sits at the very end of even the longest course's
// first tile while staying inside it.
const GATE_T = 0.009;

function buildStartGate() {
  startGateMesh = null;
  const p = curve.getPointAt(GATE_T);
  const tangent = curve.getTangentAt(GATE_T).normalize();
  const right = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0,1,0)).normalize();
  const up = new THREE.Vector3(0, 1, 0);

  // The gate is a chunky painted board hinged at its TOP edge so it can flip FORWARD
  // (in the marbles' travel direction) when opened. We use NESTED groups:
  //   • outerGroup: positioned + oriented so its local axes are (tangent, up, right).
  //   • hingeGroup: child of outerGroup, sits at the gate's top edge in local frame,
  //     and rotates around its local Z to swing the gate forward.
  // The gate mesh hangs DOWNWARD from the hinge so the hinge sits at the gate's top.
  const gateHeight = CONFIG.wallHeight + 0.3;
  const gateThickness = 0.35;
  const gateWidth = CONFIG.trackWidth + 0.3;
  const gateGeo = new THREE.BoxGeometry(gateThickness, gateHeight, gateWidth);
  const gateMat = new THREE.MeshStandardMaterial({
    color: 0xc8504a,
    roughness: 0.5, metalness: 0.0,
  });
  const gateMesh = new THREE.Mesh(gateGeo, gateMat);
  gateMesh.castShadow = true;
  // Inside the hinge group, gate is centered horizontally and extends DOWNWARD from
  // the hinge axis at local y=0.
  gateMesh.position.y = -gateHeight / 2;

  const hingeGroup = new THREE.Group();
  hingeGroup.add(gateMesh);
  // Hinge sits at the gate's TOP edge in outer-group local frame: just above the
  // channel floor at y = gateHeight.
  hingeGroup.position.set(0, gateHeight, 0);

  const outerGroup = new THREE.Group();
  outerGroup.add(hingeGroup);
  outerGroup.position.copy(p);
  // Orient outer group: local +X = tangent, local +Y = up, local +Z = right (cross-track).
  const gateBasis = new THREE.Matrix4().makeBasis(tangent, up, right);
  outerGroup.quaternion.setFromRotationMatrix(gateBasis);

  // Animation state on the OUTER group (since `startGateMesh` is what updateGateAnimation
  // looks at). The animation rotates the inner hingeGroup, not the outer group.
  outerGroup.userData.hingeGroup = hingeGroup;
  outerGroup.userData.closedAngle = 0;
  // Open: rotate ~110° forward around hinge's local +Z so the gate swings past
  // horizontal and tucks up out of the marbles' way. Positive Z rotation takes
  // local -Y (gate hanging direction) toward local +X (travel direction).
  outerGroup.userData.openAngle = Math.PI * 0.62;
  outerGroup.userData.curAngle = 0;

  startGateMesh = outerGroup;
  addToWorld(outerGroup);

  // Decorative posts on either side
  const postGeo = new THREE.CylinderGeometry(0.18, 0.18, CONFIG.wallHeight + 1.4, 10);
  const postMat = makeWoodMaterial(WOOD_COLORS.veryDark);
  for (const side of [-1, 1]) {
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.copy(p)
      .add(right.clone().multiplyScalar(side * (CONFIG.trackWidth/2 + 0.4)))
      .add(new THREE.Vector3(0, (CONFIG.wallHeight + 1.4)/2, 0));
    post.castShadow = true;
    addToWorld(post);

    // Ball top
    const ballGeo = new THREE.SphereGeometry(0.28, 12, 8);
    const ballMat = makeWoodMaterial(0xc8504a, { roughness: 0.5 });
    const ball = new THREE.Mesh(ballGeo, ballMat);
    ball.position.copy(post.position);
    ball.position.y += (CONFIG.wallHeight + 1.4) / 2 + 0.15;
    ball.castShadow = true;
    addToWorld(ball);
  }
}

// =========================================================
// FINISH MARKER
// =========================================================
function buildFinishLine() {
  // Anchor the finish line just PAST the exit edge of the finish cell so it
  // sits in open air rather than at the cell boundary (where it tended to
  // intersect with whatever the next cell's geometry happened to be).
  const finishCell = pathCells[pathCells.length - 1];
  const p = edgePoint(finishCell.gx, finishCell.gy, finishCell.gz, finishCell.outDir);
  p.y = finishCell.exitY;
  // Push the anchor point forward by a fraction of a cell along outDir.
  const _dirV = DIRS[finishCell.outDir];
  p.x += _dirV.dx * 0.6;
  p.z += _dirV.dz * 0.6;

  // Tangent at the finish cell's exit — points in the outDir direction.
  const dirVec = DIRS[finishCell.outDir];
  const tangent = new THREE.Vector3(dirVec.dx, 0, dirVec.dz).normalize();
  const right = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0,1,0)).normalize();
  const up = new THREE.Vector3(0, 1, 0);

  // Two wooden posts with a checkered flag banner
  const postGeo = new THREE.CylinderGeometry(0.15, 0.15, CONFIG.wallHeight + 2.5, 10);
  const postMat = makeWoodMaterial(WOOD_COLORS.veryDark);
  const bannerWidth = CONFIG.trackWidth + 0.6;
  const poleHeight = CONFIG.wallHeight + 2.5;

  finishPostTops.length = 0;
  for (const side of [-1, 1]) {
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.copy(p)
      .add(right.clone().multiplyScalar(side * bannerWidth / 2))
      .add(new THREE.Vector3(0, poleHeight / 2, 0));
    post.castShadow = true;
    addToWorld(post);

    // Cap ball
    const ballGeo = new THREE.SphereGeometry(0.22, 12, 8);
    const ball = new THREE.Mesh(ballGeo, makeWoodMaterial(0xf0ad4e, { roughness: 0.5 }));
    ball.position.copy(post.position);
    ball.position.y += poleHeight / 2 + 0.1;
    ball.castShadow = true;
    addToWorld(ball);

    // Remember the top of the post for confetti origin
    finishPostTops.push(ball.position.clone());
  }

  // Checkered banner
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const cols = 16, rows = 4;
  const cw = canvas.width / cols;
  const ch = canvas.height / rows;
  for (let r = 0; r < rows; r++) {
    for (let cc = 0; cc < cols; cc++) {
      ctx.fillStyle = ((r + cc) % 2 === 0) ? '#ffffff' : '#2a1a10';
      ctx.fillRect(cc * cw, r * ch, cw, ch);
    }
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;

  const bannerHeight = 0.7;
  const bannerGeo = new THREE.PlaneGeometry(bannerWidth, bannerHeight);
  // MeshLambertMaterial responds to lighting AND can cast shadows (MeshBasicMaterial can't).
  const bannerMat = new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide });
  const banner = new THREE.Mesh(bannerGeo, bannerMat);
  banner.castShadow = true;
  banner.receiveShadow = true;
  banner.position.copy(p);
  banner.position.y += CONFIG.wallHeight + 1.6;
  const planeForward = new THREE.Vector3().crossVectors(right, up).normalize();
  const bannerBasis = new THREE.Matrix4().makeBasis(right, up, planeForward);
  banner.quaternion.setFromRotationMatrix(bannerBasis);
  addToWorld(banner);
}

// =========================================================
// CONFETTI SYSTEM — bursts from the finish-line posts when marbles cross
// =========================================================
const finishPostTops = [];          // world positions of the post-top balls
const confettiParticles = [];        // active particles {mesh, vel, angVel, ttl, maxTtl}
const _confettiColors = [
  0xd9534f, 0x5bc0de, 0x5cb85c, 0xf0ad4e, 0xe06fa6, 0xb678d4, 0xffe066,
];
// Shared per-color materials (avoid creating a new material per particle)
const _confettiMats = _confettiColors.map(c =>
  new THREE.MeshBasicMaterial({ color: c, side: THREE.DoubleSide })
);
const _confettiGeo = new THREE.PlaneGeometry(0.18, 0.12);

function spawnConfettiBurst() {
  if (finishPostTops.length === 0) return;
  // ~30 particles from each post, with upward velocity + outward spread
  for (const origin of finishPostTops) {
    const count = 30 + Math.floor(Math.random() * 10);
    for (let i = 0; i < count; i++) {
      const mat = _confettiMats[Math.floor(Math.random() * _confettiMats.length)];
      const mesh = new THREE.Mesh(_confettiGeo, mat);
      mesh.position.copy(origin);
      mesh.position.x += (Math.random() - 0.5) * 0.1;
      mesh.position.y += 0.1;
      mesh.position.z += (Math.random() - 0.5) * 0.1;
      // Random initial rotation
      mesh.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2
      );
      // Random velocity: mostly upward with a horizontal spread
      const speedH = 2 + Math.random() * 3;
      const speedV = 4 + Math.random() * 3;
      const angle = Math.random() * Math.PI * 2;
      const vel = new THREE.Vector3(
        Math.cos(angle) * speedH,
        speedV,
        Math.sin(angle) * speedH
      );
      // Random angular velocity around random axis
      const angVel = new THREE.Vector3(
        (Math.random() - 0.5) * 12,
        (Math.random() - 0.5) * 12,
        (Math.random() - 0.5) * 12
      );
      const ttl = 1.6 + Math.random() * 1.2;
      scene.add(mesh);
      confettiParticles.push({ mesh, vel, angVel, ttl, maxTtl: ttl });
    }
  }
}

function updateConfetti(dt) {
  if (confettiParticles.length === 0) return;
  const gravity = 10;
  const drag = 1.5;
  for (let i = confettiParticles.length - 1; i >= 0; i--) {
    const p = confettiParticles[i];
    p.ttl -= dt;
    if (p.ttl <= 0) {
      scene.remove(p.mesh);
      confettiParticles.splice(i, 1);
      continue;
    }
    // Update velocity (gravity + simple drag)
    p.vel.y -= gravity * dt;
    p.vel.multiplyScalar(Math.exp(-drag * dt * 0.3));
    // Update position
    p.mesh.position.addScaledVector(p.vel, dt);
    // Update rotation
    p.mesh.rotation.x += p.angVel.x * dt;
    p.mesh.rotation.y += p.angVel.y * dt;
    p.mesh.rotation.z += p.angVel.z * dt;
    // Fade out near end of life: use opacity if material allows.
    // Since we share materials we can't fade per-particle without per-particle materials.
    // Instead just rely on TTL pop.
  }
}

function clearConfetti() {
  for (const p of confettiParticles) scene.remove(p.mesh);
  confettiParticles.length = 0;
}

// Spin each fan around its local Y axis. The fan group sits at the cell center inside
// the channelPiece's tilted innerGroup, so rotating it around its OWN Y is fine — the
// rotation is local to the fan, regardless of how its parent cell is oriented.
// Visual sync only — the fan ANGLE is advanced inside stepPhysics at the fixed
// timestep (marbles collide with the blades, so blade phase must be part of
// the deterministic simulation, not tied to render frame rate).
function updateFans(dt) {
  for (const f of allFans) {
    f.fan.group.rotation.y = f.fan.angle;
  }
}

// =========================================================
// MARBLES
// =========================================================
const marbles = [];

function createMarbles() {
  // Remove any existing marble meshes before rebuilding so repeated
  // prepare/reset cycles (e.g. a tournament resetting the course between races)
  // can't leave a ghost set of marbles stranded at the start line.
  for (const m of marbles) {
    if (m.mesh && m.mesh.parent) m.mesh.parent.remove(m.mesh);
  }
  marbles.length = 0;

  // Marbles spawn in a row across the WIDTH of the start tile, just behind the gate.
  // The start tile uses the 'startFlare' wall shape which widens the channel at the
  // back end specifically so all 5 marbles fit side-by-side without overlapping.
  const gatePos = curve.getPointAt(GATE_T);
  const tangent = curve.getTangentAt(GATE_T).normalize();
  const right = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0,1,0)).normalize();

  // The flared channel at the back of the start tile is ~3.12 units wide. Marbles
  // need to fit with at least a tiny gap so the physics doesn't have to resolve
  // overlap on frame 1 (which produces a visible "pop" jump as the collision
  // resolution kicks in). Spacing = diameter + small clearance.
  const rowDistBehindGate = CONFIG.cellSize * 0.55;  // ~2.2 units back, into the wide section
  const rowCenter = gatePos.clone().addScaledVector(tangent, -rowDistBehindGate);
  const diameter = CONFIG.marbleRadius * 2;
  const clearance = 0.04;   // small gap between adjacent marbles
  const spacing = diameter + clearance;
  // Center the row around the channel center (lateral=0).
  const rowSpan = (CONFIG.marbleCount - 1) * spacing;

  // Build a shuffled color order so each race has marbles in DIFFERENT lane positions.
  // Real race-track marbles don't have a fixed lane — randomizing makes outcomes feel
  // less predetermined. We Fisher-Yates shuffle a copy of COLORS so colors stay
  // unique per marble (no two same-colored marbles in one race).
  const shuffledColors = COLORS.slice(0, CONFIG.marbleCount);
  for (let i = shuffledColors.length - 1; i > 0; i--) {
    const j = Math.floor(laneRng() * (i + 1));
    [shuffledColors[i], shuffledColors[j]] = [shuffledColors[j], shuffledColors[i]];
  }

  for (let i = 0; i < CONFIG.marbleCount; i++) {
    const color = shuffledColors[i];

    const geometry = new THREE.SphereGeometry(CONFIG.marbleRadius, 24, 24);
    const material = new THREE.MeshStandardMaterial({
      color,
      roughness: 0.35, metalness: 0.05,
      emissive: color, emissiveIntensity: 0.05,
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.visible = true;
    mesh.userData.isMarble = true;

    const lateral = -rowSpan / 2 + i * spacing;
    const pos = rowCenter.clone()
      .addScaledVector(right, lateral)
      .add(new THREE.Vector3(0, CONFIG.marbleRadius + 0.05, 0));

    mesh.position.copy(pos);
    addToWorld(mesh);

    marbles.push({
      // Name follows the COLOR, not the lane position — since colors are shuffled
      // per race, looking up by `NAMES[i]` (lane index) would label a green marble
      // as "RED". Resolve by finding the color's index in the original COLORS array.
      name: NAMES[COLORS.indexOf(color)] || 'MARBLE',
      color,
      mesh,
      pos: pos.clone(),
      // Canonical spawn transform — beginRace() snaps back to this at gate-open
      // so every race starts from a bit-identical state regardless of how long
      // the marbles sat idle (and settled) beforehand.
      spawnPos: pos.clone(),
      vel: new THREE.Vector3(0, 0, 0),
      finished: false,
      finishTime: null,
      progress: 0,
      onPodium: false,
      stuckTime: 0,
      // Stepramp cell index that this marble has already been "kicked off the ledge"
      // from. Prevents repeated boosting during the brief moment the marble is in
      // the air above the lower floor. Reset when leaving the cell.
      stepRampBoostedCellIdx: -1,
      // Type of the cell the marble was in on the PREVIOUS physics step. Lets us
      // detect transitions (ramp → flat) so we can fire a one-shot "ramp exit
      // bounce" when the marble rolls off the end of a slope onto a flat tile.
      prevCellType: 'start',
    });
  }
}

// Decide the seed for the UPCOMING race and place the marbles accordingly.
// The lane shuffle draws from laneRng (derived from SEEDS.race), so lane order
// is part of the race record — a replay with the same seed reproduces it.
// Pass an explicit raceSeed to replay/schedule a specific race (this is the
// hook a tournament server will use); with no argument a fresh seed is rolled
// unless the URL pinned one.
function prepareRace(raceSeed) {
  if (raceSeed !== undefined) {
    SEEDS.race = raceSeed >>> 0;
  } else if (!SEEDS.pinnedRace) {
    SEEDS.race = randomSeed32();
  }
  _laneRand = makeRng((SEEDS.race ^ 0x5F356495) >>> 0);
  console.log(`[determinism] next race seed: ${SEEDS.race}`);
  createMarbles();
}

// Start the race deterministically. Called at the exact moment the gate opens:
//  1. Snap every marble to its canonical spawn transform (kills any drift from
//     idle-frame settling — imperceptible visually, critical for determinism).
//  2. Reseed the physics stream from SEEDS.race, so draw #1 of the race is
//     always the same number.
//  3. Zero the sim clock so finish times are deterministic sim-seconds.
function beginRace() {
  for (const m of marbles) {
    m.pos.copy(m.spawnPos);
    m.vel.set(0, 0, 0);
    m.mesh.position.copy(m.pos);
    m.progress = 0;
  }
  // Fan blade phase affects marble collisions, so it resets with the race —
  // paddles are always in the same position at gate-open on every client.
  for (const f of allFans) f.fan.angle = 0;
  _raceRand = makeRng(SEEDS.race);
  simTime = 0;
  STATE.gateOpen = true;
  STATE.raceStarted = true;
  console.log(`[determinism] race started — replay this exact race with ?track=${SEEDS.track}&race=${SEEDS.race}`);
}

// =========================================================
// BUILD WORLD
