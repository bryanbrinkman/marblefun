<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wooden Marble Run</title>
<script>
  // When embedded in the tournament viewer (?embed=1), tag the document so the
  // game's own control bar is hidden and its leaderboard clears the host top bar.
  try { if (location.search.indexOf('embed') >= 0) document.documentElement.classList.add('embed'); } catch (e) {}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* Embedded (tournament) mode: the host drives the race, so drop the RACE/NEW
     buttons and move the remaining controls (camera, sound, fullscreen) to the
     left, above the leaderboard. */
  html.embed #startBtn, html.embed #restart { display: none !important; }
  html.embed #topMenu { top: 66px !important; left: 24px !important; right: auto !important; }
  html.embed #ui { top: 116px !important; }
  @media (max-width: 720px) {
    html.embed #topMenu { top: 98px !important; left: 16px !important; }
    html.embed #ui { top: 148px !important; left: 16px !important; }
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    /* Light blue (top) to light tan (bottom) sky gradient. Canvas is transparent so
       this shows through behind the scene geometry. */
    background: linear-gradient(to bottom, #b8d8ec 0%, #d6c8a8 60%, #e8dcc4 100%);
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  canvas { display: block; }

  #ui {
    position: fixed; top: 24px; left: 24px;
    color: #3a2817; z-index: 10;
  }
  #title {
    font-weight: bold; margin-bottom: 12px;
    letter-spacing: 0.15em; font-size: 13px;
    text-transform: uppercase;
    color: #5a3a1f;
  }
  #leaderboard {
    display: flex; flex-direction: column; gap: 8px;
    font-size: 14px;
    background: rgba(255, 248, 230, 0.85);
    padding: 14px 18px;
    border-radius: 4px;
    border: 2px solid #8b6f47;
    box-shadow: 0 4px 0 #6b5535, 0 6px 12px rgba(0,0,0,0.15);
  }
  .row { display: flex; gap: 10px; align-items: center; }
  .dot {
    width: 14px; height: 14px; border-radius: 999px;
    border: 2px solid #3a2817;
  }
  .pct { opacity: 0.6; margin-left: 6px; font-size: 11px; }
  .ribbon {
    display: inline-block;
    margin-left: 6px;
    font-size: 16px;
    animation: ribbon-bounce 1.2s ease-in-out infinite;
    transform-origin: center;
  }
  .winner-row { font-weight: bold; }
  @keyframes ribbon-bounce {
    0%, 100% { transform: scale(1) rotate(-6deg); }
    50% { transform: scale(1.15) rotate(6deg); }
  }

  /* Top-right menu bar — all the global controls in one compact grouped widget.
     Beige wood-tone buttons sit shoulder-to-shoulder, sharing borders for a chunky
     toolbar look. Race button has a green "ready to race" accent and switches off
     once the race begins. */
  #topMenu {
    position: fixed; top: 18px; right: 18px;
    display: flex; gap: 6px;
    z-index: 10;
  }
  #topMenu button {
    background: #d4a574;
    color: #3a2817;
    border: 2px solid #8b6f47;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 3px 0 #6b5535;
    transition: background 0.12s, transform 0.08s;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 4px;
    height: 40px;
    min-width: 40px;
  }
  #topMenu button:hover { background: #e0b585; }
  #topMenu button:active { transform: translateY(2px); box-shadow: 0 1px 0 #6b5535; }
  #topMenu button svg { width: 16px; height: 16px; display: block; }
  #topMenu button.icon-text {
    padding: 0 10px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* RACE button: vivid green "ready" accent at the start of a race. A gentle
     pulse animation draws the eye to the call-to-action without being
     distracting. Pulse stops once the race begins (when .hidden is applied)
     or when the button morphs into RE-RACE (the rerace class). */
  #startBtn {
    background: #6db83e;
    border-color: #3d7820;
    box-shadow: 0 3px 0 #2e5c18, 0 0 0 0 rgba(109, 184, 62, 0.7);
    animation: startPulse 1.8s ease-in-out infinite;
  }
  #startBtn:hover { background: #7fc94f; animation: none; }
  #startBtn:active { box-shadow: 0 1px 0 #2e5c18; animation: none; }
  #startBtn.hidden { display: none; }
  #startBtn.rerace { animation: none; }   /* re-race state uses red, not green */

  @keyframes startPulse {
    0%, 100% {
      box-shadow: 0 3px 0 #2e5c18, 0 0 0 0 rgba(109, 184, 62, 0.55);
    }
    50% {
      box-shadow: 0 3px 0 #2e5c18, 0 0 0 8px rgba(109, 184, 62, 0);
    }
  }

  /* Fullscreen icon — corner brackets. Hidden state swaps to inward brackets. */
  #fsBtn .icon-exit { display: none; }
  #fsBtn.expanded .icon-enter { display: none; }
  #fsBtn.expanded .icon-exit  { display: block; }

  /* Sound button — swaps between speaker-with-waves (on) and speaker-with-X (off).
     Default state: muted (off icon visible). Toggling adds the .active class. */
  #soundBtn .icon-on  { display: none; }
  #soundBtn.active .icon-on  { display: block; }
  #soundBtn.active .icon-off { display: none; }

  /* Camera button highlights when a follow cam (action / chase / top) is engaged.
     Subtle green tint signals "tracking the marble" without screaming for attention. */
  #actionCam.active {
    background: #9ec272;
    border-color: #5d8538;
    box-shadow: 0 3px 0 #4a6a2c;
  }
  #actionCam.active:hover { background: #b0d488; }
  #actionCam.active:active { box-shadow: 0 1px 0 #4a6a2c; }

  /* RE-RACE state: when the race finishes, the RACE button transforms in-place
     (text + handler) into a Re-Race button. We use a separate visual state class
     so the button stays in its top-menu slot, just changing color to signal the
     different action. Red accent draws attention as the natural "what next" beat. */
  #startBtn.rerace {
    background: #c8504a;
    color: #fff8e6;
    border-color: #8b3530;
    box-shadow: 0 3px 0 #6b2520;
  }
  #startBtn.rerace:hover { background: #d8605a; }
  #startBtn.rerace:active { box-shadow: 0 1px 0 #6b2520; }

  #hint {
    position: fixed; bottom: 64px; right: 24px;
    color: #5a3a1f; font-size: 11px;
    letter-spacing: 0.15em;
    opacity: 0.6;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Split-screen labels — one per viewport corner. The overlay container fills
     the screen but the labels themselves are anchored to each corner via inline
     style. */
  #splitLabels {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 8;
  }
  .splitLabel {
    position: absolute;
    background: rgba(58, 40, 23, 0.7);
    color: #fff8e6;
    font-family: inherit;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 0.2em;
    padding: 5px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  /* Marble-blast HUD: small banner with control hints. */
  #mbHud {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(58, 40, 23, 0.8);
    color: #fff8e6;
    padding: 10px 20px;
    border-radius: 6px;
    z-index: 10;
    pointer-events: none;
    text-align: center;
    border: 2px solid rgba(255, 248, 230, 0.2);
  }
  #mbHud .mbTitle {
    font-family: inherit; font-size: 14px; font-weight: bold;
    letter-spacing: 0.3em; margin-bottom: 4px;
    color: #ffd76e;
  }
  #mbHud .mbHints {
    font-family: inherit; font-size: 10px;
    letter-spacing: 0.15em; opacity: 0.85;
  }

  /* Loading overlay — full-screen cover during the initial course build. The
     marble loader: an outer conic-gradient ring fills clockwise with progress
     (driven by the --p custom property, 0-100), and the inner circle is styled
     as a glossy glass marble via layered radial gradients (specular highlight
     top-left, soft bounce-light bottom-right, body color shading to a dark
     rim). The percentage reads directly on the marble. */
  #loadingOverlay {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(to bottom, #b8d8ec 0%, #d6c8a8 60%, #e8dcc4 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    transition: opacity 0.5s ease;
  }
  #loadingOverlay.done { opacity: 0; pointer-events: none; }
  #loaderRing {
    --p: 0;
    width: 132px; height: 132px; border-radius: 50%;
    background: conic-gradient(#6db83e calc(var(--p) * 1%), rgba(58, 40, 23, 0.15) 0);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 22px rgba(58, 40, 23, 0.3);
  }
  #loaderMarble {
    width: 112px; height: 112px; border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.45) 10%, rgba(255,255,255,0) 28%),
      radial-gradient(circle at 70% 78%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 30%),
      radial-gradient(circle at 50% 42%, #e8654f 0%, #c94a36 55%, #8e2f22 100%);
    box-shadow: inset -6px -10px 18px rgba(0, 0, 0, 0.28);
    display: flex; align-items: center; justify-content: center;
  }
  #loaderPct {
    font-family: inherit; font-size: 26px; font-weight: bold;
    color: #fff8e6;
    text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    letter-spacing: 0.03em;
  }
  #loaderLabel {
    font-family: inherit; font-size: 12px; font-weight: bold;
    letter-spacing: 0.3em; color: #5a4630;
    text-transform: uppercase;
  }

  /* Tilt-shift overlay — two strips at top and bottom of the screen with a
     backdrop-filter blur, fading toward the sharp middle band. The mask gradient
     keeps the blur strongest at the very edge and easing to fully transparent
     near the focal band. Cheap, no shader work — uses the GPU compositor. */
  #tiltShift {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 7;
  }
  #tiltShift.off { display: none; }
  .tsStrip {
    position: absolute;
    left: 0; right: 0;
    height: 35%;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .tsTop {
    top: 0;
    /* Mask: fully visible at top (full blur), fades to transparent at bottom of strip */
    mask-image: linear-gradient(to bottom, black 0%, black 30%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 30%, transparent 100%);
  }
  .tsBottom {
    bottom: 0;
    /* Mask: fully visible at bottom (full blur), fades to transparent at top of strip */
    mask-image: linear-gradient(to top, black 0%, black 30%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, black 0%, black 30%, transparent 100%);
  }

  /* Mobile: scale UI down significantly so it doesn't dominate the small viewport. */
  @media (max-width: 600px) {
    #ui {
      top: 10px; left: 10px;
    }
    #title {
      font-size: 9px; margin-bottom: 6px;
      letter-spacing: 0.1em;
    }
    #leaderboard {
      font-size: 10px;
      gap: 4px;
      padding: 7px 9px;
      border-radius: 3px;
      border-width: 1px;
      box-shadow: 0 2px 0 #6b5535, 0 3px 6px rgba(0,0,0,0.15);
    }
    .row { gap: 6px; }
    .dot {
      width: 8px; height: 8px;
      border-width: 1px;
    }
    .pct { font-size: 8px; margin-left: 4px; }
    .ribbon { font-size: 11px; margin-left: 4px; }

    #topMenu {
      top: 10px; right: 10px;
      gap: 4px;
    }
    #topMenu button {
      height: 32px;
      min-width: 32px;
      border-width: 1px;
      box-shadow: 0 2px 0 #6b5535;
    }
    #topMenu button:active {
      box-shadow: 0 1px 0 #6b5535;
    }
    #topMenu button svg { width: 14px; height: 14px; }
    #topMenu button.icon-text { padding: 0 8px; font-size: 9px; }
    #startBtn { box-shadow: 0 2px 0 #4a6a2c; }
    #startBtn:active { box-shadow: 0 1px 0 #4a6a2c; }

    /* Hide the desktop scroll/drag hint on mobile (no scroll wheel anyway) */
    #hint { display: none; }
  }
</style>
</head>
<body>

<div id="ui">
  <div id="leaderboard"></div>
</div>

<div id="topMenu">
  <button id="startBtn" class="icon-text" title="Start the race">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="6"/>
      <circle cx="10" cy="10" r="1.4" fill="currentColor"/>
    </svg>
    <span>RACE</span>
  </button>
  <button id="restart" class="icon-text" title="Generate a new course">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 3-6.7"/>
      <polyline points="3 3 3 9 9 9"/>
    </svg>
    <span>NEW</span>
  </button>
  <button id="actionCam" title="Cycle camera mode">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <!-- Video camera (camcorder style): rectangular body with a wedge lens
           poking out the right side. Reads as "video" rather than "photo." -->
      <rect x="2" y="7" width="13" height="10" rx="1.5"/>
      <path d="M15 11l5-3v8l-5-3z"/>
    </svg>
  </button>
  <button id="soundBtn" title="Toggle sound effects">
    <!-- Sound on: speaker + 2 sound waves. Default (off) state hides the waves. -->
    <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 9v6h4l5 4V5L8 9H4z"/>
      <path d="M16 9c1.2 1.2 1.2 4.8 0 6"/>
      <path d="M19 6c2.4 2.4 2.4 9.6 0 12"/>
    </svg>
    <!-- Sound off: speaker + slash through it. -->
    <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 9v6h4l5 4V5L8 9H4z"/>
      <line x1="16" y1="9" x2="22" y2="15"/>
      <line x1="22" y1="9" x2="16" y2="15"/>
    </svg>
  </button>
  <button id="fsBtn" aria-label="Toggle fullscreen" title="Toggle fullscreen">
    <svg class="icon-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 9 4 4 9 4"/>
      <polyline points="15 4 20 4 20 9"/>
      <polyline points="20 15 20 20 15 20"/>
      <polyline points="9 20 4 20 4 15"/>
    </svg>
    <svg class="icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 4 9 9 4 9"/>
      <polyline points="20 9 15 9 15 4"/>
      <polyline points="15 20 15 15 20 15"/>
      <polyline points="4 15 9 15 9 20"/>
    </svg>
  </button>
</div>

<!-- Split-screen panel labels. Hidden by default; shown when X is pressed. Each
     label sits in the top-left corner of its viewport. The labels are absolute-
     positioned on a transparent overlay above the canvas. -->
<div id="splitLabels" style="display:none;">
  <div class="splitLabel" style="top: 12px;  left: 12px;">OVERVIEW</div>
  <div class="splitLabel" style="top: 12px;  right: 12px;">ACTION</div>
  <div class="splitLabel" style="bottom: 12px; left: 12px;">CHASE</div>
  <div class="splitLabel" style="bottom: 12px; right: 12px;">TOP</div>
</div>

<!-- Marble-blast HUD: shown when M is pressed. A small overlay near the bottom
     with the active key hints. -->
<div id="mbHud" style="display:none;">
  <div class="mbTitle">MARBLE BLAST</div>
  <div class="mbHints">WASD MOVE · SPACE JUMP · M EXIT</div>
</div>

<!-- Loading overlay — covers the screen while the course builds at boot. The
     loader is a glossy marble with a conic-gradient progress ring around it;
     the percentage sits ON the marble. Fades out when the build completes. -->
<div id="loadingOverlay">
  <div id="loaderRing">
    <div id="loaderMarble">
      <div id="loaderPct">0%</div>
    </div>
  </div>
  <div id="loaderLabel">PLOTTING COURSE</div>
</div>

<!-- Tilt-shift overlay (B key). Two horizontal strips above and below the
     focal band apply backdrop-filter blur with a vertical gradient mask, so
     the blur fades smoothly toward the sharp middle of the image. Cheaper
     than a shader-based gaussian — uses the browser's compositor. ON by default
     for the miniature/diorama look; B toggles off if not wanted. -->
<div id="tiltShift">
  <div class="tsStrip tsTop"></div>
  <div class="tsStrip tsBottom"></div>
</div>

<script src="vendor/three.min.js"></script>
<script>

// Visible on-page error reporting — if something throws during init, we want to
// see it instead of getting a silent black screen (especially on mobile devices
// where dev tools aren't easily accessible).
window.addEventListener('error', function(e) {
  const existing = document.getElementById('_errOverlay');
  const overlay = existing || document.createElement('div');
  if (!existing) {
    overlay.id = '_errOverlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#400;color:#fff;font:12px monospace;padding:8px;z-index:9999;white-space:pre-wrap;max-height:50%;overflow:auto;';
    document.body.appendChild(overlay);
  }
  overlay.textContent += '[ERROR] ' + (e.message || e) + '\n  at ' + (e.filename || '?') + ':' + (e.lineno || '?') + '\n';
});

// =========================================================
// CONFIG — grid-based modular wooden marble run
// =========================================================
const CONFIG = {
  marbleCount: 5,
  marbleRadius: 0.22,       // sized so all 5 marbles line up across the start-tile flare
  gravity: 22,
  trackWidth: 2.02,         // wider channel; walls are correspondingly ~10% thinner
  wallHeight: 0.7,
  friction: 0.992,
  restitution: 0.7,         // wall bounces — lively but not chaotic
  marbleRestitution: 0.7,
  maxSpeed: 22,

  // Grid module dimensions — every track piece occupies a 4x4 cell on the XZ grid
  cellSize: 4.0,
  blockHeight: 1.4,         // vertical step for big ramp drops
  blockBaseThickness: 0.5,  // thickness of the block beneath the channel

  // Continuous gentle descent: every piece drops by this amount end-to-end,
  // so the entire course slopes downward (not just the ramp pieces).
  pieceDrop: 0.45,          // gentle tilt across each 4-unit straight; corners spiral down too
};

// Race state
const STATE = {
  gateOpen: false,
  raceStarted: false,
  raceTime: 0,
  podiumShown: false,
  actionCam: false,
  chaseCam: false,
  topCam: false,
  splitScreen: false,
  marbleBlast: false,
};

// Children's wooden-toy palette — saturated painted accents on natural wood
const COLORS = [
  '#d9534f', // tomato red
  '#5bc0de', // sky blue
  '#5cb85c', // grass green
  '#f0ad4e', // sunny yellow
  '#ede0c8'  // cream
];
const NAMES = ['RED', 'BLUE', 'GREEN', 'YELLOW', 'CREAM'];

// Wood palette (used to vary block colors)
const WOOD_COLORS = {
  light:    0xe6c79a,   // pale maple
  medium:   0xc89968,   // beech
  dark:     0x8b5a3c,   // walnut
  veryDark: 0x5d3a26,   // dark walnut
  trim:     0x3a2817,   // espresso (very dark trim)
};

// Painted accent colors for block tops / details (toy-paint colors)
const PAINT_COLORS = [
  0xe04632, // red — more saturated
  0x2e8fcf, // blue — deeper
  0x4caf3a, // green — punchier
  0xf2a830, // yellow/orange — warmer
  0xf0e0b8, // cream — slightly warmer
];

// =========================================================
// SCENE
// =========================================================
const scene = new THREE.Scene();
// Background is transparent — the CSS body gradient (light blue → light tan) shows
// through. Fog tints distant geometry to blend with the upper part of the gradient
// so the horizon doesn't look pasted on.
scene.background = null;
scene.fog = new THREE.Fog(0xc8d8e6, 120, 280);

// ORTHOGRAPHIC ISOMETRIC CAMERA
const aspect = window.innerWidth / window.innerHeight;
const camSize = 75;
const camera = new THREE.OrthographicCamera(
  -camSize * aspect, camSize * aspect,
   camSize,         -camSize,
   0.1, 500
);

// Classic isometric angle: rotation around Y, then tilt down
function setIsoCamera(yawDeg, pitchDeg, distance) {
  const yaw = yawDeg * Math.PI / 180;
  const pitch = pitchDeg * Math.PI / 180;
  // Spherical -> Cartesian
  const x = Math.cos(pitch) * Math.sin(yaw) * distance;
  const y = Math.sin(pitch) * distance;
  const z = Math.cos(pitch) * Math.cos(yaw) * distance;
  camera.position.set(x, y, z);
}
let camYaw = 135;         // around Y axis — angled to show course with start at back-right
let camPitch = 35.264;    // ~atan(1/sqrt(2)) for classic isometry
let camDistance = 100;
setIsoCamera(camYaw, camPitch, camDistance);

// preserveDrawingBuffer: true keeps the canvas's pixels available after each frame
// so right-click → "Save Image As..." in the browser captures the actual rendered
// frame. Without this, the buffer may be cleared by the time the browser reads it,
// producing a blank PNG. Small perf overhead, acceptable for this scene size.
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
// Cap pixel ratio at 2 — high-DPI mobile devices (3x) otherwise allocate huge
// framebuffers that exceed GPU memory limits and prevent the page from rendering.
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
// Clear with transparent so the body's CSS gradient shows through.
renderer.setClearColor(0x000000, 0);
// Slightly more cinematic tone mapping
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// Soft warm ambient — kept low so directional light creates strong contrast
scene.add(new THREE.AmbientLight(0xfff0d8, 0.38));

// Warm key light (sunlit playroom warmth)
const sun = new THREE.DirectionalLight(0xfff4d6, 1.15);
sun.position.set(25, 45, 18);
sun.castShadow = true;
// Mobile devices have lower texture limits + memory budgets — use a smaller shadow
// map to keep startup memory under control.
const _shadowMapSize = (window.innerWidth <= 600 ||
  /Mobi|Android|iPhone|iPad|iPod/.test(navigator.userAgent)) ? 1024 : 2048;
sun.shadow.mapSize.set(_shadowMapSize, _shadowMapSize);
sun.shadow.camera.left = -160;
sun.shadow.camera.right = 160;
sun.shadow.camera.top = 160;
sun.shadow.camera.bottom = -160;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 350;
sun.shadow.bias = -0.0005;
sun.shadow.normalBias = 0.02;
scene.add(sun);

// Cool fill from opposite side
const fill = new THREE.DirectionalLight(0xb0c4de, 0.22);
fill.position.set(-18, 12, -12);
scene.add(fill);

// Warm rim from below
const rim = new THREE.DirectionalLight(0xd99060, 0.15);
rim.position.set(-5, -8, 12);

// =========================================================
// PROCEDURAL WOOD TEXTURES
// Generated entirely in-browser using value noise + fBm + ring grain.
// No network dependency.
// =========================================================

// Simple seedable PRNG (mulberry32) for deterministic per-texture variation
function makeRng(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// =========================================================
// DETERMINISM — seeded RNG streams + simulation clock
// =========================================================
// Every race-affecting random draw goes through one of three seeded streams so
// that a (trackSeed, raceSeed) pair fully defines a race. Any client given the
// same pair replays the identical course, lane order, and physics outcome.
//
//   trackRng() — course generation: path layout, pegs, shaped tiles, and the
//                decorative blocks. Reseeded from SEEDS.track at every build.
//   laneRng()  — the per-race lane (color) shuffle. Reseeded from a value
//                derived from SEEDS.race in prepareRace().
//   raceRng()  — in-race physics randomness (wall-lock jitter, bounce nudges).
//                Reseeded from SEEDS.race at the exact moment the gate opens,
//                so pre-race idle frames can never desync the stream.
//
// Purely cosmetic randomness (wood-grain textures, confetti, flags/wind, audio,
// the collapse easter egg) intentionally stays on Math.random — it has no
// effect on outcomes and keeps replays from feeling sterile.
//
// Seeds can be pinned via URL: ?track=123456&race=654321 replays a recorded
// race. Without params, fresh seeds are rolled (and logged) per course/race.
function randomSeed32() {
  return crypto.getRandomValues(new Uint32Array(1))[0] >>> 0;
}
const SEEDS = (() => {
  const p = new URLSearchParams(location.search);
  const parse = (k) => {
    const v = p.get(k);
    if (v === null) return null;
    const n = Number(v);
    return Number.isFinite(n) ? (n >>> 0) : null;
  };
  const t = parse('track'), r = parse('race');
  return {
    track: t ?? randomSeed32(),
    race:  r ?? randomSeed32(),
    pinnedTrack: t !== null,
    pinnedRace:  r !== null,
  };
})();
let _trackRand = makeRng(SEEDS.track);
let _laneRand  = makeRng((SEEDS.race ^ 0x5F356495) >>> 0);
let _raceRand  = makeRng(SEEDS.race);
function trackRng() { return _trackRand(); }
function laneRng()  { return _laneRand(); }
function raceRng()  { return _raceRand(); }
function reseedTrack() { _trackRand = makeRng(SEEDS.track); }

// Simulation clock — advances by FIXED_DT inside stepPhysics only, so finish
// times are measured in deterministic sim-seconds, not wall-clock ms. Reset to
// 0 when the gate opens.
let simTime = 0;

// Permutation-based 2D value noise (smoother than pure rand, cheap to evaluate)
function makeNoise2D(seed) {
  const rng = makeRng(seed);
  // 256-entry random value table, accessed by hashed (x,y) pairs
  const grid = new Float32Array(256 * 256);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  const at = (ix, iy) => grid[(ix & 255) * 256 + (iy & 255)];
  // Cosine smoothstep for soft interpolation
  const smooth = (t) => t * t * (3 - 2 * t);
  return function noise2D(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const v00 = at(ix,   iy);
    const v10 = at(ix+1, iy);
    const v01 = at(ix,   iy+1);
    const v11 = at(ix+1, iy+1);
    const u = smooth(fx), v = smooth(fy);
    return v00 * (1-u) * (1-v) +
           v10 *   u   * (1-v) +
           v01 * (1-u) *   v   +
           v11 *   u   *   v;
  };
}

// fBm: layered noise at decreasing amplitudes — gives natural-looking texture detail
function makeFbm(noise2D, octaves = 5, lacunarity = 2.0, gain = 0.5) {
  return function fbm(x, y) {
    let amp = 1.0, freq = 1.0, sum = 0.0, norm = 0.0;
    for (let i = 0; i < octaves; i++) {
      sum += amp * noise2D(x * freq, y * freq);
      norm += amp;
      amp *= gain;
      freq *= lacunarity;
    }
    return sum / norm; // ~[0, 1]
  };
}

// Build a wood-grain texture into a 512x512 canvas.
//   opts.baseColor: [r, g, b] (0..1 each) — the base wood tone
//   opts.darkColor: [r, g, b] — dark ring/grain color
//   opts.ringFreq: grain ring spacing in pixels (higher = tighter rings)
//   opts.ringSharpness: how dark the ring lines are (0..1)
//   opts.warp: how much the grain wobbles (0..1)
//   opts.seed: random seed for variation
function generateWoodTexture(opts) {
  // Smaller texture on mobile to keep page-load fast. 256² generates in ~150ms,
  // 512² takes ~600ms+ on slower mobile devices. The repeat+rotation+offset variation
  // we apply per-cell hides the lower base resolution.
  const isMobile = window.innerWidth <= 600 ||
    /Mobi|Android|iPhone|iPad|iPod/.test(navigator.userAgent);
  const size = isMobile ? 256 : 512;
  const baseColor = opts.baseColor;
  const darkColor = opts.darkColor;
  const ringFreq = opts.ringFreq ?? 0.08;
  const ringSharpness = opts.ringSharpness ?? 0.55;
  const warp = opts.warp ?? 0.4;
  const seed = opts.seed ?? 1;

  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(size, size);
  const data = img.data;

  const noise = makeNoise2D(seed);
  const noiseHi = makeNoise2D(seed + 7919);
  const fbmLow = makeFbm(noise, 4, 2.0, 0.55);
  const fbmHi  = makeFbm(noiseHi, 3, 2.4, 0.4);

  // The "center" of the rings — wood grain emanates from a virtual heart point off-canvas
  // (gives long, gently-curved grain lines rather than circular rings)
  const cx = -size * 0.4;  // grain center far to the left
  const cy = size * 0.5;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      // Warp the position with low-frequency noise — gives the grain natural wobble
      const wx = x + warp * size * 0.08 * (fbmLow(x * 0.01, y * 0.005) - 0.5);
      const wy = y + warp * size * 0.04 * (fbmLow(x * 0.005 + 100, y * 0.01) - 0.5);

      // Distance from the virtual grain center (slightly squashed in Y so rings stretch)
      const dx = wx - cx;
      const dy = (wy - cy) * 0.65;
      const dist = Math.sqrt(dx*dx + dy*dy);

      // Rings: periodic dark bands, but the "phase" wobbles a bit so rings aren't perfectly
      // parallel — small additional noise added to dist.
      const ringPhase = dist * ringFreq + 0.5 * fbmLow(x * 0.02, y * 0.02);
      // Use a soft pow-shaped pulse for the ring darkness: peaks where fract(ringPhase) is
      // near 0, gives a sharper dark band than pure sin.
      const frac = ringPhase - Math.floor(ringPhase); // 0..1
      // Asymmetric ring: darker on the "inside" edge of each band (more natural)
      let ring = Math.exp(-Math.pow(frac * 8.0, 1.5)) +
                 Math.exp(-Math.pow((1.0 - frac) * 16.0, 1.5)) * 0.45;
      ring = Math.min(1, ring) * ringSharpness;

      // High-frequency grain speckle (the fine pores in real wood)
      const speckle = (fbmHi(x * 0.18, y * 0.45) - 0.5) * 0.18;

      // Slow color variation across the board (lighter/darker zones)
      const tone = (fbmLow(x * 0.004, y * 0.004) - 0.5) * 0.15;

      // Mix base toward dark for rings + add speckle and tone variation
      let r = baseColor[0] * (1 - ring) + darkColor[0] * ring;
      let g = baseColor[1] * (1 - ring) + darkColor[1] * ring;
      let b = baseColor[2] * (1 - ring) + darkColor[2] * ring;
      r += speckle + tone;
      g += speckle + tone;
      b += speckle + tone;

      // Clamp and write
      const i = (y * size + x) * 4;
      data[i + 0] = Math.max(0, Math.min(255, Math.round(r * 255)));
      data[i + 1] = Math.max(0, Math.min(255, Math.round(g * 255)));
      data[i + 2] = Math.max(0, Math.min(255, Math.round(b * 255)));
      data[i + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  if (renderer.capabilities && renderer.capabilities.getMaxAnisotropy) {
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  }
  return tex;
}

// Generate the two base textures synchronously at startup — no network roundtrip.
// Block texture: warm maple/beech tones, wider rings, more pronounced grain. Higher
// contrast between baseColor and darkColor + a sharper ring profile makes the grain
// pattern read more clearly on the cube faces.
const woodBlockTexture = generateWoodTexture({
  baseColor: [0.85, 0.66, 0.44],
  darkColor: [0.32, 0.18, 0.08],
  ringFreq: 0.055,
  ringSharpness: 0.75,
  warp: 0.55,
  seed: 17,
});

// Floor texture: lighter, finer grain, runs along the channel. Higher contrast so
// the long grain lines are visible even with the channel partially in shadow.
const woodFloorTexture = generateWoodTexture({
  baseColor: [0.90, 0.74, 0.50],
  darkColor: [0.38, 0.22, 0.10],
  ringFreq: 0.085,
  ringSharpness: 0.65,
  warp: 0.4,
  seed: 53,
});

// Paint-overlay wood texture: HIGH luminance (close to white) so that when multiplied
// by a saturated paint color the color comes through vividly while still showing some
// wood grain variation. Used on the painted accent stripes/trim so they read as
// PAINTED WOOD rather than flat plastic-y patches of color.
const woodPaintTexture = generateWoodTexture({
  baseColor: [0.98, 0.94, 0.88],
  darkColor: [0.72, 0.62, 0.52],
  ringFreq: 0.07,
  ringSharpness: 0.45,
  warp: 0.4,
  seed: 91,
});

// Per-material clones with random UV offset/repeat, so adjacent blocks don't look identical
function texturedClone(baseTex, repeatX, repeatY) {
  const t = baseTex.clone();
  t.needsUpdate = true;
  t.wrapS = THREE.RepeatWrapping;
  t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(repeatX, repeatY);
  t.offset.set(Math.random(), Math.random());
  // No rotation — keep grain orientation consistent across all cubes so the column
  // reads as a cohesive wooden stack rather than randomly-rotated tile mosaic.
  // The random offset alone provides enough per-cube variety in WHICH part of the
  // grain pattern is showing.
  t.rotation = 0;
  t.center.set(0.5, 0.5);
  return t;
}
// =========================================================
// GRID-BASED TRACK GENERATION
//
// We lay out modular blocks on a 3D integer grid (gx, gy, gz).
// Each piece occupies one cell. Pieces:
//   - 'straight': flat track from one edge to opposite edge (4 rotations)
//   - 'corner':   90° turn (4 rotations)
//   - 'ramp':     drops one level vertically across the cell (4 rotations)
//   - 'tee'/'split' — optional later
//
// The generator walks a path on the grid, choosing pieces and ensuring
// the next piece connects to the current exit. It descends over time.
// =========================================================

function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Cardinal directions on the grid: +X, +Z, -X, -Z (dirIndex 0,1,2,3)
const DIRS = [
  { dx:  1, dz:  0 }, // 0: east  (+X)
  { dx:  0, dz:  1 }, // 1: south (+Z)
  { dx: -1, dz:  0 }, // 2: west  (-X)
  { dx:  0, dz: -1 }, // 3: north (-Z)
];

function turnLeft(d)  { return (d + 3) % 4; }
function turnRight(d) { return (d + 1) % 4; }

// Generate a path: array of cells with { gx, gy, gz, pieceType, inDir, outDir }
// Returns the channel wall positions {leftZ, rightZ} in cell-local Z (where +X = outDir)
// for a given shape and local-x. Position localX is in [-cs/2, +cs/2].
// Used by both the visual builder (to construct walls) and physics (to clamp marbles).
function wallBoundsAt(shape, localX) {
  const cs = CONFIG.cellSize;
  const halfChan = CONFIG.trackWidth / 2;
  const u = (localX + cs / 2) / cs;  // 0 at entry, 1 at exit
  switch (shape) {
    case 'hourglass': {
      // Both walls curve inward toward the middle
      const pinch = 0.30 * Math.sin(Math.PI * u);
      return { leftZ: -halfChan + pinch, rightZ: halfChan - pinch };
    }
    case 'pinchPeg': {
      // Same as hourglass but a bit gentler so a peg fits at the pinch
      const pinch = 0.18 * Math.sin(Math.PI * u);
      return { leftZ: -halfChan + pinch, rightZ: halfChan - pinch };
    }
    case 'zigzag': {
      // Both walls offset together by a sinusoidal centerline wobble (channel
      // stays constant width but the path zigzags)
      const offset = 0.55 * Math.sin(2 * Math.PI * u);
      return { leftZ: -halfChan + offset, rightZ: halfChan + offset };
    }
    case 'notched': {
      // Both walls have a series of inward semicircular bumps (notches). The notches
      // on the left and right walls are offset from each other so the channel is never
      // pinched at the same x from both sides — the marble bumps in and out of pockets.
      // Each notch is modeled as a cosine bump localized around a center xN, with the
      // wall pulled INWARD by `depth` at xN and smoothly returning to the base wall
      // position outside it. Notches are deep enough that the marble visibly collides
      // and changes direction passing each one (max depth 1.5 would just barely let
      // a marble through; 0.55 leaves ~0.5 units of channel — enough to roll but the
      // marble bumps the notch).
      const depth = 0.55;
      // Bump function: how far the wall bulges in at parameter u for a notch at uN
      // with half-width uHW. Outside the bump, returns 0.
      const bump = (u, uN, uHW) => {
        const d = Math.abs(u - uN);
        if (d > uHW) return 0;
        // cosine pulse from 1 at center down to 0 at edges
        return depth * (0.5 + 0.5 * Math.cos(Math.PI * (d / uHW)));
      };
      // 3 notches per wall, offset between sides so they alternate down the cell
      const uHW = 0.13;  // half-width of each notch in u-space
      const leftBump  = bump(u, 0.18, uHW) + bump(u, 0.50, uHW) + bump(u, 0.82, uHW);
      const rightBump = bump(u, 0.34, uHW) + bump(u, 0.66, uHW);
      return { leftZ: -halfChan + leftBump, rightZ: halfChan - rightBump };
    }
    case 'startFlare': {
      // Start tile only: walls flare outward at the back (u=0) to make room for the
      // marble queue to line up side-by-side, then narrow to standard channel width
      // by the time they reach the gate at u=1. Use a smoothstep curve so the taper
      // is gentle in the middle and asymptotically reaches the standard width at the
      // exit (avoiding a hard corner where the gate sits).
      // Flare amount at the BACK end (added to halfChan on each side).
      const flareAmount = 0.55;  // total extra channel half-width at back
      // u=0 → flare = flareAmount; u=1 → flare = 0.
      const flare = flareAmount * (1 - u) * (1 - u);  // quadratic ease-out
      return { leftZ: -halfChan - flare, rightZ: halfChan + flare };
    }
    case 'plinko': {
      // Plinko tile: walls flare outward to give marbles room to scatter laterally
      // through the peg grid. Wider than the standard channel, but tapered back
      // to standard width at both ends so it joins cleanly with neighbor cells.
      // The plinko zone is most open in the MIDDLE of the cell.
      const widen = 0.55 * Math.sin(Math.PI * u);
      return { leftZ: -halfChan - widen, rightZ: halfChan + widen };
    }
    case 'yJunction': {
      // Y-junction tile: walls open up to ~2× width in the middle to accommodate
      // two diverging lanes. A wedge-shaped divider down the centerline (built as a
      // peg in buildChannelPiece) splits marbles into left/right lanes. Walls
      // taper back to standard width at both ends. Different from plinko in that
      // the WIDEST point is around u=0.4 (just after the divider point) and stays
      // wide through u=0.7 before tapering — long enough to have parallel lanes.
      const widen = 0.7 * Math.sin(Math.PI * u);  // bulges to 0.7 wider on each side
      return { leftZ: -halfChan - widen, rightZ: halfChan + widen };
    }
    default: {
      return { leftZ: -halfChan, rightZ: halfChan };
    }
  }
}

function generatePath() {
  const cells = [];
  // 3D-aware occupancy: a track tile occupies (gx, gz) plus a vertical span around its Y.
  // We allow two cells at the same (gx, gz) if their Ys differ by enough to leave headroom
  // for a marble + walls + base — that's how the track crosses over itself.
  const bh = CONFIG.blockHeight;
  const drop = CONFIG.pieceDrop;
  const cs = CONFIG.cellSize;
  const minClearY = bh + CONFIG.wallHeight + CONFIG.marbleRadius * 2 + 0.3;  // ~2.9 units

  // visited: Map<xzKey, Array<{minY, maxY}>>
  const visited = new Map();
  const xzKey = (x, z) => `${x},${z}`;
  // Returns the Y-span "blocked out" by a tile at entry/exit Ys. The span is padded
  // ABOVE the actual tile by a generous amount so any crossing leaves at least one
  // full cube-height of clear airspace between the lower track's wall tops and the
  // upper track's block underside — that's the visible "tunnel" through the structure.
  const padBelow = CONFIG.blockBaseThickness + 0.2;
  const padAbove = CONFIG.wallHeight + cs * 1.0;  // ensures ~one full cube-height gap above
  const tileSpan = (yLow, yHigh) => ({
    minY: yLow - padBelow,
    maxY: yHigh + padAbove,
  });
  // Does placing a tile at (gx, gz) spanning [minY, maxY] conflict with existing tiles?
  const conflicts = (gx, gz, span) => {
    const list = visited.get(xzKey(gx, gz));
    if (!list) return false;
    for (const s of list) {
      const apart = (span.minY > s.maxY) || (span.maxY < s.minY);
      if (!apart) return true;
    }
    return false;
  };
  const reserve = (gx, gz, span) => {
    const k = xzKey(gx, gz);
    let list = visited.get(k);
    if (!list) { list = []; visited.set(k, list); }
    list.push(span);
  };

  // Start at a high y so we have plenty of room for the longer course to descend.
  let gx = 0, gz = 0;
  let curY = 28 * bh;   // start very high so the course has room for a long, complex descent
  let dir = 0;

  // First cell: start straight on a high platform
  const startEntryY = curY;
  const startExitY = curY - drop;
  cells.push({
    gx, gz,
    type: 'start',
    inDir: dir, outDir: dir,
    entryY: startEntryY,
    exitY: startExitY,
    wallShape: 'startFlare',
  });
  reserve(gx, gz, tileSpan(Math.min(startEntryY, startExitY), Math.max(startEntryY, startExitY)));
  curY = startExitY;

  // Move forward to begin the course proper
  gx += DIRS[dir].dx;
  gz += DIRS[dir].dz;

  // Target length — a long, complex course with many turns and crossings.
  const targetLength = 120 + Math.floor(trackRng() * 46); // 120-165 pieces (1.5x prev 80-110)
  let consecStraight = 0;
  let lastWasRamp = false;

  // Loop bias: at each corner, bias the turn direction so the path tends to coil
  // around its own centroid rather than sprawl. The bias REVERSES based on distance:
  // when far from the centroid, prefer turning back toward it; when close (i.e. inside
  // the existing footprint), prefer turning AWAY so the path doesn't immediately trap
  // itself. The net effect is an orbit-like coil that wraps around its own center,
  // producing dynamic crossings and tunnels without getting stuck.
  const LOOP_BIAS = 0.45;
  const chooseCornerDir = () => {
    const lt = turnLeft(dir);
    const rt = turnRight(dir);
    if (cells.length < 4) return trackRng() < 0.5 ? lt : rt;  // not enough info yet
    let sumX = 0, sumZ = 0;
    for (const c of cells) { sumX += c.gx; sumZ += c.gz; }
    const cenX = sumX / cells.length;
    const cenZ = sumZ / cells.length;
    // Vector from current position to centroid; magnitude = current "orbit radius".
    const toCenX = cenX - gx;
    const toCenZ = cenZ - gz;
    const distToCenter = Math.sqrt(toCenX * toCenX + toCenZ * toCenZ);
    // Target orbit radius: roughly proportional to sqrt(cells placed) — so the path
    // stays at a "comfortable" wrapping distance from its own center.
    const targetRadius = Math.sqrt(cells.length) * 0.7;
    // Bias direction: positive if we want to head TOWARD center, negative if AWAY.
    // When at target radius, biasDir ~= 0 (no preference).
    const biasDir = (distToCenter - targetRadius) > 0 ? 1 : -1;
    // Score each candidate by its alignment with (biasDir * toCenter):
    const ltScore = (DIRS[lt].dx * toCenX + DIRS[lt].dz * toCenZ) * biasDir;
    const rtScore = (DIRS[rt].dx * toCenX + DIRS[rt].dz * toCenZ) * biasDir;
    if (Math.abs(ltScore - rtScore) < 0.01) return trackRng() < 0.5 ? lt : rt;
    const betterDir = (ltScore > rtScore) ? lt : rt;
    const worseDir  = (ltScore > rtScore) ? rt : lt;
    return trackRng() < (0.5 + LOOP_BIAS * 0.5) ? betterDir : worseDir;
  };

  // Compute the entry/exit Y for a hypothetical piece of type `t` starting at curY.
  const pieceYs = (t, entry) => {
    if (t === 'ramp' || t === 'stepRamp') return { entryY: entry, exitY: entry - bh };
    if (t === 'finish') return { entryY: entry, exitY: entry };
    return { entryY: entry, exitY: entry - drop };
  };

  // Free in the next cell with direction d? Use predicted entryY at the next cell.
  const nextFree = (cx, cz, d, currentExitY) => {
    const nx = cx + DIRS[d].dx;
    const nz = cz + DIRS[d].dz;
    // Predict next cell's exit Y (assume straight after): nextExit = currentExitY - drop.
    const nextSpan = tileSpan(currentExitY - drop, currentExitY);
    return !conflicts(nx, nz, nextSpan);
  };

  // PLINKO: pre-decide on creating a plinko zone of 3 consecutive straight cells.
  // We pick a target step (in the middle of the course) and force 3 straights when
  // we reach it. This guarantees plinko gets created (it would otherwise be
  // impossible since the path generator forces a turn after 2 straights).
  let plinkoForceRemaining = 0;  // counts down 3,2,1,0 while forcing straights
  let plinkoStartStep = -1;
  if (trackRng() < 0.9) {
    // Place plinko in the first 40% of the course — fewer cells reserved means less
    // bounds/conflict pressure, so the 3 forced straights are more likely to all
    // survive the conflict-resolution checks downstream.
    plinkoStartStep = 4 + Math.floor(trackRng() * Math.max(1, targetLength * 0.4 - 4));
  }

  for (let step = 0; step < targetLength; step++) {
    const isLastFew = step >= targetLength - 2;
    let isPlinkoForced = false;

    let type;
    if (isLastFew) {
      type = 'straight';
    } else if (step === plinkoStartStep) {
      // Begin plinko zone — force straight here and for next 2 cells.
      type = 'straight';
      plinkoForceRemaining = 2;  // 2 MORE straights needed after this one
      isPlinkoForced = true;
    } else if (plinkoForceRemaining > 0) {
      type = 'straight';
      plinkoForceRemaining--;
      isPlinkoForced = true;
    } else {
      const roll = trackRng();
      if (consecStraight >= 2) {
        // Force a turn after 2 straights to keep the path winding
        type = roll < 0.78 ? 'corner' : 'ramp';
      } else if (lastWasRamp) {
        type = roll < 0.3 ? 'straight' : (roll < 0.85 ? 'corner' : 'ramp');
      } else {
        // High corner+ramp chance — busy, twisty, dropping descent
        if (roll < 0.22) type = 'straight';
        else if (roll < 0.78) type = 'corner';
        else type = 'ramp';   // ~22% ramps for stronger vertical action
      }
      // Of the rolled "ramp" cells, occasionally upgrade to 'stepRamp' — a piece with
      // a discrete ledge in the middle instead of a smooth slope. Adds visual variety
      // and a small drop+bounce moment without extra cell length.
      if (type === 'ramp' && trackRng() < 0.35) type = 'stepRamp';
    }

    let newDir = dir;
    if (type === 'corner') {
      newDir = chooseCornerDir();
    }

    // Bounds check — keep the course inside a play-area (expanded for longer courses)
    if (gx < -18 || gx > 22 || gz < -18 || gz > 18) {
      type = 'corner';
      const towardCenterX = -Math.sign(gx);
      const towardCenterZ = -Math.sign(gz);
      const lt = turnLeft(dir), rt = turnRight(dir);
      const ltOk = (DIRS[lt].dx * towardCenterX + DIRS[lt].dz * towardCenterZ) > 0;
      newDir = ltOk ? lt : rt;
    }

    // Predict this cell's Y span
    const ys = pieceYs(type, curY);
    const thisSpan = tileSpan(Math.min(ys.entryY, ys.exitY), Math.max(ys.entryY, ys.exitY));

    // Cell-occupancy check (with 3D clearance) — if conflict, try to retype to a corner
    // turning into a free direction.
    if (conflicts(gx, gz, thisSpan)) {
      type = 'corner';
      newDir = chooseCornerDir();
    }

    // Try the chosen newDir; if next cell would conflict, try alternates.
    const candidates = [newDir, turnLeft(dir), turnRight(dir), dir];
    let chosenDir = null;
    for (const cand of candidates) {
      if (nextFree(gx, gz, cand, ys.exitY)) { chosenDir = cand; break; }
    }
    if (chosenDir === null) {
      // Stuck (rare with 3D occupancy) — end the course here.
      break;
    }
    if (chosenDir !== newDir) {
      if (type === 'straight' && chosenDir !== dir) type = 'corner';
      else if ((type === 'ramp' || type === 'stepRamp') && chosenDir !== dir) type = 'corner';
      newDir = chosenDir;
    }

    // Re-check the Y span if type changed to 'corner' (it stays the same since ramp/corner/straight
    // all have the same Y span for non-ramp). For ramp it differs by drop vs bh, but if we just
    // demoted ramp to corner, recompute span.
    const finalYs = pieceYs(type, curY);
    const finalSpan = tileSpan(Math.min(finalYs.entryY, finalYs.exitY), Math.max(finalYs.entryY, finalYs.exitY));

    // Final conflict check — if STILL conflicting, abandon this step.
    if (conflicts(gx, gz, finalSpan)) {
      break;
    }

    cells.push({
      gx, gz,
      type,
      inDir: dir,
      outDir: newDir,
      entryY: finalYs.entryY,
      exitY: finalYs.exitY,
      _isPlinkoForced: isPlinkoForced && type === 'straight',
    });
    reserve(gx, gz, finalSpan);

    if (type === 'straight') consecStraight++;
    else consecStraight = 0;
    lastWasRamp = (type === 'ramp' || type === 'stepRamp');

    // Advance to next cell
    dir = newDir;
    gx += DIRS[dir].dx;
    gz += DIRS[dir].dz;
    curY = finalYs.exitY;
  }

  // ----- Final piece: bias outDir to point AWAY from course centroid -----
  // Compute centroid of placed cells, then pick an out-pointing direction so the podium
  // lands on open table beyond the course (not next to or facing a wall of the course).
  let sumX = 0, sumZ = 0;
  for (const c of cells) { sumX += c.gx; sumZ += c.gz; }
  const cenX = sumX / cells.length;
  const cenZ = sumZ / cells.length;
  const dxC = gx - cenX, dzC = gz - cenZ;

  // Helper: is this XZ cell "in the clear" for the finish — both the cell itself and
  // ALL cells in the outDir direction up to a podium distance must be unoccupied (any Y).
  // This ensures the finish isn't surrounded by tall cube columns from earlier cells.
  const xzOccupied = (cx, cz) => visited.has(xzKey(cx, cz));
  const isClearForFinish = (cx, cz, d) => {
    if (xzOccupied(cx, cz)) return false;
    // Check the next 4 cells in the outDir direction (covering the finish cell, the
    // podium landing, plus camera-pan room beyond).
    for (let k = 1; k <= 4; k++) {
      const nx = cx + DIRS[d].dx * k, nz = cz + DIRS[d].dz * k;
      if (xzOccupied(nx, nz)) return false;
    }
    return true;
  };

  // Pick best 90°-or-straight direction (no 180° about-faces — physically impossible).
  const reverseDir = (dir + 2) % 4;
  let bestDir = dir;
  let bestScore = -Infinity;
  for (let d = 0; d < 4; d++) {
    if (d === reverseDir) continue;            // skip 180° about-face
    const s = DIRS[d].dx * dxC + DIRS[d].dz * dzC;
    if (s > bestScore) { bestScore = s; bestDir = d; }
  }

  // If the natural direction isn't bestDir, add a corner to redirect.
  if (bestDir !== dir) {
    const cornerYs = pieceYs('corner', curY);
    const cornerSpan = tileSpan(Math.min(cornerYs.entryY, cornerYs.exitY), Math.max(cornerYs.entryY, cornerYs.exitY));
    if (!conflicts(gx, gz, cornerSpan)) {
      cells.push({
        gx, gz,
        type: 'corner',
        inDir: dir,
        outDir: bestDir,
        entryY: cornerYs.entryY,
        exitY: cornerYs.exitY,
      });
      reserve(gx, gz, cornerSpan);
      dir = bestDir;
      gx += DIRS[dir].dx;
      gz += DIRS[dir].dz;
      curY = cornerYs.exitY;
    }
  }

  // Walk outward with straights until the finish cell is on the bounding-box edge
  // (no cells beyond it in the outDir direction). If after many attempts we can't
  // find clear space in the chosen direction, try another corner toward a different
  // outward direction.
  for (let outerAttempt = 0; outerAttempt < 3; outerAttempt++) {
    let walked = false;
    for (let extra = 0; extra < 12; extra++) {
      if (isClearForFinish(gx, gz, dir)) { walked = true; break; }
      const ys = pieceYs('straight', curY);
      const span = tileSpan(Math.min(ys.entryY, ys.exitY), Math.max(ys.entryY, ys.exitY));
      if (conflicts(gx, gz, span)) break;
      cells.push({
        gx, gz, type: 'straight',
        inDir: dir, outDir: dir,
        entryY: ys.entryY, exitY: ys.exitY,
      });
      reserve(gx, gz, span);
      gx += DIRS[dir].dx;
      gz += DIRS[dir].dz;
      curY = ys.exitY;
    }
    if (walked) break;
    // Couldn't reach clear space in this direction. Try inserting another corner toward
    // a different outward direction (the next-best non-reverse direction).
    const triedReverse = (dir + 2) % 4;
    const altDirs = [];
    for (let d = 0; d < 4; d++) {
      if (d === dir || d === triedReverse) continue;
      // Recompute centroid relative to CURRENT position (it has moved)
      let sx = 0, sz = 0;
      for (const c of cells) { sx += c.gx; sz += c.gz; }
      const cx = sx / cells.length, cz = sz / cells.length;
      const score = DIRS[d].dx * (gx - cx) + DIRS[d].dz * (gz - cz);
      altDirs.push({ d, score });
    }
    altDirs.sort((a, b) => b.score - a.score);
    if (altDirs.length === 0) break;
    const newDir = altDirs[0].d;
    const cornerYs = pieceYs('corner', curY);
    const cornerSpan = tileSpan(Math.min(cornerYs.entryY, cornerYs.exitY), Math.max(cornerYs.entryY, cornerYs.exitY));
    if (conflicts(gx, gz, cornerSpan)) break;
    cells.push({
      gx, gz,
      type: 'corner',
      inDir: dir,
      outDir: newDir,
      entryY: cornerYs.entryY,
      exitY: cornerYs.exitY,
    });
    reserve(gx, gz, cornerSpan);
    dir = newDir;
    gx += DIRS[dir].dx;
    gz += DIRS[dir].dz;
    curY = cornerYs.exitY;
  }

  // Final piece: flat 'finish' straight
  cells.push({
    gx, gz,
    type: 'finish',
    inDir: dir, outDir: dir,
    entryY: curY,
    exitY: curY,
  });
  reserve(gx, gz, tileSpan(curY, curY));

  // Derived integer height per cell — used only for wood-variant indexing and
  // cellCenter's nominal Y (the actual rendering Y is c.entryY / c.exitY).
  for (const c of cells) {
    c.gy = Math.round(c.entryY / bh);
  }

  // ----- Plinko: occupy a run of 3 consecutive straight cells -----
  // We tagged cells with `_isPlinkoForced` during path generation. Find runs of
  // 3+ consecutive tagged cells (they should all share the same direction since
  // they were straights forced contiguously). If found, populate pegs and the
  // plinko wall-shape on the first 3 cells of the run.
  const plinkoCells = new Set();
  {
    let runStart = -1;
    for (let i = 0; i <= cells.length; i++) {
      // The cell must still be a straight (it could have been retyped to a corner
      // by the bounds/conflict resolution downstream of our type assignment).
      const tagged = i < cells.length
        && cells[i]._isPlinkoForced
        && cells[i].type === 'straight'
        && cells[i].inDir === cells[i].outDir;
      if (tagged) {
        if (runStart < 0) runStart = i;
      } else {
        // End of run (or end of array). If the run was ≥3 cells, plinko-ify it.
        if (runStart >= 0 && (i - runStart) >= 3) {
          // Plinko peg layout — classic alternating 2/1/2/1/2 pattern coordinated
          // with the wall shape. Each plinko cell has one wide bulge in the middle
          // (where the wall flares outward) and narrow throats at its boundaries.
          // We place 2 pegs at each wide section (one on each side of center) and
          // 1 peg at each narrow throat:
          //
          //                ●   ●     ●   ●     ●   ●         ← 2-peg rows at cell centers
          //                                                    (wide wall sections)
          //                    ●         ●                   ← 1-peg rows at boundaries
          //                                                    (narrow throats)
          //
          // Total: 5 rows across 3 cells (2-1-2-1-2 pattern). Plus 1 extra row at
          // each end for marble entry/exit dispersion.
          const startIdx = runStart;
          const cs = CONFIG.cellSize;
          const halfChan = CONFIG.trackWidth / 2;
          const lateralSpacing = 1.0;  // distance between the 2 pegs in a wide row

          // Initialize peg arrays.
          for (let k = 0; k < 3; k++) {
            const c = cells[startIdx + k];
            if (!c.pegs) c.pegs = [];
            c.plinkoCell = true;
            c.wallShape = 'plinko';
            plinkoCells.add(startIdx + k);
          }
          cells[startIdx].plinkoEntry = true;

          // 5 rows positioned along the run: cell-center-0, boundary-0-1, cell-center-1,
          // boundary-1-2, cell-center-2.
          // Cell `k` center in cell-k local x: 0. Boundary k-to-(k+1) is at cell-k local
          // x = +cs/2 (or equivalently cell-(k+1) local x = -cs/2).
          // We always place a row in cell-k's local frame.
          const rowSpecs = [
            { cell: 0, localX: 0,        pegs: 2 },  // cell 0 center — wide
            { cell: 0, localX:  cs / 2,  pegs: 1 },  // boundary 0→1 — narrow
            { cell: 1, localX: 0,        pegs: 2 },  // cell 1 center — wide
            { cell: 1, localX:  cs / 2,  pegs: 1 },  // boundary 1→2 — narrow
            { cell: 2, localX: 0,        pegs: 2 },  // cell 2 center — wide
          ];
          for (const spec of rowSpecs) {
            const c = cells[startIdx + spec.cell];
            if (spec.pegs === 1) {
              c.pegs.push({ x: spec.localX, z: 0 });
            } else {
              // 2 pegs straddling center, leaving a marble-width gap between them
              c.pegs.push({ x: spec.localX, z: -lateralSpacing / 2 });
              c.pegs.push({ x: spec.localX, z:  lateralSpacing / 2 });
            }
          }
        }
        runStart = -1;
      }
    }
  }

  // Eligible straight cells (skip first 2 and last 3 so the start/finish stay clean,
  // and skip any cells already consumed by plinko)
  const straightIdxs = [];
  for (let i = 2; i < cells.length - 3; i++) {
    if (cells[i].type === 'straight' && !plinkoCells.has(i)) straightIdxs.push(i);
  }

  // Pick ONE of each special tile shape if we have enough eligible straights.
  // Decorative shape variants applied to a few random straight cells. The 'dip'
  // variant was removed because its segmented floor created visible stair-step
  // seams in the middle of the tile, plus the physics curve smoothly interpolated
  // through the dip while the visual was discrete — leading to marbles appearing
  // to clip in and out of the floor.
  const shapeBag = ['hourglass', 'pinchPeg', 'zigzag', 'notched', 'fan', 'yJunction'];
  // Shuffle the shapeBag and the straights, then assign one cell per shape
  for (let i = shapeBag.length - 1; i > 0; i--) {
    const j = Math.floor(trackRng() * (i + 1));
    [shapeBag[i], shapeBag[j]] = [shapeBag[j], shapeBag[i]];
  }
  const shuffledStraights = [...straightIdxs];
  for (let i = shuffledStraights.length - 1; i > 0; i--) {
    const j = Math.floor(trackRng() * (i + 1));
    [shuffledStraights[i], shuffledStraights[j]] = [shuffledStraights[j], shuffledStraights[i]];
  }
  const taken = new Set();
  for (let s = 0; s < Math.min(shapeBag.length, shuffledStraights.length); s++) {
    const idx = shuffledStraights[s];
    const shape = shapeBag[s];
    if (shape === 'dip') {
      cells[idx].hasDip = true;
    } else if (shape === 'fan') {
      // Fan-wheel tile: a spinning paddle in the middle of the cell.
      cells[idx].hasFan = true;
    } else {
      cells[idx].wallShape = shape;
      if (shape === 'pinchPeg') {
        // Single peg dead-center at the pinch (in cell-local frame: x=0, z=0)
        cells[idx].pegs = [{ x: 0, z: 0 }];
      } else if (shape === 'yJunction') {
        // Y-junction tile: a center divider made of a tight row of pegs running
        // down the middle of the cell from u=0.3 to u=0.7. Marbles hit the front
        // of the divider and get nudged left or right based on their lateral
        // position at impact. The cell walls flare outward (set via wallShape)
        // to give marbles room to flow past the divider on either side, then
        // converge back to standard width at the exit.
        const cs = CONFIG.cellSize;
        // 4 pegs along centerline, spaced 0.36 apart (peg radius 0.18 = touching).
        // This forms a continuous "blade" the marble can't slip between.
        const pegs = [];
        const dividerSpan = 1.6;   // total length of the divider in world units
        const dividerStart = -dividerSpan / 2;
        const nDividerPegs = 5;
        for (let p = 0; p < nDividerPegs; p++) {
          const xLocal = dividerStart + p * (dividerSpan / (nDividerPegs - 1));
          pegs.push({ x: xLocal, z: 0 });
        }
        cells[idx].pegs = pegs;
      }
    }
    taken.add(idx);
  }

  // Sprinkle pegs on ~25% of remaining (unmodified) straights
  for (const i of straightIdxs) {
    if (taken.has(i)) continue;
    if (trackRng() < 0.25) {
      const nPegs = 1 + Math.floor(trackRng() * 3);
      const pegs = [];
      const cs = CONFIG.cellSize;
      const halfChan = CONFIG.trackWidth / 2;
      const pegRadius = 0.18;
      // Required clearance per side: marbleRadius * 2.4 (one diameter + 20% slack).
      const minClearance = CONFIG.marbleRadius * 2.4;
      const maxAbsZ = halfChan - pegRadius - minClearance;
      const usedX = [];
      for (let p = 0; p < nPegs; p++) {
        let tries = 0;
        while (tries++ < 10) {
          const x = (trackRng() - 0.5) * (cs * 0.7);
          if (usedX.every(u => Math.abs(u - x) > 0.9)) {
            usedX.push(x);
            const z = (maxAbsZ > 0) ? (trackRng() - 0.5) * 2 * maxAbsZ : 0;
            pegs.push({ x, z });
            break;
          }
        }
      }
      cells[i].pegs = pegs;
    }
  }

  return cells;
}

// =========================================================
// CONVERT PATH TO 3D CURVE
// Each piece contributes a few control points along its centerline.
// We then build a smooth path through these points for physics.
// =========================================================

function cellCenter(gx, gy, gz) {
  return new THREE.Vector3(
    gx * CONFIG.cellSize,
    gy * CONFIG.blockHeight,
    gz * CONFIG.cellSize
  );
}

function edgePoint(gx, gy, gz, dir) {
  // Point at the edge of cell (gx,gy,gz) in direction `dir`
  const c = cellCenter(gx, gy, gz);
  const d = DIRS[dir];
  c.x += d.dx * CONFIG.cellSize * 0.5;
  c.z += d.dz * CONFIG.cellSize * 0.5;
  return c;
}

function buildCurveFromPath(cells) {
  const points = [];
  const cs = CONFIG.cellSize;
  const bh = CONFIG.blockHeight;

  // For each cell, we generate a set of points along its centerline.
  // The y of each cell's channel floor is c.gy * bh.
  // Ramps go from c.gy * bh down to (c.gy - 1) * bh across the cell.

  for (let i = 0; i < cells.length; i++) {
    const c = cells[i];
    const center = cellCenter(c.gx, c.gy, c.gz);
    const entryYWorld = c.entryY;
    const exitYWorld  = c.exitY;
    const midYWorld   = (entryYWorld + exitYWorld) / 2;

    // Entry/exit midpoints with proper y (per-cell continuous descent)
    const entryDirOpp = (c.inDir + 2) % 4;
    const entry = edgePoint(c.gx, c.gy, c.gz, entryDirOpp);
    const exit  = edgePoint(c.gx, c.gy, c.gz, c.outDir);
    entry.y = entryYWorld;
    exit.y  = exitYWorld;

    if (i === 0) {
      // For the very first cell (start), add the entry point first so the curve begins there
      points.push(entry.clone());
    }

    if (c.type === 'corner') {
      // Generate an arc through the cell from entry to exit, spiraling gently downward.
      const inDirVec = DIRS[c.inDir];
      const outDirVec = DIRS[c.outDir];
      const arcCenter = new THREE.Vector3(
        center.x + (cs/2) * (-inDirVec.dx + outDirVec.dx),
        midYWorld,
        center.z + (cs/2) * (-inDirVec.dz + outDirVec.dz)
      );

      const radius = cs / 2;
      const entryVec = new THREE.Vector3(entry.x - arcCenter.x, 0, entry.z - arcCenter.z);
      const exitVec  = new THREE.Vector3(exit.x  - arcCenter.x, 0, exit.z  - arcCenter.z);
      const startAngle = Math.atan2(entryVec.z, entryVec.x);
      let endAngle = Math.atan2(exitVec.z, exitVec.x);

      let delta = endAngle - startAngle;
      while (delta > Math.PI) delta -= 2 * Math.PI;
      while (delta < -Math.PI) delta += 2 * Math.PI;

      // Sample the arc with continuous downward spiral. 16 samples (was 8) — denser
      // sampling smooths the catmull-rom interpolation through the curve. At 8
      // samples, marbles on the INNER side of tight corners would sometimes feel
      // like they bounced off invisible walls because the curve's sampled tangent
      // jumped between samples (changing the "right" basis vector that determines
      // lateral offset). Twice as many samples halves the per-segment angle change
      // (~5.6° vs 11.25°), making the per-frame tangent change small enough that
      // the marble's lateral position stays continuous.
      const arcSteps = 16;
      for (let s = 1; s <= arcSteps; s++) {
        const t = s / arcSteps;
        const a = startAngle + delta * t;
        const y = entryYWorld + (exitYWorld - entryYWorld) * t;
        points.push(new THREE.Vector3(
          arcCenter.x + Math.cos(a) * radius,
          y,
          arcCenter.z + Math.sin(a) * radius
        ));
      }
    } else if (c.type === 'ramp') {
      // Sample the ramp with a few points along its steep slope
      const rampSteps = 4;
      for (let s = 1; s <= rampSteps; s++) {
        const t = s / rampSteps;
        const x = entry.x + (exit.x - entry.x) * t;
        const z = entry.z + (exit.z - entry.z) * t;
        const y = entry.y + (exit.y - entry.y) * t;
        points.push(new THREE.Vector3(x, y, z));
      }
    } else if (c.type === 'stepRamp') {
      // Step ramp: upper-floor section, then a vertical drop in the middle, then a
      // lower-floor section. To force a SHARP drop at x=0 (cell center) — not a
      // smoothed catmull-rom curve that descends gradually across the cell — we
      // emit DUPLICATED samples on each side of the ledge in WORLD-X. The duplicates
      // make the catmull-rom tangents flat on each floor section (since neighboring
      // samples have the same Y) and concentrate the Y change into the small region
      // between the two ledge samples.
      const upper = entry.y;
      const lower = exit.y;
      // u-positions along the cell, with their target Y.
      const samples = [
        { u: 0.15, y: upper },
        { u: 0.30, y: upper },
        { u: 0.45, y: upper },
        { u: 0.49, y: upper },   // last sample before the drop, on upper
        { u: 0.51, y: lower },   // first sample after the drop, on lower
        { u: 0.55, y: lower },
        { u: 0.70, y: lower },
        { u: 0.85, y: lower },
        { u: 1.00, y: lower },
      ];
      for (const s of samples) {
        const x = entry.x + (exit.x - entry.x) * s.u;
        const z = entry.z + (exit.z - entry.z) * s.u;
        points.push(new THREE.Vector3(x, s.y, z));
      }
    } else {
      // Straight / start / finish: center then exit, both interpolated in Y.
      // For dip cells, sample multiple points along a cosine bowl so the curve actually
      // dips down through the cell — physics floor projection will follow.
      if (c.hasDip) {
        const dipDepth = 0.55;
        const dipSteps = 9;
        for (let s = 1; s <= dipSteps; s++) {
          const u = s / dipSteps; // 0..1 across the cell
          const x = entry.x + (exit.x - entry.x) * u;
          const z = entry.z + (exit.z - entry.z) * u;
          const yLinear = entry.y + (exit.y - entry.y) * u;
          // Cosine bowl: deepest at u=0.5, returns to 0 at u=0 and u=1
          const uCentered = (u - 0.5) * 2; // -1..1
          const dipY = -dipDepth * (0.5 * (1 + Math.cos(Math.PI * uCentered)));
          points.push(new THREE.Vector3(x, yLinear + dipY, z));
        }
      } else {
        const centerPt = center.clone();
        centerPt.y = midYWorld;
        points.push(centerPt);
        points.push(exit.clone());
      }
    }
  }

  // Runout past the finish
  const last = cells[cells.length - 1];
  const lastExit = edgePoint(last.gx, last.gy, last.gz, last.outDir);
  lastExit.y = last.exitY;
  const d = DIRS[last.outDir];
  const runoutEnd = new THREE.Vector3(
    lastExit.x + d.dx * cs * 0.6,
    lastExit.y,
    lastExit.z + d.dz * cs * 0.6
  );
  points.push(runoutEnd);

  return points;
}

// =========================================================
// WORLD STATE — rebuilt on each restart
// =========================================================
let curve = null;
let curveLength = 0;
const sampledPoints = [];
const sampledTangents = [];
const sampledRights = [];
// Sample count scales with track length — keeping ~10-12 samples per cell so
// catmull-rom interpolation stays smooth through curves. Bumped from 1200 (sized
// for 80-110 cell courses) to 1800 (for the new 120-165 cell courses).
const SAMPLE_COUNT = 1800;
let pathCells = [];

// Track per-cell t ranges so we can find which cell a marble is on
const cellTRanges = [];

const worldObjects = [];
// Occlusion-ghosting state — declared early so clearWorld() can clear it during the
// first buildWorld() call (which runs before the rest of the ghosting code is reached).
const _ghostedMeshes = new Set();
const _ghostCandidates = [];   // flat list of meshes to consider for ghosting
let _ghostCandidatesDirty = true;
function addToWorld(obj) {
  scene.add(obj);
  worldObjects.push(obj);
  return obj;
}
function clearWorld() {
  // Clear any tracked occlusion-ghost refs — the meshes are about to be disposed.
  _ghostedMeshes.clear();
  _ghostCandidatesDirty = true;
  // Marble-blast collidable cache invalidated too (mesh refs are about to die).
  _mbCollidableMeshes = null;
  // Collapsing pieces also need to clear — their disposed-by-clearWorld geometry
  // would otherwise cause a render crash when the next updateCollapse tries to
  // touch them. Any still-falling pieces just disappear (they're already on the
  // way to the void anyway).
  _collapsingPieces.length = 0;
  _collapseActive = false;
  for (const obj of worldObjects) {
    scene.remove(obj);
    obj.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
  }
  worldObjects.length = 0;
}

function setTrackFromPoints(trackPoints) {
  curve = new THREE.CatmullRomCurve3(trackPoints, false, 'catmullrom', 0.5);
  curveLength = curve.getLength();
  sampledPoints.length = 0;
  sampledTangents.length = 0;
  sampledRights.length = 0;
  let prevRight = new THREE.Vector3(0, 0, 1);
  for (let i = 0; i <= SAMPLE_COUNT; i++) {
    const t = i / SAMPLE_COUNT;
    sampledPoints.push(curve.getPointAt(t));
    const tangent = curve.getTangentAt(t).normalize();
    sampledTangents.push(tangent);
    let right = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0,1,0));
    if (right.lengthSq() < 0.01) {
      right = prevRight.clone();
    } else {
      right.normalize();
      if (i > 0 && right.dot(prevRight) < 0) right.negate();
    }
    sampledRights.push(right);
    prevRight = right;
  }
}

// =========================================================
// BUILD WOODEN BLOCKS
// Each path cell renders as a chunky wooden block with a channel cut out of the top,
// plus a support pillar reaching down to the ground when elevated.
// =========================================================

const WOOD_BLOCK_MATERIALS = [];
function makeWoodMaterial(colorHex, opts={}) {
  const params = {
    color: colorHex,
    roughness: opts.roughness ?? 0.85,
    metalness: 0.0,
    flatShading: false,
  };
  if (opts.map) params.map = opts.map;
  return new THREE.MeshStandardMaterial(params);
}

// Make a fresh per-cell block material with the wood texture tiled at world scale.
// Each cell gets its own texture clone with a random UV offset/rotation so adjacent
// blocks don't look perfectly identical.
function makeTexturedBlockMaterial(colorHex, opts={}) {
  // Lower repeat = each cube face shows LESS of one texture cycle = grain features
  // appear LARGER. 0.3 puts about 30% of a grain cycle per face — a chunky, clearly
  // visible wood grain pattern that reads as solid wood block from any distance.
  const tex = texturedClone(woodBlockTexture, 0.3, 0.3);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return makeWoodMaterial(colorHex, { ...opts, map: tex });
}

// Procedural felt-fiber texture for the grass mat under the course. Generated as a
// medium-density scatter of short directional strokes in varied green tones — when
// tiled, the strokes blend into a fibrous "felt" look. Returns a THREE.CanvasTexture
// that the calling material tints to the desired green; pixel values are mostly
// neutral so the multiplied final color reads as grass-green felt.
let _feltSourceCanvas = null;
function makeFeltTexture() {
  if (!_feltSourceCanvas) {
    const size = 256;
    _feltSourceCanvas = document.createElement('canvas');
    _feltSourceCanvas.width = size; _feltSourceCanvas.height = size;
    const ctx = _feltSourceCanvas.getContext('2d');

    // Base fill — neutral mid value. The MeshStandardMaterial's `color` will multiply
    // this; setting it close to mid-gray means the final color is dominated by the
    // material's green tint while still picking up the per-stroke variation.
    ctx.fillStyle = '#9e9e9e';
    ctx.fillRect(0, 0, size, size);

    // Scatter ~2500 short strokes of varying brightness in random directions. Each
    // stroke is just a few pixels long — they read as individual felt fibers when
    // tiled. A mix of slightly DARKER (shadow) and slightly LIGHTER (highlight)
    // strokes gives the surface depth without picking a specific hue.
    ctx.lineCap = 'round';
    const strokeCount = 2500;
    for (let i = 0; i < strokeCount; i++) {
      const x = Math.random() * size;
      const y = Math.random() * size;
      const angle = Math.random() * Math.PI * 2;
      const len = 2 + Math.random() * 4;
      const dx = Math.cos(angle) * len;
      const dy = Math.sin(angle) * len;
      const brightness = 0.4 + Math.random() * 0.45;
      const channel = Math.floor(brightness * 255);
      ctx.strokeStyle = `rgba(${channel}, ${channel}, ${channel}, 0.85)`;
      ctx.lineWidth = 0.8 + Math.random() * 0.6;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + dx, y + dy);
      ctx.stroke();
    }
    // Darker speckles for clustered fiber tufts.
    for (let i = 0; i < 300; i++) {
      const x = Math.random() * size;
      const y = Math.random() * size;
      ctx.fillStyle = `rgba(60, 60, 60, ${0.3 + Math.random() * 0.3})`;
      ctx.beginPath();
      ctx.arc(x, y, 0.6 + Math.random() * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Build a fresh THREE.CanvasTexture from the cached canvas so each caller can set
  // its own repeat/offset without affecting other meshes.
  const tex = new THREE.CanvasTexture(_feltSourceCanvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

// Floor-of-channel textured material
function makeTexturedFloorMaterial(colorHex, opts={}) {
  const tex = texturedClone(woodFloorTexture, 0.4, 0.4);
  return makeWoodMaterial(colorHex, { ...opts, map: tex });
}

// Cache of alphabet-block face textures keyed by `${letter}_${frameColor}_${woodTint}`.
// Each entry is a CanvasTexture rendering: square colored painted frame with a
// recessed center holding a colored letter, over a wood-grain background tinted to
// match the surrounding wooden support column.
const _alphabetTextureCache = new Map();
function getAlphabetFaceTexture(letter, colorHex, woodTintHex) {
  const key = `${letter}_${colorHex.toString(16)}_${woodTintHex.toString(16)}`;
  let tex = _alphabetTextureCache.get(key);
  if (tex) return tex;

  // Alphabet block face texture, baked from the SHARED wood-block texture with a
  // multiplicative color tint applied to match the column's wood shade (light pine,
  // medium beech, or dark walnut, same set the regular cubes use). The routered/
  // recessed inner area is rendered as the SAME tinted wood, just lightened to
  // imply where the surface finish was removed.
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // BACKGROUND: draw the wood-block texture onto the face from a random crop.
  // Match the regular cubes' grain density exactly: regular cubes use repeat=0.3,
  // showing ~30% of one wood-grain cycle per face. We mirror that on the alphabet
  // face by cropping ~30% of the source wood texture into the face, so the grain
  // features are the same size on both cube types.
  const woodImg = woodBlockTexture.image;
  if (woodImg) {
    const cropFrac = 0.3;
    const cropOff = Math.random() * (1 - cropFrac);
    const cropOff2 = Math.random() * (1 - cropFrac);
    const woodW = woodImg.width;
    const woodH = woodImg.height;
    ctx.drawImage(
      woodImg,
      cropOff * woodW, cropOff2 * woodH,
      woodW * cropFrac, woodH * cropFrac,
      0, 0, size, size
    );
  } else {
    ctx.fillStyle = '#c89968';
    ctx.fillRect(0, 0, size, size);
  }

  // TINT THE WOOD to match the column color. Use 'multiply' composite so the dark
  // grain lines stay dark, while the lighter wood pixels take on the tint color.
  // This produces a colored wood (e.g. walnut-dark, beech-medium) that visually
  // matches the regular `makeTexturedBlockMaterial(baseColor)` cubes around it.
  ctx.globalCompositeOperation = 'multiply';
  ctx.fillStyle = '#' + woodTintHex.toString(16).padStart(6, '0');
  ctx.fillRect(0, 0, size, size);
  ctx.globalCompositeOperation = 'source-over';

  // INNER RECESSED AREA: lighten the (tinted) wood inside the painted frame, but
  // not too much — the recess should read as "halfway" between the tinted column
  // wood and pure pale wood. Earlier versions at 0.55 alpha looked too white,
  // breaking visual cohesion with the surrounding cubes.
  const inset = size * 0.06;
  const frameW = size * 0.10;
  const innerLeft = inset + frameW;
  const innerSize = size - 2 * (inset + frameW);
  ctx.fillStyle = 'rgba(255, 240, 215, 0.28)';
  ctx.fillRect(innerLeft, innerLeft, innerSize, innerSize);

  // Slight inner shadow at the routed-area edges so the recess reads as depth.
  const grad = ctx.createLinearGradient(innerLeft, innerLeft, innerLeft, innerLeft + innerSize);
  grad.addColorStop(0,    'rgba(40, 25, 10, 0.28)');
  grad.addColorStop(0.12, 'rgba(40, 25, 10, 0)');
  grad.addColorStop(0.88, 'rgba(40, 25, 10, 0)');
  grad.addColorStop(1,    'rgba(40, 25, 10, 0.15)');
  ctx.fillStyle = grad;
  ctx.fillRect(innerLeft, innerLeft, innerSize, innerSize);

  // PAINTED FRAME — dark-brown square border. Painted ON TOP of the tinted wood so
  // its color is preserved (no further tinting). Slight transparency keeps a hint
  // of wood grain showing through, cutting the plastic-decal look. The dark brown
  // reads as a deep stain or ink — like a classic letterpress wooden block where
  // the routed border was inked rather than painted in a bright color.
  const darkBrown = '#3a2412';
  ctx.fillStyle = darkBrown;
  ctx.globalAlpha = 0.92;
  ctx.fillRect(inset, inset, size - inset * 2, frameW);
  ctx.fillRect(inset, size - inset - frameW, size - inset * 2, frameW);
  ctx.fillRect(inset, inset, frameW, size - inset * 2);
  ctx.fillRect(size - inset - frameW, inset, frameW, size - inset * 2);
  ctx.globalAlpha = 1.0;

  // THE LETTER — dark brown, bold, centered, with a soft drop shadow so it reads as
  // ROUTED INTO the wood like the recess itself. Same dark brown as the frame for
