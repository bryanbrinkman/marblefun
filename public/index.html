<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>marblerun.fun — Marble Tournament</title>
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body class="stats-hidden">
    <!-- Full-bleed race fills the screen; everything else floats over it. -->
    <div class="race-bg">
      <iframe id="game" src="marble_run.html?embed=1" title="marble run" allow="fullscreen" allowfullscreen></iframe>
      <div class="stage-overlay" id="stageOverlay"></div>
      <div class="paused-badge" id="pausedBadge" hidden>⏸ PAUSED</div>
    </div>

    <header class="topbar ov">
      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">marblerun.fun</span>
      </div>

      <!-- Current race console, merged into the bar -->
      <div class="race-console">
        <div class="cd" id="cd">
          <svg viewBox="0 0 64 64" class="cd-ring">
            <circle class="cd-bg" cx="32" cy="32" r="28" />
            <circle class="cd-fg" id="cdArc" cx="32" cy="32" r="28" />
          </svg>
          <div class="cd-num" id="countdown">—</div>
        </div>
        <div class="rc-info">
          <div class="race-title" id="raceTitle">Waiting for the next race…</div>
          <div class="seedline" id="seedline"></div>
        </div>
        <div class="rc-progress">
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          <span class="progress-count" id="progressCount">Race 0 / 25</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="watching" id="watching" hidden>
          <span class="eye">👁</span><span id="watchingN">0</span>&nbsp;watching
        </div>
        <div class="conn" id="conn">connecting…</div>
        <button class="stats-toggle" id="statsToggle" title="Show / hide stats" aria-label="Toggle stats">☰</button>
      </div>
    </header>

    <!-- Stats: collapsible windows, closed by default, stacked top-to-bottom -->
    <aside class="side" id="sidePanel">
      <div class="card champion-card" id="championCard" hidden>
        <div class="champ-label">CHAMPION</div>
        <div class="champ-trophy">🏆</div>
        <div class="champ-name" id="championName"></div>
      </div>

      <div class="card collapsible" id="upnextCard" hidden>
        <button class="card-head" type="button">
          <span class="ch-title">Up Next</span><span class="caret">▾</span>
        </button>
        <div class="card-body"><div class="upnext-body" id="upnextBody"></div></div>
      </div>

      <div class="card collapsible" id="recentCard" hidden>
        <button class="card-head" type="button">
          <span class="ch-title">Recent Results</span><span class="caret">▾</span>
        </button>
        <div class="card-body"><div class="recent" id="recent"></div></div>
      </div>

      <div class="card collapsible" id="fieldCard">
        <button class="card-head" type="button">
          <span class="ch-title">Field</span><span class="count-badge" id="aliveCount"></span><span class="caret">▾</span>
        </button>
        <div class="card-body">
          <div class="legend">
            <span><i class="pill alive"></i>alive</span>
            <span><i class="pill eliminated"></i>out</span>
            <span><i class="pill champion"></i>champion</span>
          </div>
          <div class="standings" id="standings"></div>
        </div>
      </div>

      <div class="card collapsible" id="champsCard" hidden>
        <button class="card-head" type="button">
          <span class="ch-title">Past Champions</span><span class="count-badge" id="champsCount"></span><span class="caret">▾</span>
        </button>
        <div class="card-body"><div class="champs" id="champsBody"></div></div>
      </div>
    </aside>

    <!-- Kept for the renderer; the game draws its own live leaderboard. -->
    <div class="roster" id="roster" hidden></div>

    <!-- Tournament-champion celebration: full-screen fireworks + the winning
         marble, huge. Shown when a champion is crowned; dismissed on click or
         when the next tournament starts. -->
    <div class="champ-overlay" id="champOverlay" hidden>
      <canvas id="fwCanvas"></canvas>
      <div class="co-inner">
        <div class="co-kicker">🏆 TOURNAMENT CHAMPION 🏆</div>
        <div class="co-ball" id="coBall"><span class="co-shine"></span></div>
        <div class="co-name" id="coName"></div>
        <div class="co-sub">100 marbles entered — one rolled out on top</div>
      </div>
      <button class="co-close" id="coClose" aria-label="Close">✕</button>
    </div>

    <!-- Bracket: a classic two-sided "Road to the Final" that slides up from the
         bottom as a lower third, toggled by the button in the corner. -->
    <button class="bracket-btn" id="bracketBtn" aria-label="Toggle bracket">
      <span class="bic" aria-hidden="true"></span><span>Bracket</span>
    </button>
    <section class="bracket-dock" id="bracketDock" aria-hidden="true">
      <div class="bd-top">
        <div class="bd-title">BRACKET <span>· Road to the Final</span></div>
        <div class="funnel" id="funnel">
          <div class="funnel-stage" data-stage="heats"><b>100</b><span>marbles</span></div>
          <div class="funnel-arrow">→</div>
          <div class="funnel-stage" data-stage="semis"><b>20</b><span>winners</span></div>
          <div class="funnel-arrow">→</div>
          <div class="funnel-stage" data-stage="final"><b>5</b><span>finalists</span></div>
          <div class="funnel-arrow">→</div>
          <div class="funnel-stage" data-stage="champion"><b>1</b><span>champ</span></div>
        </div>
        <button class="bd-close" id="bracketClose" aria-label="Close bracket">✕</button>
      </div>
      <div class="bd-body" id="bracketBody"></div>
    </section>

    <script src="tournament-core.js"></script>
    <script src="viewer.js"></script>
  </body>
</html>
